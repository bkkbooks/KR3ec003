front:
  text: 卷第一序録隱居先生在乎茅山巖嶺之上以吐納餘暇頗遊意方技覽本草藥性以為盡聖人之心故撰而論之舊説皆稱神農本草經余以為信然昔神農氏之王天下也畫易卦以通鬼神之情造耕種以省煞害之弊宣藥療疾以拯夭傷之命此三道者歷羣聖而滋彰文王孔子象繇辭幽賛人天後稷伊尹播厥百榖惠被生民岐皇彭扁振揚輔導恩流含氣並歳踰三千民到於今賴之但軒轅以前文字未傳如六爻指垂畫象稼穡即事成跡至於藥性所主當以識識相因不爾何由得聞至乎桐雷乃著在篇簡此書應與素問同類但後人多更修飾之耳秦皇所焚醫方卜術不預故猶得全録而遭漢獻遷徙晉懷奔迸文籍焚靡千不遺一今之所存有此四卷是其本經所出郡縣乃後漢時制疑仲景元化等所記又有桐君採藥録説其華葉形色藥對四卷論其佐使相須魏晉以來吳普李當之等更復損益或五百九十五或四百卅一或三百一十九或三品混糅冷熱舛錯草石不分蟲獸無辨且所主治互有多少醫家不能備見則識智有淺深今輙苞綜諸經研括煩省以神農本經三品合三百六十五為主又進名醫副品亦三百六十五合七百卅種精麁皆取無復遺落分别科條區物類兼注詺世用土地所出及仙經道術所須并此序録合為三卷雖未足追踵前良蓋亦一家撰製吾去世之後可貽諸知音爾本草經卷上序藥性之本源詮病名之形診題記品録詳覽施用之本草經卷中玉石草木三品合三百五十六種本草經卷下蟲獸菓菜米食三品合一百九十五種有名無實三條合一百七十九種合三百七十四種右三卷其中下二卷藥合七百卅種各别有目録並朱墨雜書并子注大書分為七卷上藥一百廾種爲君主養命以應天無毒多服久服不傷人欲輕身益氣不老延年者本上經中藥一百廾種爲臣主養性以應人無毒有毒斟酌其宜欲遏病補虚羸者本中經下藥一百廾五種爲佐使主治病以應地多毒不可久服欲除寒熱邪氣破積聚愈疾者本下經三品合三百六十五種法三百六十五度一度應一日以成一歲倍其數合七百卅名本説如此今案上品藥性亦皆能遣疾但其勢力和厚不為倉卒之効然而歲月將服必獲大益病既愈矣命亦兼申天道仁育故云應天獨用百廾種者當謂寅卯辰巳之月法萬物生榮時也中品藥性治病之辭漸深輕身之説稍薄於服之者祛患當速而延齡為緩人懷性情故云應人百廾種者當謂午未申酉之月法萬物熟成時也下品藥性專主攻擊毒烈之氣傾損中和不可恒服疾愈則止地體收煞故云應地獨用一百廾五種者當謂戌亥子丑之月兼以閏之盈數加之法萬物枯藏時也今合和之體不必偏用自隨人患苦參而共行但君臣配應依後所説若單服之者所不論耳藥有君臣佐使以相宣攝合和者宜用一君二臣五佐又可一君三臣九佐也本説如此案今用藥猶如立人之制若多君少臣多臣少佐則勢力不周故也而檢世道諸方亦不必皆爾養命之藥則多君養性之藥則多臣治病之藥則多佐猶依本性所主而兼復斟酌詳用此者益當為善又恐上品君中復各有貴賤譬如列國諸侯雖並得稱君制而猶歸宗周臣佐之中亦當如此所以門冬遠志别有君臣甘草國老大黄將軍明其優劣不皆同秩自非農岐之徒孰敢詮正正應領略輕重為分劑也藥有陰陽配合子母兄弟根葉華實草石骨肉有單行者有相須者有相使者有相畏者有相惡者有相反者有相煞者凡此七情合和當視之相須相使者良勿用相惡相反者若有毒宜制可用相畏相煞不爾勿合用也本説如此案其主治雖同而性理不和更以成患今檢舊方用藥並亦有相惡相反者服之不乃為忤或能復有制持之者猶如寇賈輔漢程周佐吳大體既正不得以私情為害雖爾恐不如不用今仙方甘草丸有防己細辛世方五石散有栝樓乾薑略舉大者如此其餘復有數十餘條别注在後半夏有毒用之必須生薑此是取其所畏以相制耳其相須相使不必同類猶如和羹調食魚肉葱豉各有所宜共相宣發也藥有酸醎甘苦辛五味又有寒熱温凉四氣及有毒無毒陰乾曝乾採治時月生熟土地所出真偽陳新並各有法本説如此又有分劑秤兩輕重多少皆須甄别若用得其宜與病相會入口必愈身安壽延若冷熱乖衷真假非類分兩違舛湯丸失度當差反劇以至殆命醫者意也古之時所謂良醫蓋善以意量得其節也諺言世無良醫枉死者半拙醫治病不若不治喻如宰夫以鼈為蒪羹食之更足成病豈充飢之可望乎故仲景每云如此死者醫殺之也藥有宜丸者宜散者宜水煮者宜酒漬者宜膏煎者亦有一物兼宜者亦有不可入湯酒者並隨藥性不得違越本説如此又疾有宜服丸者宜服散者宜服湯者宜服酒者宜服膏煎者亦兼參用察病之源以為其制耳凡欲治病先察其源先候病機五藏未虚六府未竭血脉未亂精神未散食藥必活若病已成可得半愈病勢已過命將難全本説如此案今自非明醫聽聲察色至乎診脉孰能知未病之病乎且未病之人亦無肯自治故桓侯怠於皮膚之微以致骨髓之痼非但識悟之為難亦信受之弗易倉公有言病不肯服藥一死也信巫不信醫二死也輕身薄命不能將慎三死也夫病之所由來雖多而皆關於邪邪者不正之因謂非人身之常理風寒暑濕飢飽勞佚皆各是邪非獨鬼氣疾厲者矣人生氣中如魚之在水水濁則魚瘦氣昏則人疾邪氣之傷人最為深重經絡既受此氣傳以入藏府藏府隨其虚實冷熱結以成病病又相生故流變遂廣精神者本宅身為用身既受邪精神亦亂神既亂矣則鬼靈斯入鬼力漸强神守稍弱豈得不至於死乎古人譬之植楊斯理當矣但病亦别有先從鬼神來者則宜以祈禱祛之雖曰可祛猶因藥療致益李子豫赤丸之例是也其藥療無益者是則不可祛晉景公膏肓之例是也大都神鬼之害人多端疾病之源惟一種蓋有輕重者爾真誥言常不能慎事上者自致百疴而怨咎於神靈當風卧濕反責他於失福皆是癡人也云慎事上者謂舉動之事必皆慎思飲食男女最為百疴之本致使虚損內起風濕外侵以共成其害如此豈得關於神明乎唯當勤藥治為理耳若毒藥治病先起如黍粟病去即止不去倍之不去什之取去為度本説如此案蓋謂單行一兩種毒物如巴豆甘遂輩不可便令至劑耳依如經言一物一毒服一丸如細麻二物一毒服二丸如大麻三物一毒服三丸如小豆四物一毒服四丸如大豆五物一毒服五丸如菟矢六物一毒服六丸如梧子從此至十皆如梧子以數為丸而毒中又有輕重如狼毒鈎吻豈同附子芫華輩耶凡此之類皆須量宜治寒以熱藥治熱以寒藥飲食不消以吐下藥鬼注蠱毒以毒藥癰腫瘡瘤以瘡藥風濕以風濕藥各隨其所宜本説如此案今藥性一物兼主十餘病者取其偏長為本復應觀人之虚實補瀉男女老少苦樂榮悴鄉壤風俗並各不同褚澄治寡婦尼僧異乎妻妾此是達其性懷之所致也病在胸膈以上者先食後服藥病在心腹以下者先服藥後食病在四肢血脉者宜空腹而在旦病在骨髓者宜飽滿而在夜本説如此案其非但藥性之多方節適早晚復須修理今方家所云先食後食蓋此義也先後二字當作蘇殿胡豆之音不得云蘇田胡苟音也此正大反多致疑或又有須酒服飲服温服冷服暖服湯有疎有數煮湯有生有熟皆各有法用者並應詳宜之夫大病之主有中風傷寒寒熱溫瘧中惡霍亂大腹水腫腹澼下利大小便不通賁豚上氣欬逆嘔吐黄疸消渴留飲癖食堅積癥瘕驚邪癲癇鬼注喉痺齒痛耳聾目盲金創踒折癰腫惡瘡痔瘻癭瘤男子五勞七傷虚乏羸瘦女子帶下崩中血閉陰蝕蟲蛇蠱毒所傷此皆大略宗兆其間變動枝葉各依端緒以取之本説如此案今藥之所主各止説病之一名假今中風中風乃數十種傷寒證候亦卄餘條更復就中求其例類大體歸其始終以本性為根宗然後配合諸證以命藥耳病生之變不可一概言之所以醫方千卷猶未理盡春秋以前及和緩之書蔑聞道經略載扁鵲數法其用藥猶是本草家意至漢淳于意及華佗等方今之所存者亦皆修藥性張仲景一部最為衆方之祖宗又悉依本草但其善診脉明氣候以意消息之耳至於刳腸剖臆刮骨續筋之法乃别術所得非神農家事自晉世已來有張苗宫泰劉德史脱靳邵趙泉李子豫等一代良醫其貴勝阮德如張茂先裴逸民皇甫士安及江左葛稚川蔡謨殷淵源諸名人等並亦研精藥術宋有羊欣王微胡洽秦承祖齊有尚書褚澄徐文伯嗣伯羣從兄弟治病亦十愈其九凡此諸人各有所撰用方觀其指趣莫非本草者或時用别藥亦修其性度非相踰越范汪方百餘卷及葛洪肘後其中有細碎單行經用者所謂出於阿卷是或田舍試驗之法殊域異識之術如藕皮散血起自庖人牽牛逐水近出野老店蒜乃下蛇之藥路邊地松為金瘡所秘此蓋天地間物莫不為天地間用觸遇則會非其主對矣顏光禄亦云詮三品藥性以本草為主道經仙方服食斷穀延年却老乃至飛丹轉石之奇雲騰羽化之妙莫不以藥導為先用藥之理又壹同本草但制御之途小異世法猶如粱肉主於濟命華夷禽獸皆共仰資其為生理則同其為性靈則異耳大略所用不多遠至卄餘物或單行數種便致大益是其深練歲積即本草所云久服之効不如世人微覺便止故能臻其所極以致遐齡豈但充體愈疾而已哉今庸醫處治皆耻看本草或倚約舊方或聞人傳説或遇其所憶便攬筆疏之俄然戴面以此表奇其畏惡相反故自寡昧而藥類違僻分兩參差亦不以為疑脱偶而值差則自信方驗若旬月未瘳則言病源深結了不反求諸已詳思得失虚構聲稱多納金帛非唯在顯宜責固將居幽貽譴矣其五經四部軍國禮服若詳用乖越者正於事迹非宜耳至於湯藥一物有謬便性命及之千乘之君百金之長何可不深思戒慎耶許世子侍藥不嘗招弑賊之辱季孫饋藥仲尼未達知藥之不可輕信也晉時有一才情人欲刊正周易及諸藥方先與祖納共論祖云辯釋經典縱有異同不足以傷風教方藥小小不達便壽夭所由則後人受弊不少何可輕以裁斷祖公此言可謂仁識足為水鏡論語云人而無恒不可以作巫醫明此二法不得以權飾妄造所以醫不三世不服其藥又云九折臂乃成良醫蓋謂學功須深故也復患今承藉者多恃衒名價亦不能精心研解虚傳聲美聞風競往自有新學該明而名稱未播貴勝以為始習多不信用委命虚名諒可惜也京邑諸人皆尚聲譽不取實録余祖世以來務敦方藥本有范汪方一部斟酌詳用多獲其効内護家門旁及親族其有虚心告請者不限貴賤皆摩踵救之凡所救活數百千人自余投纓宅嶺猶不忘此日夜翫味恒覺欣欣今撰此三卷并效驗方五卷又補闕葛氏肘後三卷蓋欲永嗣善業令諸子姪弗敢失墜可以輔身濟物者孰復是先今諸藥採治之法既並用見成非能自掘不復具論其事唯合藥須解莭度列之如左案諸藥所生皆的有境界秦漢以前當言列國今郡縣之名後人所改耳自江東以來小小雜藥多出近道氣勢理不及本邦假令荆益不通則令用歷陽當歸錢唐三建豈得相似所以治病不及往人者亦當緣此故也蜀藥及北藥雖有去來亦復非精者又市人不解藥性唯尚形飾上黨人參殆不復售華陰細辛棄之如芥且各隨世相競順方切須不能多備諸族故往往遺漏今之所存二百許種耳衆醫覩不識藥唯聽市人市人又不辨究皆委採送之家採送之家傳習治拙真偽好惡莫測所以有鐘乳酢煮令白細辛水漬使直黄耆蜜蒸為甜當歸酒灑取潤螵蛸膠著桑枝吳公朱足令赤諸有此等皆非事實世用既久轉以成法非復可改末如之何又依方分藥不量剥治如遠志牡丹裁不收半地黄門冬三分耗一凡去皮除心之屬分兩皆不復相應病家唯依此用不知更稱又王公貴勝合藥之日悉付羣下其中好藥貴石無不竊遣乃言紫石丹沙吞出洗取一片經數十過賣諸有此等例巧偽百端皆非事實雖復鑒檢初不能覺以此治病理難即効斯並藥家之盈虚不得咎醫人之淺拙也本草採藥時月皆在建寅歲首則從漢太初後所記也其根物多以二月八月採者謂春初津潤始萌未衝枝葉勢力淳濃故也至秋則枝葉就枯又歸流於下今即事驗之春寧宜早秋寧宜晚其華實莖葉乃各隨其成熟耳歲月亦有早晏不必都依本文矣經説陰乾者謂就六甲陰中乾之依遁甲法甲子旬陰中在癸酉以藥著酉地也余謂不必然正是不露日曝於陰影處乾之耳所以亦有云曝乾故也若幸可兩用益當善古秤唯有銖兩而無分名今則以十黍為一銖六銖為一分四分成一兩十六兩為一斤雖有子穀秬黍之制從來均之已久正爾依此用之但古秤皆複今南秤是也晉秤始後漢末已來分一斤為二斤耳一兩為二兩耳金銀絲綿並與藥同無輕重矣古方唯有仲景而已涉今秤若用古秤作湯則水為殊少故知非複秤悉用今者爾方有云分等者非分兩之分也謂諸藥斤兩多少皆同耳先視病之大小輕重所須乃以意裁之凡此之類皆是丸散丸散竟便依節度用之湯酒中無分等也凡散藥有云刀圭者十分方寸匕之一准如梧子大也方寸匕者作匕正方一寸抄散取不落為度錢五匕者今五銖錢邊五字者以抄之亦令不落為度一撮者四刀圭也十撮為一勺十勺為一合以藥升分之者謂藥有虚實輕重不得用斤兩則以升平之藥升合方寸作上徑一寸下徑六分深八分内散勿案抑正爾微動令平調耳而今人分藥多不復用此凡丸藥有云如細麻者即今胡麻也不必扁扁但令較略大小相稱耳如黍粟亦然以十六黍為一大豆也如大麻者即大麻子准三細麻也如胡豆者今青斑豆也以二大麻子准之如小豆者今赤小豆也粒有大小以三大麻子准之如大豆者二小豆准之如梧子者以二大豆准之一方寸匕散蜜和得如梧子准十丸為度如彈丸及鷄子黄者以十梧子准之凡湯酒膏藥舊方皆云敷汝反咀暴汝反謂秤畢擣之如大豆者又使吹去細末此於事殊不允藥有易碎難碎多末少末秤兩則不復均今皆細切之較略令如咀者差得無末而粒片調和於藥力同出無生熟也凡丸散藥亦先細切曝燥乃擣之又有各擣者有合擣者隨方所言其潤濕藥如門冬乾地黄輩皆先切曝獨擣令扁碎更出細擘曝乾值陰雨亦以微火烘之既燥小停冷仍擣之凡潤濕藥燥皆大耗當先增分兩須得屑乃秤為正其湯酒中不須如此凡篩丸藥用重密絹令細於蜜丸易成熟若篩散草藥用輕踈絹於酒服則不泥其石藥亦用細絹篩如丸者凡篩丸散藥竟皆更合於臼中以杵研之數百過視色理和同為佳凡湯酒膏中用諸石皆細擣之如粟米亦可以葛布篩令調並以新綿别裹内中其雄黄朱沙細末如粉凡煮湯欲微火令小沸其水數依方多少大略廾兩藥用水一斗煮取四升以此為率然則利湯欲生少水而多取補湯欲熟多水而少取好詳視之所得寧令多少用新布兩人以尺木絞之澄去泥濁紙覆令密温湯勿令鐺器中有水氣於熱湯上煮令暖亦好服湯家小熱易下冷則嘔涌云分再服三服者要令力熱勢足相及並視人之强羸病之輕重以為進退增減之不必悉依方説凡漬藥酒皆須細切生絹袋盛之乃入酒密封隨寒暑日數視其濃烈便可瀝出不必待至酒盡也滓可曝燥微擣更漬飲之亦可作散服凡建中腎瀝諸補湯滓合兩劑加水煮竭飲之亦敵一劑新藥貧人當依此皆應先曝令燥凡合膏初以苦酒漬取令淹溲浹後不用多汁密覆勿泄云晬時者周時也從今旦至明旦亦有止一宿者煮膏當三上三下以泄其燋勢令藥味得出上之使迊迊沸仍下之下之取沸靜乃上寧欲小生其中有薤白者以兩頭微燋黄為候有白芷附子者亦令小黄色也猪肪勿令經水臈月彌佳絞膏亦以新布絞之若是可服之膏膏滓亦堪酒煮稍飲之可摩之膏膏滓即宜以薄病上此蓋貧野人欲兼盡其力凡膏中有雄黄朱沙輩皆别擣細研如麺須絞膏竟乃投中以物疾攪至於凝强勿使沉聚在下不調也有水銀者於凝膏中研令消散有胡粉亦爾凡湯酒中用大黄不須細剉作湯者先水漬令淹浹密覆一宿明旦煮湯臨熟乃以内中又煮兩三沸便絞出則力勢猛易得快利丸散中用大黄舊皆蒸今不須爾凡湯中用麻黄皆先别煮兩三沸料去其沫更益水如本數乃内餘藥不爾令人煩麻黄皆折去節令理通寸斬之有小草瞿麦五分斬之細辛白前三分斬之丸散膏中則細剉也凡湯中用完物皆擘破乾棗枝子括樓子之類是也用細核物亦打碎山茱萸五味蕤核決明之類是也細華子物正爾完用之旋伏華菊華地膚子葵子之類是也米麦豆輩亦完用之諸蟲先微炙亦完煮之唯螵蛸當中破之生薑夜干皆薄切芒消糖阿膠皆須絞湯竟内汁中更上火兩三沸烊盡乃服之凡用麦門冬皆微潤抽去心杏人桃人湯柔撻去皮巴豆打破剥皮刮去心不爾令人悶石韋辛夷刮去毛鬼箭削取羽及皮藜蘆剔取根微炙枳實去其核止用皮亦炙之椒去實於鐺器中微熬令汗出則有勢力礬石於瓦上若鐵物中熬令沸汁盡即止二礜石皆黄土泥苞使燥燒之半日令勢熱而解散犀角靈羊角皆刮截作屑諸齒骨並炙擣碎之皂莢去皮子炙之凡湯丸散用天雄附子烏頭烏喙側子皆煻灰火炮炙令微坼削去黑皮乃秤之唯薑附子湯及膏酒中生用亦削去皮乃秤直理破作七八片隨其大小但削除外黑尖處令盡凡湯酒膏丸散用半夏皆且完以熱湯洗去上滑手捼之皮釋隨剥去更復易湯捼之令滑盡不爾戟人咽舊方廾許過今六七過便足亦可直煮之沸易水如此三過仍捼洗畢便訖隨其大小破為細片乃秤以入湯若膏酒丸散皆須曝燥乃秤之也丸散止削上皮用之未必皆洗也凡丸散用膠皆先炙使通體沸起燥乃可擣有不沸處更炙之丸方中用蠟皆烊投少蜜中攪調以和藥若用熟艾先細擘合諸藥擣令散不可篩者别擣内散中和之凡用蜜皆先火上煎料去其沫令色微黄則丸經久不壞剋之多少隨蜜精麁凡丸散用巴豆杏人桃人葶藶胡麻諸有膏脂藥皆先熬黄黑别擣令如膏指視泯泯爾乃以向成散稍稍下臼中合研擣令消散乃復都以輕疏絹篩度之須盡又内臼中依法治數百杵也湯膏中用亦有熬之者雖生並擣破凡用桂厚朴杜仲秦皮木蘭輩皆削去上虚軟甲錯取裏有味者秤之茯苓猪苓削除去黑皮牡丹巴戟天遠志野葛等皆搥破去心紫菀洗去土皆畢乃秤之薤白葱白除青令盡莽草石南草茵芋澤蘭剔取葉及嫩莖去大枝鬼臼黄連皆除根毛蜀椒去閉口者及目熬之凡狼毒枳實橘皮半夏麻黄吳茱萸皆欲得陳久者其餘唯須新精凡方云巴豆如千枚者粒有大小當先去心皮竟秤之以一分准十六枚附子烏頭如干枚者去皮竟以半兩准一枚枳實如干枚者去核竟以一分准二枚橘皮一分准三枚棗有大小以三枚准一兩云乾薑一累者以重一兩為正凡方云半夏一升者洗竟秤五兩為正云某子一升者其子各有虚實輕重不可通以秤准皆取平升為正椒一升三兩為正吳茱萸一升五兩為正菟絲子一升九兩為正菴子一升四兩為正蛇床子一升三兩半為正地膚子一升四兩為正此其不同也凡方云用桂一尺者削去皮竟重半兩為正甘草一尺者重二兩為正凡方云某草一束者以重三兩為正云一把者重二兩為正凡方云蜜一斤者有七合猪膏一斤者有一升二合右合藥分劑料治法又案諸藥一種雖主數病而性理亦有偏著立方之日或致疑混復恐單行徑用赴急抄撮不必皆得研究今宜指抄病源所主藥名仍可於此處治若欲的尋亦兼易解其甘苦之味可略有毒無毒易知唯冷熱須明今以朱點為熱墨點為冷無點者是平以省於煩注也其有不入湯酒者亦條於後也解毒蛇虺百蟲毒用雄黄巴豆麝香蜈蚣毒用桑汁若煮桑根汁蜘蛛毒用藍青鹽麝香蜂毒用蜂房藍青狗毒用杏人礬石惡氣鄣毒百毒用犀角零羊角雄黄麝香喉痺腫邪氣惡毒入腹用升麻夜干風腫毒腫用五香及紫檀百病藥毒用甘草薺苨大小豆汁藍汁及實皆解之射罔毒用藍汁大小豆汁竹瀝大麻子汁六畜血貝齒屑葍根屑蚯蚓屑藕菱汁並解之野葛毒用鷄子糞汁葛根汁甘草汁鴨頭熱血温猪膏並解之若已死口噤者以大竹筒注兩脅若臍上冷水內筒中暖輒易之口須臾開開即內藥便活斑猫芫青毒用猪膏大豆汁戎鹽藍汁及鹽湯煮猪膏及巴豆並解之狼毒毒用藍汁白歛及鹽汁及鹽湯煮猪木占斯並解之躑躅毒用支子汁解之巴豆毒用煮黄連汁大豆汁生薑汁菖蒲屑汁煮寒水石汁並解之藜蘆毒用雄黄屑煮葱白汁温湯並解之雄黄毒用防己解之甘遂毒用大豆汁解之蜀椒毒用葵子汁煮桂汁豉汁人溺及冷水及飡土食蒜鷄毛燒咽並解之半夏毒用生薑汁煮乾薑汁並解之礜石毒用大豆汁白膏並解之芫華毒用防風防己甘草桂汁並解之烏頭天雄附子毒用大豆汁遠志防風棗肌糖並解之大戟毒用菖蒲汁解之桔梗毒用粥解之杏人毒用藍子汁解之諸菌毒掘地作坎以水沃中攪令濁俄頃飲之名地漿也防葵毒用葵根汁解之莨菪毒用薺苨甘草升麻犀角蟹並解之馬刀毒用清水解之野芋毒用土漿及糞汁並解之鷄子毒用淳酢解之鐵毒用慈石解之食金銀毒服水銀數兩即出又鴨血及鷄子汁又水淋鷄屎汁並解之食諸肉馬肝漏脯中毒生韭汁燒末猪骨又頭垢燒犬屎酒服之豉汁亦佳食諸魚中毒煮橘皮及生蘆笋根汁煮朴消汁大黄汁燒末鮫魚皮並佳食蟹中毒擣生蘇汁煮乾蘇汁及屑冬瓜汁並佳食諸菜中毒以甘草貝齒粉三種末水和服之小兒溺乳汁服二升亦佳飲食中毒煩滿煮苦參飲之令吐出食石藥中毒白鴨屎解之人參亦佳服藥過劑悶亂者吞鷄子黄又藍汁又水和胡粉又土漿又蘘荷汁又粳米潘汁又豉汁又乾薑黄連屑又糖又水和葛粉飲之皆良服藥忌食有朮勿食桃李及雀肉胡蒜青魚鮓服藥有巴豆勿食蘆笋羹及猪肉有半夏菖蒲勿食糖及羊肉有細辛勿食生菜有甘草勿食菘菜有藜蘆勿食狸肉有牡丹勿食生胡蒜有當陸勿食犬肉有恒山勿食葱菜有空青朱沙勿食生血物有茯苓勿食諸酢物服藥不可多食生胡蒜雜生菜服藥不可多食諸滑物果實菜服藥不可多食肥猪犬肉肥羹及魚臊膾服藥通忌見死尸及產婦淹穢事藥不宜入湯酒者朱沙雌黄雲母陽起石礬石流黄鐘乳入酒孔公孽入礜石右石類野葛狼毒毒公鬼臼莽草巴豆躑躅入酒入酒皂莢入酒單漬入酒右草木類蜂子蜜蠟白馬莖狗陰雀卵鷄子雄鵲伏翼鼠婦樗鷄螢火螉殭蠶蜈蚣蜥蜴斑猫芫青亭長地膽蟲蜚亷螻姑馬刀赭魁蝦蟆蝸牛生鼠生龜諸鳥獸蟲魚膏髓膽血屎溺右蟲獸類尋萬物之性皆有離合虎嘯風生龍吟雲起慈石引針虎魄拾芥漆得蟹而散麻得漆而踊桂得葱而軟樹得桂而枯戎鹽累卵獺膽分盃其氣爽有相關感多如此類其理不可得而思之至於諸藥尤能遞為利害先聖既明言其説何可不詳而避之世人為方皆多漏略若舊方已有此病亦應改除假令而兩種當就其輕重擇可除而除之傷寒赤散吾恒不用藜蘆斷下黄連丸亦去其乾薑而施之殆無不效何急强以相憎苟令共事乎相反為害深於相惡相惡者謂彼雖惡我我無忿心猶如牛黄惡龍骨而龍骨得牛黄更良此有以相制伏故也相反者則彼我交讎必不宜合今畫家用雌黄胡粉相近便自黯妬粉得黄則黑黄得粉亦變此蓋相反之徵藥理既昧所以人多輕之今案方處治恐不必卒能尋究本草更復抄出其事在此覽略看之易可知驗而本經有直云茱萸門冬者無以辨其山吳天麦之異咸宜各題其條又有亂誤處譬如海蛤之與鱓甲畏惡正同又諸芝使薯蕷薯蕷復使紫芝計無應如此而不知何者是非亦宜併記當更廣檢正之又神農本經相使止各一種兼以藥對參之乃有兩三於事亦無嫌其有云相得共治某病者既非妨避之禁不復疏出玉石上品玉屑惡鹿角玉泉畏欵冬花丹沙惡慈石畏醎水水銀惡慈石曾青畏兔絲子石膽水英為之使畏牡桂菌桂芫花辛荑白薇雲母惡徐長卿澤瀉為之使反畏鱓甲朴消畏麦句薑消石螢火為之使惡苦參苦菜畏女菀粥礬石甘草為之使惡牡蠣芒消石韋為之使畏麦句畺滑石石韋為之使惡曾青紫石英長石為之使不欲鱓甲黄連麦句畺畏扁青附子赤石脂惡大黄畏芫花白石英惡馬目毒公黄石脂曾青為之使惡細辛畏蜚蠊大一禹餘糧杜仲為之使畏貝母菖蒲鐵落白石脂屎為之使惡松脂畏黄芩注玉石中品鐘乳蛇床為之使惡牡丹玄石牡蒙畏紫石英蘘草殷孽惡朮防己孔公孽木蘭為之使惡細辛慈石柴胡為之使惡牡丹莽草畏黄石脂殺鐵毒凝水石畏地榆解巴豆毒石膏鷄子為之使惡莽草毒公陽起石桑螵蛸為之使惡澤瀉菌桂雷丸蛇蜕皮畏兔絲玄石惡松脂栢子菌桂理石滑石為之使畏麻黄注下品青瑯玕得水銀良畏烏鷄骨殺錫毒礜石得火良棘針為之使惡毒公虎掌騖屎細辛畏水方解石惡巴豆代赭畏天雄大鹽漏蘆為之使特生礜石火練之良畏水草木上品六芝薯蕷為之使得髮良惡恒山畏扁青茵陳蒿茯苓茯神馬間為之使惡白歛畏牡蒙地榆雄黄秦膠龜甲栢子牡蠣桂苽子為之使惡菊花羊蹄諸石麺麹天門冬垣衣地黄為之使畏曾青青耳麦門冬地黄車前為之使惡欵東花苦瓠畏苦參青蘘青耳朮防風地榆為之使女萎畏鹵醎乾地黄得麦門冬清酒良惡貝母畏蕪荑注菖蒲秦膠秦皮為之使惡地膽麻黄去節遠志得茯苓冬葵龍骨良畏真珠蜚蠊藜蘆蠐螬殺天雄附子毒澤瀉畏海蛤文蛤薯蕷紫芝為之使惡甘遂菊花朮苟杞根桑根白皮為之使甘草朮乾漆苦參為之使惡遠志反甘遂大戟芫花海藻人參茯苓為之使惡溲疏反藜蘆石斛陸英為之使惡凝水石巴豆畏殭蠶雷丸石龍芮大戟為之使畏蛇蜕茱萸落石杜仲牡丹為之使惡鐵落菖蒲貝母注龍膽貫衆為之使惡防葵地黄牛膝惡螢火龜甲陸英畏白前杜仲畏蛇皮玄參乾漆半夏為之使畏鷄子細辛曾青桑根白皮為之使反藜蘆惡狼毒山茱萸黄耆畏滑石消石獨活蠡實為之使茈胡半夏為之使惡皂莢畏女菀藜蘆酸棗惡防己槐子景天為之使菴子荆子薏苡為之使注蛇床子惡巴豆牡丹貝母兔絲子宜丸不宜煮得酒良薯蕷松脂為之使惡雚菌菥蓂子得荆實細辛良惡乾薑苦參蒺藜子烏頭為之使茜根畏鼠姑天名精垣衣為之使牡荆實防風為之使惡石膏秦椒惡栝樓防葵畏雌黄蔓荆實惡烏頭石膏辛夷穹窮為之使惡五石脂畏菖蒲黄連石膏黄環注草木中品當歸惡茹畏菖蒲海藻牡蒙防風惡乾薑藜蘆白歛芫花殺附子毒秦艽菖蒲為之使黄艽惡龜甲吳茱萸蓼實為之使惡丹參消石白堊畏紫石英黄芩山茱萸龍骨為之使惡葱實畏丹參牡丹藜蘆黄連黄芩龍骨理石為之使惡菊花芫花玄參白鮮畏欵冬勝烏頭解巴豆毒五味子蓯蓉為之使惡萎蕤勝烏頭決明子著實為之使惡大麻子芍藥須丸為之使惡石斛芒消畏消石鼈甲小薊反藜蘆桔梗節皮為之使畏白及龍眼龍膽穹窮白芷為之使惡黄連藁本惡茹麻黄厚朴為之使惡辛夷石韋葛根殺野葛巴豆百藥毒前胡半夏為之使惡皂莢畏藜蘆貝母厚朴白微為之使惡桃花畏秦艽礜石莽草反烏頭括樓根枸杞為之使惡乾薑畏牛膝乾漆反烏頭丹參畏醎水反藜蘆厚朴乾薑為之使惡澤瀉寒水石消石玄參惡黄耆乾薑大棗山茱萸反藜蘆沙參惡防己反藜蘆苦參玄參為之使惡貝母漏蘆兔絲子反藜蘆續斷地黄為之使惡雷丸山茱萸蓼實為之使惡桔梗防風防己桑根白皮續斷桂麻子為之使狗脊萆薢為之使惡敗醬萆薢薏苡為之使畏葵根大黄茈胡牡蠣前胡石韋杏人為之使得菖蒲良瞿麥蘘草牡丹為之使惡桑螵蛸秦皮大戟為之使惡茱萸白芷當歸為之使惡旋復花杜若得辛夷細辛良惡茈胡前胡黄蘗惡乾漆白微惡黄耆乾薑乾漆大棗山茱萸支子解躑躅毒紫菀欵冬為之使惡天雄瞿麥雷丸遠志畏茵陳白鮮惡桑螵蛸桔梗茯苓萆薢薇銜得秦皮良井水藍殺巴豆野葛諸毒海藻反甘草乾薑秦椒為之使惡黄芩天鼠屎殺半夏莨菪毒草木下品大黄黄芩為之使無所畏蜀椒杏人為之使畏槖吾巴豆芫花為之使惡蘘草畏大黄黄連藜蘆甘遂瓜蒂為之使惡遠志反甘草葶藶榆皮為之使得酒良惡殭蠶石龍芮大戟反甘草澤漆小豆為之使惡薯蕷芫花決明為之使反甘草鈎吻半夏為之使惡黄芩狼毒大豆為之使惡麦句薑畏天名精鬼臼畏垣衣天雄遠志為之使惡腐婢烏頭烏喙莽草為之使反半夏栝樓貝母白歛白芨惡藜蘆附子地膽為之使惡蜈蚣畏防風甘草黄耆人參烏韭大豆皂莢青葙子為之使惡麦門冬畏空青人參苦參蜀漆栝樓為之使惡貫衆半夏射干為之使惡皂莢畏雄黄生薑乾薑秦皮龜甲反烏頭欵冬杏人為之使得紫菀良惡皂莢消石玄參畏貝母辛夷麻黄黄芩黄連黄耆青葙牡丹畏兔絲子防己殷孽為之使惡細辛畏萆薢殺雄黄毒黄環鳶尾為之使惡茯苓巴戟天覆盆為之使惡朝生雷丸丹參石南草五加皮為之使女宛畏鹵醎地榆得髮良惡麦門冬五加皮遠志為之使畏蛇皮玄參澤蘭防己為之使紫參畏辛夷雚菌得酒良畏鷄子雷丸荔實厚朴為之使惡葛根貫衆雚菌為之使狼牙蕪荑為之使惡地榆棗肌藜蘆黄連為之使反細辛芍藥五參惡大黄茹甘草為之使惡麦門冬白蘞代赭為之使反烏頭白芨紫石英為之使惡理石杏核人李子佔斯解狼毒毒蜚蠊得烏頭良惡麻黃淫羊藿薯蕷為之使虎掌蜀漆為之使惡莽草欒花決明為之使蕈草礬石為之使藎草畏鼠婦恒山畏玉札夏枯草土瓜為之使戈共畏玉札蜚蠊溲疏漏蘆為之使蟲獸上品龍骨得人參牛黃良畏石膏龍角畏乾漆蜀椒理石牛黃人參為之使惡龍骨地黃龍膽蜚蠊畏牛膝蜜惡芫花齊蛤蜂子畏黃芩芍藥牡蠣白膠得火良畏大黃阿膠得火良惡大黃牡蠣貝母為之使得甘草牛膝遠志蛇牀良惡麻黃茱萸辛夷蟲獸中品羖羊角兔絲子為之使犀角松脂為之使惡雚菌雷丸鹿茸麻勃為之使鹿角杜仲為之使伏翼莧實雲實為之使蝟皮得酒良畏桔梗麦門冬蜥蜴惡流黄斑猫蕪荑露蜂房惡乾薑丹參黄芩芍藥牡蠣桑螵蛸得龍骨治洩精畏旋復花蟲畏皂莢昌蒲蠐螬蜚蝱為之使惡附子海蛤蜀漆為之使畏狗膽甘遂芫花龜甲惡沙參蜚蠊鱉甲惡礬石鱓甲蜀漆為之使畏狗膽甘遂芫花烏賊魚骨惡白蘞白芨蟹殺莨菪毒白馬莖得火良蟲獸下品麋脂畏大黄蛇蜕畏慈石及酒火熬之良蜣蜋畏羊角石膏地膽惡甘草馬刀得水良天鼠屎惡白蘞白薇斑猫馬刀為之使畏巴豆丹參空青惡膚青通草果上大棗殺烏頭毒果下杏核得火良惡黄耆黄芩葛根胡粉畏蘘草解錫毒菜上冬葵子黄芩為之使葵根解蜀椒毒米食上麻蕡麻子畏牡蠣白薇惡茯苓米食中大豆黄卷惡五參龍膽得前胡烏喙杏人牡蠣良殺烏頭毒大麦食蜜為之使豉殺六畜胎子毒右一百四十一種有相制使其餘皆無立冬之日菊卷栢先生時為陽起石桑螵蛸凡十物使主二百草為之長立春之日木蘭夜干先生為茈胡半夏使主頭痛四十五節立夏之日蜚蠊先生為人參茯苓使主腹中七節保神守中立至之日豕首茱萸先生為牡蠣烏喙使主四支三十二節立秋之日白芷防風先生為細辛蜀椒使主胸背廾四節右此五條出藥對中義旨淵深非世所究雖莫可遵用而是主統領之本故亦載之也
