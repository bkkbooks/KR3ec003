凹凸巃嵸如羊角細强者是大觀卷八政和二七頁萆薢味苦甘平無毒主治腰背骨節風寒濕周痺惡瘡不瘳熱氣傷中恚怒陰痿失溺關節老血老人五緩一名赤節生真山谷二月八月採根暴乾薏苡為之使畏葵根大黃茈胡牡蠣前胡今處處有亦似菝葜而小異根大不甚有角節色小淺大觀卷八政和二一三頁菝葜味甘平溫無毒主治腰背寒痛風痺益血氣止小便利生山野二月八月採根暴乾此有三種大略根苗並相類菝葜莖紫短小多細剌小減萆薢而色深人用作飲大觀卷八政和二一四頁石韋味苦甘平無毒主治勞熱邪氣五癃閉不通利小便水道止煩下氣通膀胱滿補五勞安五藏去惡風益精氣一名石一名石皮用之去黃毛毛射人肺令人咳不可治生華陰山谷石上不聞水及人聲者良二月採葉陰乾滑石杏人射干為之使得昌蒲良蔓延石上生葉如皮故名石韋今處處有以不聞水聲人聲者為佳出建平者葉長大而厚大觀卷八政和二一二頁通草味辛甘平無毒主去惡蟲除脾胃寒熱通利九竅血脉關節令人不忘治脾疸常欲眠心煩噦出音聲治耳聾散癰腫諸結不消及金瘡惡瘡鼠瘻踒折齆鼻息肉墮胎去三蟲一名附支一名丁翁生石城山谷及山陽正月採枝陰乾今出近道繞樹藤生汁白莖有細孔兩頭皆通含一頭吹之則氣出彼頭者良或云即葍藤莖大觀卷八政和二頁瞿味苦辛寒無毒主治關格諸癃結小便不通出刺决癰腫明目去翳破胎墮子下閉血養腎氣逐膀胱邪逆止霍亂長毛髮一名巨一名大菊一名大蘭生太山川谷立秋採實陰乾蘘草牡丹為之使惡桑螵蛸今出近道一莖生細葉花紅紫赤可愛合子葉刈取之子頗似麥故名瞿麥此類乃有兩種一種微大花邊有叉丫未知何者是今市人皆用小者復一種葉廣相似而有毛花晚而甚赤案經云採實實中子至細燥熟便脫盡今市人惟合莖葉用而實正空殼無復子爾大觀卷八政和二二頁敗醬味苦鹹平微寒無毒主治暴熱火瘡赤氣疥瘙疽痔馬鞍熱氣除癰腫浮腫結熱風痺不足産後腹痛一名鹿一名鹿首一名馬草一名澤敗生江夏川谷八月採根暴乾出近道葉似豨蘞根形似茈胡氣如敗豆醬故以為名大觀卷八政和二一頁秦皮味苦微寒大寒無毒主治風寒濕痺洗洗寒氣除熱目中青翳白膜治男子少精婦人帶下小兒癎身熱可作洗目湯久服頭不白輕身皮膚光澤肥大有子一名岑皮一名石檀生廬川谷及宛朐二月八月採皮陰乾大戟為之使惡吳茱萸世云是樊皮而水漬以和墨書青色不脫徹青且亦殊薄恐不必爾世方惟以治目道術家亦有用處新修一三二頁大觀卷十三政和三二五頁白芷味辛溫無毒主治女人血閉陰腫寒熱風頭侵目淚出長肌膚潤澤可作面脂治風邪久渴吐嘔兩脅滿風痛頭眩目癢可作膏藥面脂潤顔色一名芳香一名白茝一名一名莞一名苻蘺一名澤芬葉名蒚麻可作浴湯生河東川谷下澤二月八月採根暴乾當歸為之使惡旋覆華今出近道處處有近下濕地東間甚多葉亦可作浴湯道家以此香浴去尸蟲又用合香也大觀卷八政和二六頁杜蘅味辛溫無毒主治風寒咳逆香人衣體生山谷三月三日採根熟洗暴乾根葉都似細辛惟氣小異爾處處有之方藥少用惟道家服之令人身衣香山海經云可治癭大觀卷八政和二一三頁杜若味辛微溫無毒主治胸脅下溫中風入腦户頭腫痛多涕淚出眩倒目止痛除口臭氣久服益精明目輕身令人不忘一名杜一名杜蓮一名白蓮一名白芩一名若芝生武陵川二月八月採根暴乾得辛夷細辛良惡茈胡前胡今處處有葉似薑而有文理根似高良薑而細味辛香又絶似旋復根殆欲相亂葉小異爾楚詞云山中人兮芳杜若此者一名杜蘅今復别有杜蘅不相似大觀卷七政和一八九頁蘗木味苦寒無毒主治五藏腸胃中結氣黃疸腸痔止泄痢女子漏下赤白陰陽蝕瘡治驚氣在皮間肌膚熱赤起目熱赤痛口瘡久服通神一名檀桓根名檀桓主心腹百病安魂魄不飢渴久服輕身延年通神生漢中山谷及永昌惡乾漆今出邵陵者輕薄色深為勝出東山者厚重而色淺其根於道家入木芝品今人不知取服之又有一種小樹狀如石榴其皮黃而苦世呼為子蘗亦主口瘡又一種小樹至多刺皮亦黃亦主口瘡新修一一頁大觀卷十二政和二九九頁木蘭味苦寒無毒主治身有去面熱赤皰酒齇惡風癩疾陰下癢濕明目治中風傷寒及癰疽水腫去臭氣一名一名杜蘭皮似桂而香生零陵山生太山十二月採皮陰乾零陵諸處皆有狀如楠樹皮甚薄而味辛香今益州有皮厚狀如厚朴而氣味為勝故蜀都賦云木蘭梫桂也今東人皆以山桂皮當之亦相類道家用合香亦好也新修一一三頁大觀卷十二政和三六頁白薇味苦鹹平大寒無毒主治暴中風身熱肢滿忽忽不知人狂惑邪氣寒熱酸疼溫瘧洗洗發作有時治傷中淋露下水氣利陰氣益精一名白幕一名薇草一名春草一名骨美久服利人生平原川三月三日採根陰乾惡黃耆乾薑乾漆山茱萸大棗近道處處有根狀似牛膝而短小爾方家用多治驚邪風狂疰病大觀卷八政和二一三頁葈耳實味苦甘溫葉味苦辛微寒有小毒主治風頭寒風濕周痺四肢拘攣痛惡肉死肌膝痛溪毒久服益氣耳目聰明强志輕身一名胡葈一名地葵一名葹一名常思生安陸川谷及實熟時採此是常思菜傖人皆食之以葉覆麥作黃衣者一名羊負來昔中國無此言從外國逐羊毛中來方用亦甚稀大觀卷八政和一九五頁茅根味甘寒無毒主治勞傷虛羸補中益氣除瘀血血閉寒熱利小便下五淋除客熱在腸胃止渴堅筋婦人崩中久服利人其苗主下水一名蘭根一名茹根一名地菅一名地筋一名兼杜生楚地山谷田野六月採根此即今白茅菅詩云露彼菅茅其根如如渣芹甜美服食此斷穀甚良世方稀用惟治淋及崩中爾大觀卷八政和二八頁百合味甘平無毒主治邪氣腹脹心痛利大小便補中益氣除臚脹痞滿寒熱通身疼痛及乳難喉痺腫止涕淚一名重箱一名重邁一名摩羅一名中逢花一名强瞿生荆州川谷二月八月採根暴乾近道處處有根如胡蒜數十片相纍人亦蒸煮食之乃言初是蚯蚓相纏結變作之世人皆呼爲强仇仇即瞿也聲之訛爾亦堪服食大觀卷八政和二四頁酸漿味酸平寒無毒主治熱煩滿定志益氣利水道産難吞其實立産一名醋漿生荆楚川澤及人家田園中五月採陰乾處處人家多有葉亦可食子作房房中有子如梅李大皆黃赤色小兒食之能除熱亦治黃病多效大觀卷八政和二一一頁淫羊藿味辛寒無毒主治陰痿絶傷莖中痛利小便益氣力强志堅筋骨消瘰癧赤癰下部有瘡洗出蟲丈夫久服令人無子一名剛生上郡陽山谷署預為之使服此使人好為陰陽西川北部有淫羊一日百遍合蓋食藿所致故名淫羊藿大觀卷八政和二六頁蠡實味甘平溫無毒主治皮膚寒熱胃中熱氣風寒濕痺堅筋骨令人嗜食止心煩滿利大小便長肌肉肥大久服輕身花葉去白蟲治喉痺多服令人溏泄一名荔實一名劇草一名三堅一名豕首生河東川谷五月採實陰乾方藥不復用世無識者天名精亦名豕首也大觀卷八政和二二頁枝子味苦寒大寒無毒主治五內邪氣胃中熱氣面赤酒皰齇鼻白癩赤癩瘡瘍治目熱赤痛胸中心大小腸大熱心中煩悶胃中熱氣一名木丹一名越桃生南陽川谷九月採實暴乾解玉支毒處處有亦兩三種小異以七道者為良經霜乃取之今皆入染用於藥甚稀玉支即躑躅萠也新修一三三頁大觀卷十三政和三二頁檳榔味辛溫無毒主治消穀逐水除痰澼殺三蟲去伏尸治寸白生南海此有三四種出交州形小而味甘廣州以南者形大而味澀核亦大尤大者名楮檳榔作藥皆用之又小者南人名蒳子世人呼為檳榔孫亦可食新修一三四頁大觀卷十三政和三一九頁合歡味甘平無毒主安五藏和心志令人歡樂無憂久服輕身明目得所欲生益州川嵇公養生論亦云合歡蠲忿萱草忘憂詩人又有萱草皆云即是今鹿葱而不入藥用至於合歡舉世無識之者當以其非治病之功稍見輕略遂致永謝猶如長生之法人罕敦尚亦為遺棄也洛陽華林苑中猶云合歡如丁林唯不來江左爾新修一三四頁大觀卷十三政和三三二頁衛矛味苦寒無毒主治女子崩中下血腹滿汗出除邪殺鬼毒蠱疰中惡腹痛去白蟲消皮膚風毒腫令陰中解一名鬼箭生霍山山谷八月採陰乾山野處處有其莖有三羽狀如箭羽世皆呼為鬼箭而為用甚稀用之削取皮及羽也新修一三六頁大觀卷十三政和三三一頁紫葳味酸微寒無毒主治婦人産崩中癥瘕血閉寒熱羸瘦養胎莖葉味苦無毒主痿蹶益氣一名陵苕一名芺華生西海川谷及山陽李云是瞿麥根今方用至少博物志云郝晦行華草於太行山北得紫葳華必當奇異今瞿麥華乃可愛而處處有不應乃在太行山且有樹其莖葉恐亦非瞿麥根詩云有苕之華郭云陵霄藤亦恐非也新修一三七頁大觀卷十三政和三二七頁蕪荑味辛平無毒主治五內邪氣散皮膚骨節中淫淫溫行毒去三蟲化食逐寸白散腹中嗢嗢喘息一名無姑一名生晉山川谷三月採實陰乾今唯出高麗狀如榆莢氣臭如彼人皆以作醬食之性殺蟲以置物中亦辟蛀但患其臭爾新修一三八頁大觀卷十三政和三二二頁紫草味苦寒無毒主治心腹邪氣五疸補中益氣利九竅通水道治腹腫脹滿痛以合膏療小兒瘡及面皶一名紫丹一名紫芺生碭山山谷及楚地三月採根陰乾今出襄陽多從南陽新野來彼人種之即是今染紫者方藥家都不復用博物志云平氏陽山紫草特好魏國以染色殊黑比年東山亦種色小淺於北者大觀卷八政和二九頁紫菀味苦辛溫無毒主治咳胸中寒熱結氣去蠱毒痿蹶安五藏治咳唾膿血止喘悸五勞體虛補不足小兒驚癎一名紫蒨一名青菀生房陵山谷及真定邯鄲二月三月採根陰乾欵冬為之使惡天雄瞿麥雷丸遠志畏茵陳蒿近道處處有生布地花亦紫本有白毛根甚柔細有白者名白菀不復用大觀卷八政和二九頁白鮮味苦鹹寒無毒主治頭黃疸咳逆淋瀝女子陰中腫痛濕痺死肌不可屈伸起止行步治四肢不安時行腹中大熱飲水欲走大呼小兒驚癎婦人産後餘痛生上谷川谷及宛朐四月五月採根陰乾惡桑螵蛸桔梗茯苓萆薢近道處處有以蜀中者為良世呼為白羊鮮氣息正似羊羶或名白羶大觀卷八政和二一頁白兔藿味苦平無毒主治蛇虺蜂蠆猘狗菜肉蠱毒鬼疰風疰諸大毒不可入口者皆消除之又去血可末著痛上立消毒入腹者煮飲之即解一名白葛生交州山谷此藥治毒莫之與敵而人不復用殊不可解都不聞有識之者想當似葛爾須别廣訪交州人未得委悉大觀卷七政和一九頁營實味酸溫微寒無毒主治癰疽惡瘡結肉跌筋敗瘡熱氣陰蝕不瘳利關節久服輕身益氣根止泄痢腹痛五藏客熱除邪逆氣疽癩諸惡瘡金瘡傷撻生肉復肌一名墻薇一名墻麻一名牛棘一名牛勒一名牆蘼一名山棘生零陵川谷及蜀郡八月九月採陰乾營實即是牆薇子以白花者為良根亦可煮釀酒莖葉亦可煮作飲大觀卷七政和一八二頁薇銜味苦平微寒無毒主治風濕痺歷節痛驚癎吐舌悸氣賊風鼠瘻癰腫暴癥逐水治痿蹶久服輕身明目一名麜一名承膏一名承肌一名無心一名無顛生漢中川澤及宛朐邯鄲七月採莖葉陰乾得秦皮良世用亦少大觀卷七政和一九頁井中苔及萍大寒主治漆瘡熱瘡水腫井中藍殺野葛巴豆諸毒廢井中多生苔萍及磚土間生雜草萊藍既解毒在井中者彌佳不應復别是一種名井中藍井底泥至冷亦治湯火灼瘡井華水又服煉法用之大觀卷九政和二三八頁王孫味苦平無毒主治五藏邪氣寒濕痹四肢疼酸膝冷痛治百病益氣吳名白功草楚名王孫齊名長孫一名黃孫一名黃昏一名海孫一名蔓延生海西川谷及汝南城郭垣下今方家皆呼名黃昏又云牡蒙市人亦少識者大觀卷九政和二三七頁爵牀味鹹寒無毒主治腰脊痛不得著牀俯仰艱難除熱可作浴湯生漢中川谷及田野大觀卷九政和二三八頁白前味甘微溫無毒主治胸脅逆氣咳嗽上氣此藥出近道似細辛而大色白易折主氣嗽方多用之大觀卷九政和二三三頁百部根微溫有小毒主治咳嗽上氣山野處處有根數十相連似天門冬而苦强亦有小毒火炙酒漬飲之治咳嗽亦主去蝨煮作湯洗牛犬蝨即去博物志云九真有一種草似百部但長大爾懸火上令乾夜取四五寸短切含咽汁勿令人知治暴嗽甚良名為嗽藥疑此是百部恐其土肥潤處是以長大爾大觀卷九政和二二五頁王瓜味苦寒無毒主治消渴內痺瘀血月閉寒熱酸疼益氣愈聾治諸邪氣熱結鼠瘻散癰腫留血婦人帶下不通下乳汁止小便數不禁逐四肢骨節中水治馬骨刺人瘡一名土瓜生魯地平澤田野及人家垣牆間三月採根陰乾今土瓜生籬院間亦有子熟時赤如彈丸大根今多不預乾臨用時乃掘取不堪入大方正單行小小爾禮記月令云王瓜生此之謂也鄭玄云菝葜殊為繆矣大觀卷九政和二一九頁薺苨味甘寒無毒主治解百藥毒根莖都似人參而葉小異根味甜絶能殺毒以其與毒藥共處而毒皆自然歇不正入方家用也大觀卷九政和二三三頁高良薑大溫無毒主治暴冷胃中冷逆霍亂腹痛出高良郡人腹痛不止但嚼食亦效形氣與杜若相似而葉如山薑大觀卷九政和二二四頁馬先蒿味苦平無毒主治寒熱鬼疰中風濕痺女子帶下病無子一名馬屎蒿生南陽川澤方云一名爛石草主惡瘡方藥亦不復用大觀卷九政和二三頁蜀羊泉味苦微寒無毒主治頭秃惡瘡熱氣疥瘙痂癬蟲治齲齒女子陰中內傷皮間實積一名羊泉一名羊飴生蜀郡川方藥亦不復用彼土人時有採識者大觀卷九政和二三七頁積雪草味苦寒無毒主治大熱惡瘡癰疽浸淫赤熛皮膚赤身熱生荆州川方藥亦不用想此草當寒冷爾大觀卷八政和二三三頁惡實味辛平無毒主明目補中除風傷根莖治傷寒寒熱汗出中風面腫消渴熱中逐水久服輕身耐老生魯山平澤方藥不復用大觀卷九政和二一八頁莎草根味甘微寒無毒主除胸中熱充皮毛久服利人益氣長鬚眉一名一名侯莎其實名緹生田野二月八月採方藥亦不復用離騷云青莎雜樹繁草霍靡古人為詩多用之而無識者乃有鼠蓑治體異此大觀卷九政和二三五頁大味甘溫主養精保血大薊主治女子赤白沃安胎止吐血衄鼻令人肥健五月採大薊是虎薊小薊是猫薊葉並多刺相似田野甚多方藥不復用是賤之故大薊根甚治血亦有毒大觀卷九政和二二一頁垣衣味酸無毒主治黃疸心煩咳逆血氣暴熱在腸胃金瘡內塞久服補中益氣長肌好顏色一名昔邪一名烏韭一名垣嬴一名天韭一名鼠韭生古垣牆陰或屋上三月三日採陰乾方藥不甚用世中少見有者離騷亦有昔邪或云即是天蒜爾大觀卷九政和二三六頁艾葉味苦微溫無毒主灸百病可作煎止下痢吐血下部瘡婦人漏血利陰氣生肌肉辟風寒使人有子一名冰臺一名醫草生田野三月三日採暴乾作煎勿令見風搗葉以灸百病亦止傷血汁又殺蛔蟲苦酒煎葉治癬甚良大觀卷九政和二一七頁牡蒿味苦溫無毒主充肌膚益氣令人暴肥血脉滿盛不可久服生田野五月八月採方藥不復用新修三六頁大觀卷三十政和五四六頁假蘇味辛溫無毒主治寒熱鼠瘻瘰癧生瘡結聚氣破散之下瘀血除濕痺一名鼠蓂一名薑芥生漢中川澤方藥亦不復用新修二七八頁大觀卷二十八頁政和五一三頁水萍味辛酸寒無毒主治暴熱身癢下水氣勝酒長鬚髮止消渴下氣以沐浴生毛髮久服輕身一名水花一名水白一名水蘇生雷澤池澤三月採暴乾此是水中大萍爾非今浮萍子藥録云五月有花白色即非今溝渠所生者楚王渡江所得非斯實也大觀卷九政和二一九頁海藻味苦鹹寒無毒主治癭瘤氣頸下核破散結氣癰腫癥瘕堅氣腹中上下鳴下十二水腫治皮間積聚暴留氣熱結利小便一名落首一名藫生東海池澤七月七日採暴乾反甘草生海島上黑色如亂髮而大少許葉大都似藻葉又有石帆狀如柏治石淋又有水松狀如松治溪毒大觀卷九政和二二一頁昆布味鹹寒無毒主治十二種水腫癭瘤聚結氣瘻瘡生東海今惟出高麗繩把索之如卷麻作黃黑色柔韌可食爾雅云綸似綸組似組東海有之今青苔紫菜皆似綸此昆布亦似組恐即是也凡海中菜皆治癭瘤結氣青苔紫菜輩亦然乾苔性熱柔苔甚冷也大觀卷九政和二二二頁葒草味鹹微寒無毒主治消渴去熱明目益氣一名鴻如馬蓼而大生水傍五月採實此類甚多今生下濕地極似馬蓼甚長大詩稱隰有游龍注云葒草郭景純云即籠古也大觀卷九政和二三四頁陟釐味甘大溫無毒主治心腹大寒溫中消穀强胃氣止泄痢生江南池澤此即南人作紙者方家惟合斷下藥用之大觀卷九政和二三七頁薰草味甘平無毒主明目止淚治泄精去臭惡氣傷寒頭痛上氣腰痛一名蕙草生下濕地三月採陰乾脫節者良世人呼鷲草狀如茅而香者為薰草人家頗種之藥録云葉如麻兩兩相對山海經云薰草麻葉而方莖赤花而黑實氣如靡蕪可以止癘今市人皆用鷲草此則非今詩書家多用蕙語而竟不知是何草尚其名而迷其實皆此類也新修三五九頁大觀卷三政和五四五頁乾薑味辛溫大熱無毒主治胸滿咳逆上氣溫中止血出汗逐風濕痺腸澼下痢寒冷腹痛中惡霍亂脹滿風邪諸毒皮膚間結氣止唾血生者尤良生薑味辛微溫主治傷寒頭痛鼻塞咳逆上氣止嘔吐久服去臭氣通神明生犍為川谷及荆州揚州九月採秦椒為之使殺半夏莨菪毒惡黃芩黃連天鼠屎乾薑今惟出臨海章安兩三村解作之蜀漢薑舊美荆州有好薑而並不能作乾者凡作乾薑法水淹三日畢去皮置流水中六日更去皮然後晒乾置甕中謂之釀也大觀卷八政和一九三頁五色符味苦微溫主治咳逆五藏邪氣調中益氣明目殺蝨青符白符赤符黑符黃符各隨色補其藏白符一名女木生巴郡山谷方藥皆不復用今人並無識者新修三六三頁大觀卷三政和五四六頁
