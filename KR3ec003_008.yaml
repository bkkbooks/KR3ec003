body:
  text: 卷第四草木中品當歸味甘辛溫大溫無毒主治咳溫瘧寒熱洗洗在皮膚中婦人漏下絶子諸惡瘡瘍金瘡煮飲之溫中止痛除客血內塞中風痓汗不出濕痺中惡客氣虛冷補五藏生肌肉一名乾歸生隴川谷二月八月採根陰乾惡茹畏昌蒲海藻牡蒙今隴西叨陽黑水當歸多肉少枝氣香名馬尾當歸稍難得西川北部當歸多根枝而細歷陽所出色白而氣味薄不相似呼為草當歸闕少時乃用之方家有云真當歸正謂此有好惡故也世用甚多道方時須爾大觀卷八政和一九九頁注防風味甘辛溫無毒主治大風頭眩痛惡風風邪目盲無所見風行周身骨節疼痺煩滿脅痛脅風頭面去來四肢攣急字乳金瘡內痙久服輕身葉主中風熱汗出一名銅藝一名茴草一名百枝一名屏風一名根一名百蜚生沙苑川澤及邯鄲琅琊上蔡二月十月採根暴乾得澤瀉藁本治風得當歸芍藥陽起石禹餘糧治婦人子藏風殺附子毒惡乾薑藜蘆白斂芫花郡縣無名沙苑今第一出彭城蘭陵即近琅琊者鬱州互市亦得之次出襄陽義陽縣界亦可用即近上蔡者唯實而脂潤頭節堅如蚯蚓頭者為好世用治風最要道方時用大觀卷七政和一七九頁注秦艽味苦辛平微溫無毒主治寒熱邪氣寒濕風痺肢節痛下水利小便治風無問久新通身攣急生飛鳥山谷二月八月採根暴乾昌蒲為之使飛鳥或是地名今出甘松龍洞蠶陵長大黃白色為佳根皆作羅文相交中多銜土用之熟破除去方家多作秦膠字與獨活治風常用道家不須爾大觀卷八政和二三注黃耆味甘微溫無毒主治癰疽久敗瘡排膿止痛大風癩疾五痔鼠瘻補虛小兒百病婦人子藏風邪氣逐五藏間惡血補丈夫虛損五勞羸瘦止渴腹痛泄利益氣利陰氣生白水者冷補其莖葉治渴及筋攣癰腫疽瘡一名戴糝一名戴椹一名獨椹一名草一名蜀脂一名百本生蜀郡山谷白水漢中二月十月採陰乾惡龜甲第一出隴西洮陽色黃白甜美今亦難得次用黑水宕昌者色白肌膚麁新者亦甘溫補又有蠶陵白水者色理勝蜀中者而冷補又有赤色者可作膏貼用消癰腫世方多用道家不須大觀卷七政和一七八頁注吳茱萸味辛溫大熱有小毒主溫中下氣止痛咳逆寒熱除濕血痺逐風邪開腠理去淡冷腹內絞痛諸冷實不消中惡心腹痛逆氣利五藏根殺三蟲根白皮殺蟯蟲治喉痺咳逆止泄注食不消女子經産餘血治白癬一名藙生上谷川谷九月九日採陰乾蓼實為之使惡丹參消石白堊畏紫石英此即今食茱萸禮記亦名藙而世中呼為蔱子當是不識藙字藙字似蔱字仍以相傳其根南行東行者為勝道家去三尸方亦用之新修一三一頁大觀卷十三政和三一八頁注黃芩味苦平大寒無毒主治諸熱黃疸腸澼泄痢逐水下血閉惡瘡疽蝕火傷治痰熱胃中熱小腹絞痛消穀利小腸女子血閉淋露下血小兒腹痛一名腐腸一名空腸一名內虛一名黃文一名經芩一名妬婦其子主腸澼膿血生秭川谷及冤句三月三日採根陰乾得厚朴黃連止腹痛得五味子牡蒙牡蠣令人有子得黃耆白斂赤小豆治鼠瘻山茱萸龍骨為之使惡葱實畏丹參牡丹藜蘆秭歸屬建平郡今第一出彭城鬱州亦有之圓者名子芩為勝破者名宿芩其腹中皆爛故名腐腸惟取深色堅實者為好世方多用道家不須大觀卷八政和二七頁注黃連味苦寒微寒無毒主治熱氣目痛眥傷淚出明目腸澼腹痛下痢婦人陰中腫痛五藏冷熱久下泄澼膿血止消渴大驚除水利骨調胃厚腸益膽治口瘡久服令人不忘一名王連生巫陽川谷二月八月採黃芩龍骨理石為之使惡菊花芫花玄參白鮮畏欵冬勝烏頭解巴豆毒巫陽在建平今西間者色淺而虛不及東陽新安諸縣最勝臨海諸縣者不佳用之當布裹挼去毛令如連珠世方多治下痢及渴道方服食長生大觀卷七政和一七五頁注五味子味酸溫無毒主益氣咳逆上氣勞傷羸瘦補不足强陰益男子精養五藏除熱生陰中肌一名會及一名玄及生齊山山谷八月採實陰乾蓯蓉為之使惡萎蕤勝烏頭今第一出高麗多肉而酸甜次出青州冀州味過酸其核並似猪腎又有建平者少肉核形不相似味苦亦良此藥多膏潤烈日暴之乃可搗篩道方亦須用大觀卷七政和一八五頁注决明子味鹹苦甘平微寒無毒主治青盲目淫膚赤白膜眼赤痛淚出治唇口青久服益精輕身生龍門川澤石決明生豫章十月十日採陰乾百日蓍實為之使惡大麻子龍門乃在長安北今處處有葉如茳芒子形似馬蹄呼為馬蹄決明用之當搗碎又别有草決明是萋蒿子在下品中也大觀卷七政和一八三頁注芍藥味苦酸平微寒有小毒主治邪氣腹痛除血痺破堅積寒熱疝瘕止痛利小便益氣通順血脉緩中散惡血逐賊血去水氣利膀胱大小腸消癰腫時行寒熱中惡腹痛腰痛一名白朮一名餘容一名犁食一名解倉一名鋋生中嶽及丘陵二月八月採根暴乾須丸為之使惡石斛芒消畏消石鱉甲小薊反藜蘆今出白山蔣山茅山最好白而長大餘處亦有而多赤赤者小利世方以止痛乃不減當歸道家亦服食之又煮石用之大觀卷八政和二一頁注桔梗味辛苦微溫有小毒主治胸脅腹滿腸鳴幽幽驚恐悸氣利五藏腸胃補血氣除寒熱風痺溫中消穀治喉咽痛下蠱毒一名利如一名房圖一名白藥一名梗草一名薺苨生嵩高山及冤句二八月採根暴乾節皮為之使得牡蠣遠志治恚怒得消石石膏治傷寒畏白及龍眼龍膽近道處處有葉名隱忍二三月生可煮食之桔梗治蠱毒甚驗世方用此乃名薺苨今别有薺苨能解藥毒所謂亂人參者便是非此桔梗而葉甚相似但薺苨葉下光明滑澤無毛為異葉生又不如人參相對者爾大觀卷十政和二四九頁注芎藭味辛溫無毒主治中風入腦頭寒痹筋攣緩急金瘡婦人血閉無子除腦中冷動面上遊風去來目淚出多涕唾忽忽如醉諸寒冷氣心腹堅痛中惡卒急腫痛脅風痛溫中內寒一名胡藭一名香果其葉名蘼蕪生武功川谷斜谷西嶺三月四月採根暴乾得細辛治金瘡止痛得牡蠣治頭風吐逆白芷為之使惡黃連今惟出歷陽節大莖細狀如馬銜謂之馬銜芎藭蜀中亦有而細人患齒根血出者含之多差苗名蘼蕪亦入藥别在下說世方多用道家時須爾胡居士云武功去長安二百里正長安西與扶風狄道相近斜谷是長安西嶺下去長安一百八十里山連接七百里大觀卷七政和一七四頁注藁本味辛苦溫微溫微寒無毒主治婦人疝瘕陰中寒腫痛腹中急除風頭痛長肌膚悅顏色辟霧露潤治風邪嚲曳金瘡可作沐藥面脂實主風流四肢一名鬼卿一名地新一名微莖生崇山山谷正月二月採根暴乾三十日成惡茹世中皆用芎藭根鬚其形氣乃相類而桐君藥録說芎藭苗似藁本論說花實皆不同所生處又異今東山别有藁本形氣甚相似惟長大爾大觀卷八政和二一二頁注麻黃味苦溫微溫無毒主治中風傷寒頭痛溫瘧發表出汗去邪熱氣止咳逆上氣除寒熱破癥堅積聚五藏邪氣緩急風脅痛字乳餘疾止好唾通腠理疏傷寒頭疼解肌泄邪惡氣消赤黑斑毒不可多服令人虛一名卑相一名龍沙一名卑鹽生晉地及河東川谷立秋採莖陰乾令青厚朴為之使惡辛夷石韋今出青州彭城榮陽中牟者為勝色青而多沫蜀中亦有不好用之折除節節止汗故也先煮一兩沸去上沫沫令人煩其根亦止汗夏月雜粉用之世用治傷寒解肌第一大觀卷八政和一九九頁注葛根味甘平無毒主治消渴身大熱嘔吐諸痺起陰氣解諸毒治傷寒中風頭痛解肌發表出汗開腠理治金瘡止痛脅風痛生根汁大寒治消渴傷寒壯熱葛穀主治下痢十歲已上白葛燒以粉瘡止痛斷血葉主金瘡止血花主消酒一名雞齊根一名鹿藿一名黃斤生汶山川谷五月採根暴乾殺野葛巴豆百藥毒即今之葛根人皆蒸食之當取入土深大者破而日乾之生者搗取汁飲之解溫病發熱其花併小豆花乾末服方寸匕飲酒不知醉南康廬陵間最勝多肉而少筋甘美但為用之不及此間爾五月五日日中時取葛根為屑治金瘡斷血為要藥亦治瘧及瘡至良大觀卷八政和一九六頁注前胡味苦微寒無毒主治痰滿胸脅中痞心腹結氣風頭痛去痰實下氣治傷寒寒熱推陳致新明目益精二月八月採根暴乾半夏為之使惡皂莢畏藜蘆前胡似茈胡而柔軟為治殆欲同而本經上品有茈胡而無此晚來醫乃用之亦有畏惡明畏惡非盡出本經也此近道皆有生下濕地出吳興者為勝大觀卷八政和二一頁注知母味苦寒無毒主治消渴熱中除邪氣肢體浮腫下水補不足益氣治傷寒久瘧煩熱脅下邪氣膈中惡及風汗內疸多服令人泄一名蚳母一名連母一名野蓼一名地參一名水參一名水浚一名貨母一名蝭母一名女雷一名女理一名兒草一名鹿列一名韭逢一名兒踵草一名東根一名水須一名沈燔一名一名昌支生河內川谷二月八月採根暴乾今出彭城形似菖蒲而柔潤葉至難死掘出隨生須枯燥乃止甚治熱結亦主瘧熱煩也大觀卷八政和二五頁注大青味苦大寒無毒主治時氣頭痛大熱口瘡三月四月採莖陰乾治傷寒方多用此本經又無今出東境及近道長尺許紫莖除時行熱毒為良大觀卷八政和二一四頁注貝母味辛苦平微寒無毒主治傷寒煩熱淋瀝邪氣疝瘕喉痹乳難金瘡風痙治腹中結實心下滿洗洗惡風寒目眩項直咳嗽上氣止煩熱渴出汗安五藏利骨髓一名空草一名藥實一名苦花一名苦菜一名商草一名勒母生晉地十月採根暴乾厚朴白薇為之使惡桃花畏秦椒礜石莽草反烏頭今出近道形似聚貝子故名貝母斷穀服之不飢大觀卷八政和二五頁注栝樓根味苦寒無毒主治消渴身熱煩滿大熱補虛安中續絶傷除腸胃中痼熱八疸身面黃脣乾口燥短氣通月水止小便利一名地樓一名果裸一名天瓜一名澤姑實名黃瓜主胸痺悅澤人面莖葉治中熱傷暑生弘農川谷及山陰地入土深者良生鹵地者有毒二月八月採根曝乾三十日成枸杞為之使惡乾薑畏牛膝乾漆反烏頭出近道藤生狀如土瓜而葉有叉毛詩云果贏之實亦施於宇其實今以雜作手膏用根入土六七尺大二三圍者服食亦用之大觀卷八政和一九七頁注丹參味苦微寒無毒主治心腹邪氣腸鳴幽幽如走水寒熱積聚破癥除瘕止煩滿益氣養血去心腹痼疾結氣腰脊强腳痺除風邪留熱久服利人一名郤一名赤參一名木羊乳生桐柏山川及太山五月採根暴乾畏鹹水反藜蘆此桐柏山是淮水源所出之山在義陽非江東臨海之桐柏也今近道處處有莖方有毛紫花時人呼為逐馬酒漬飲之治風痺道家時有用處時人服之多眼赤故應性熱今云微寒恐為謬矣大觀卷七政和一八三頁注厚朴味苦溫大溫無毒主治中風傷寒頭痛寒熱驚悸氣血痺死肌去三蟲溫中益氣消痰下氣治霍亂及腹痛脹滿胃中冷逆胸中嘔逆不止泄痢淋露除驚去留熱止煩滿厚腸胃一名厚皮一名赤朴其樹名榛其子名逐楊治鼠瘻明目益氣生交址冤句三月九月十月採皮陰乾乾薑為之使惡澤瀉寒水石消石今出建平宜都極厚肉紫色為好殼薄而白者不如用之削去上甲錯皮世方多用道家不須也新修一二五頁大觀卷十三政和三二四頁注竹葉芹竹葉味苦平大寒無毒主溢筋急惡瘍殺小蟲除煩熱風痓喉痺嘔逆根作湯益氣止渴補虛下氣消毒汁主治風痓痺實通神明輕身益氣生益州淡竹葉味辛平大寒主胸中痰熱咳逆上氣其瀝大寒治暴中風風痺胸中大熱止煩悶其皮茹微寒治嘔啘溫氣寒熱吐血崩中溢筋苦竹葉及瀝治口瘡目痛明目通利九竅竹笋味甘無毒主治消渴利水道益氣可