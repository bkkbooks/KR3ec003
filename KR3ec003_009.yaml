body:
  text: 卷第五草木下品大黃將軍味苦寒大寒無毒主血閉寒熱破癥瘕積聚留飲宿食蕩滌腸胃推陳致新通利水穀調中化食安和五藏平胃下氣除痰實腸間結熱心腹脹滿女子寒血閉脹小腹痛諸老血留結一名黃良生河西山谷及隴西二月八月採根火乾得芍藥黃芩牡蠣細辛茯苓治驚恚怒心下悸氣得消石紫石英桃人治女子血閉黃芩為之使無所畏今採益州北部汶山及西山者雖非河西隴西好者猶作紫地錦色味甚苦澀色至濃黑西川陰乾者勝北部日乾亦有火乾者皮小焦不如而耐蛀堪久此藥至徑利麁者便不中服最為世方所重道家時用以去痰疾非養性所須也將軍之號當取其駿快矣大觀卷十政和二四六頁蜀椒味辛溫大熱有毒主治邪氣咳逆溫中逐骨節皮膚死肌寒濕痺痛下氣除五藏六府寒冷傷寒溫瘧大風汗不出心腹留飲宿食止腸澼下痢泄精女子字乳餘疾散風邪瘕結水腫黃疸鬼疰蠱毒殺蟲魚毒久服之頭不白輕身增年開腠理通血脈堅齒髮調關節耐寒暑可作膏藥多食令人乏氣口閉者殺人一名巴椒一名盧藙生武都川谷及巴郡八月採實陰乾杏人為之使畏橐吾出蜀郡北部人家種之皮肉厚腹裹白氣味濃江陽晉原及建平間亦有而細赤辛而不香力勢不如巴郡巴椒有毒不可服而此為一名恐不爾又有秦椒黑色在上品中凡用椒皆火微熬之令汗出謂為汗椒令有力勢椒目冷利去水則入藥不得相雜爾新修一五四頁大觀卷十三政和三四頁蔓椒味苦溫無毒主治風寒濕歷節疼痛除四肢厥氣膝痛一名豕椒一名豬椒一名彘椒一名狗椒生雲中山川採莖根煮釀酒山野處處有世呼為樛似椒小不香爾一名豨殺可以蒸病出汗也新修一五九頁大觀卷十四政和三五八頁莽草味辛苦溫有毒主治風頭癰腫乳癰疝瘕除結氣疥瘙蟲疽瘡殺蟲魚治喉痺不通乳難頭風癢可用沐勿近目一名葞一名春草生上山谷及宛朐五月採葉陰乾上谷遠在幽州今東間諸山處處皆有葉青新烈者良人用搗以和米內水中魚吞即死浮出人取食之無妨莽草字亦有作字今世呼為草也新修一五五頁大觀卷十四政和三四六頁鼠李主治寒熱瘰癧瘡皮味苦微寒無毒主除身皮熱毒一名牛李一名鼠梓一名椑生田野採無時此條又附見今亦在副品限也新修一五七頁大觀卷十四政和三五三頁枇杷葉味苦平無毒主治卒啘不止下氣其葉不暇煮但嚼食亦差人以作飲乃小冷新修二五一頁大觀卷二十三政和四六九頁巴豆味辛溫生溫熟寒有大毒主治傷寒溫瘧寒熱破癥瘕結堅積聚留飲痰癖大腹水脹蕩練五藏六府開通閉寒利水穀道去惡肉除鬼蠱毒疰邪物殺蟲魚治女子月閉爛胎金創膿血不利丈夫陰殺斑貓毒可練餌之益血脈令人色好變化與鬼神通一名巴椒生巴川谷八月採實陰乾用之去心皮芫花為之使惡蘘草畏大黃黃連藜蘆出巴郡似大豆最能利人新者佳用之皆去心皮乃稱又熬令黃黑别搗如膏乃合和丸散爾道方亦有練餌法服之乃言神仙人吞一枚便欲死而鼠食之三年重卅斤物性乃有相耐如此爾新修一五二頁大觀卷十四政和三三九頁甘遂味苦甘寒大寒有毒主治大腹疝瘕腹滿面目浮腫留飲宿食破癥堅積聚利水穀道下五水散膀胱留熱皮中痞熱氣腫滿一名主田一名甘藁一名陵藁一名凌澤一名重澤生中山川二月採根陰乾瓜蒂為之使惡遠志反甘草中山在代郡先第一本出太山江東比來用京口者大不相似赤皮者勝白皮都下亦有名草甘遂殊惡蓋謂膺偽草耳非草石之草也燉煌卷子本新修卷十大觀卷十政和二五四頁葶藶味辛苦寒大寒無毒主治癥瘕積聚結氣飲食寒熱破堅逐邪通利水道下膀胱水腹留熱氣皮間邪水上出面目浮腫身暴中風熱痱癢利小腹久服令人虛一名大室一名大適一名丁歷一名蕇蒿生藁城平澤及田野立夏後採實陰乾得酒良榆皮為之使惡殭蠶石龍芮出彭城者最勝今近道亦有母即公薺子細黃至苦用之當熬也燉煌卷子本新修卷十大觀卷十政和二四八頁大戟味苦甘寒大寒有小毒主治蠱毒十二水腹滿急痛積聚中風皮膚疼痛吐逆頸腋癰腫頭痛發汗利大小腸一名邛巨生常山十二月採根陰乾反甘草畏菖蒲蘆草鼠屎近道處處有至猥賤也燉煌卷子本新修卷十大觀卷十政和二五六頁澤漆味苦辛微寒無毒主治皮膚熱大腹水氣四肢面目浮腫丈夫陰氣不足利大小腸明目輕身一名漆莖大戟苗也生太山川澤三月三日七月七日採莖葉陰乾小豆為之使惡署預是大戟苗生時摘葉有白汁故名澤漆亦能嚙人肉燉煌卷子本新修卷十大觀卷十政和二五六頁芫華味辛苦溫微溫有小毒主治咳逆上氣喉鳴喘咽腫短氣蠱毒鬼瘧疝瘕癰腫殺蟲魚消胸中痰水喜唾水腫五水在五藏皮膚及腰痛下寒毒肉毒久服令人虛一名去水一名毒魚一名杜芫其根名蜀桑根治疥瘡可用毒魚生淮源川谷三月三日採花陰乾決明子為之使反甘草近道處處有用之微熬不可近眼燉煌卷子本新修卷十大觀卷十四政和三六頁蕘華味苦辛寒微寒有毒主治傷寒溫瘧下十二水破積聚大堅癥瘕蕩滌腸胃中留癖飲食寒熱邪氣利水道治痰飲咳嗽生川谷及河南中牟六月採花陰乾中牟者平時惟從河上來形似芫花而極細白色比來隔絶殆不可得燉煌卷子本新修卷十大觀卷十政和二五七頁旋覆華味鹹甘溫微溫冷利有小毒主治結氣脅下滿驚悸除水去五藏間寒熱補中下氣消胸上痰結唾如膠漆心脅痰水膀胱留飲風氣濕痺皮間死肉目中眵利大腸通血脈益色澤一名金沸草一名盛椹一名戴椹其根主風濕生平澤川谷五月採花日乾二十日成出近道下濕地似菊花而大又别有旋蕌根乃出河南來北國亦有形似芎藭唯合旋蕌膏用之餘無正所入也非此旋覆華根也燉煌卷子本新修卷十大觀卷十政和二五一頁鈎吻味辛溫有大毒主治金創乳痓中惡風咳逆上氣水腫殺鬼疰蠱毒破癥積除腳膝痺痛四肢拘攣惡瘡疥蟲殺鳥獸一名野折之青煙出者名固活甚熱不入湯生傅高山谷及會稽東野秦鈎吻味辛治喉痺咽中塞聲變咳逆氣溫中一名除辛一名毒根生寒石山二月八月採半夏為之使惡黃芩五府中亦云鈎吻是野葛言其入口能鈎人喉吻或言吻作挽字牽挽人腹而絶之核事而言乃是兩物野葛是根狀如牡丹所生處亦有毒飛鳥不得集之今人用合膏服之無嫌鈎吻别是一草葉似黃精而莖紫當心抽花黃色初生既極類黃精故以為殺生之對也或云鈎吻是毛茛此本經及後説皆參錯不同未詳定云何又有一物名陰命赤色著木懸其子生山海中最有大毒入口即殺人燉煌卷子本新修卷十大觀卷十政和二五二頁蚤休味苦微寒有毒主治驚癎搖頭弄舌熱氣在腹中癲疾癰瘡陰蝕下三蟲去蛇毒一名蚩休生山陽川谷及宛朐大觀卷十一政和二七九頁虎杖根微溫主通利月水破留血癥結田野甚多此狀如大馬蓼莖斑而葉圓極主暴瘕酒漬根服之也大觀卷十三政和三三三頁石長生味鹹苦微寒有毒主治寒熱惡瘡大熱辟鬼氣不祥下三蟲一名丹草生咸陽山谷世中雖時有採者方藥亦不復用近道亦有是細細草葉花紫色爾南中多生石岩下葉似蕨而細如龍須草大黑如光漆高尺餘不與餘草雜也大觀卷十一政和二八頁鼠尾草味苦微寒無毒主治鼠瘻寒熱下痢膿血不止白花者主白下赤花者主赤下一名葝一名陵翹生平澤中四月採葉七月採花陰乾田野甚多人採作滋染皂又用治下瘻當濃煮取汁令可丸服之今人亦用作飲大觀卷十一政和二七三頁屋遊味甘寒主治浮熱在皮膚往來寒熱利小腸膀胱氣生屋上陰處八月九月採此瓦屋上青苔衣剝取煮服之大觀卷十一政和二八四頁牽牛子味苦寒有毒主下氣治腳滿水腫除風毒利小便作藤生花狀如扁豆黃色子作小房實黑色形如球子核比來服之以治腳滿氣急得小便利無不差此藥始出田野人牽牛易藥故以名之又有一種草葉上有三白點世因以名三白草其根以治腳下氣亦甚有驗大觀卷十一政和二六四頁狼毒味辛平有大毒主治咳逆上氣破積聚飲食寒熱水氣脅下積癖惡瘡鼠瘻疽蝕鬼精蠱毒殺飛鳥走獸一名續毒生秦山谷及奉高二月八月採根陰乾陳而沉水者良大豆為之使惡麥句薑秦亭在隴西亦出宕昌乃言止有數畝地生蝮蛇食其根故為難得亦用太山者今用出漢中及建平云與防葵同根類但置水中沉者便是狼毒浮者則是防葵世用稀亦難得是治腹內要藥爾大觀卷十一政和二六八頁鬼臼味辛溫微溫有毒主殺蠱毒鬼疰精物辟惡氣不祥逐邪解百毒治咳嗽喉結風邪煩惑失魄妄見去目中膚翳殺大毒不入湯一名爵犀一名馬目毒公一名九臼一名天臼一名解毒生九真山谷及二月八月採根畏垣衣鬼臼如射干白而味甘溫有毒治風邪鬼疰蠱毒九臼相連有毛者良一名九臼生山谷八月採陰乾又似鉤吻今馬目毒公如黃精根臼處似馬眼而柔潤鬼臼似射干朮輩有兩種出錢塘近道者味甘上有叢毛最勝出會稽吳興者乃大味苦無叢毛不如略乃相似而乖異毒公今方家多用鬼臼少用毒公不知此那復頓爾乖越也大觀卷十一政和二七一頁蘆根味甘寒主治消渴客熱止小便利當掘取甘辛者其露出及浮水中者並不堪用也大觀卷十一政和二七一頁甘蕉根大寒主治癰腫結熱本出廣州今都下東間並有根葉無異惟子不堪食爾根搗敷熱腫甚良又有五葉莓生人籬援間作藤世人呼為籠草取其根搗敷癰癤亦效大觀卷十一政和二七頁萹蓄味苦平無毒主治浸淫疥瘙疽痔殺三蟲治女子陰蝕生東萊山谷五月採陰乾處處有布地生花節間白葉細緑人亦呼為萹竹煮汁與小兒飲治蛔蟲有驗大觀卷十一政和二六八頁商陸味辛酸平有毒主治水脹尉除癰腫殺鬼精物治胸中邪氣水腫痿痺腹滿洪直五藏散水氣如人形者有神一名一名夜呼生咸陽川谷近道處處有方家不甚乾用治水腫切生根雜生鯉魚煮作湯道家乃散用及煎釀皆能去尸蟲見鬼神其實亦入神藥花名花尤良大觀卷十一政和二六三頁女青味辛平有毒主治蠱毒逐邪惡氣殺鬼溫瘧辟不祥一名雀瓢蛇銜根也生朱崖八月採陰乾若是蛇銜根不應獨生朱崖世用是草葉别是一物未詳孰是術云帶此屑一兩則疫癘不犯彌宜識真者大觀卷十一政和二七三頁白附子主治心痛血痺面上百病行藥勢生蜀郡三月採此物乃言出芮芮久絶世無復真者今人乃作之獻用大觀卷十一政和二七九頁天雄味辛甘溫大溫有大毒主治大風寒濕痺歷節痛拘攣緩急破積聚邪氣金創強筋骨輕身健行治頭面風去來疼痛心腹結積關節重不能行步除骨間痛長陰氣強志令人武勇力作不倦又墮胎一名白幕生少室山谷二月採根陰乾遠志為之使惡腐婢今採用八月中旬天雄似附子細而長者便是長者乃至三四寸許此與烏頭附子三種本並出建平謂為三建今宜都佷山最好謂為西建錢塘間者謂為東建氣力劣弱不相似故曰西水猶勝東白也其用灰殺之時有冰強者並不佳燉煌本新修卷十大觀卷十政和二四四頁烏頭味辛甘溫大熱有大毒主治中風惡風洗洗出汗除寒濕痺咳逆上氣破積聚寒熱消胸上痰冷食不下心腹冷疾臍間痛肩胛痛不可俯仰目中痛不可力視又墮胎其汁煎之名射罔殺禽獸射罔味苦有大毒治尸疰癥堅及頭中風痺痛一名奚毒一名即子一名烏喙烏喙味辛微溫有大毒主風濕丈夫腎濕陰囊癢寒熱歷節掣引腰痛不能步行癰腫膿結又墮胎生朗陵川正月二月採陰乾長三寸以上為天雄莽草為之使反半夏栝樓貝母白斂白及惡藜蘆今採用四月烏頭與附子同根春時莖初生有腦形似烏鳥之頭故謂之烏頭有兩岐共蒂狀如牛角名烏喙喙即鳥之口也亦以八月採搗榨莖取汁日煎為射罔獵人以傅箭射禽獸中人亦死宜速解之燉煌本新修卷十大觀卷十政和二四三頁附子味辛甘溫大熱有大毒主治風寒咳逆邪氣溫中金創破癥堅積聚血瘕寒濕踒躄拘攣膝痛不能行走治腳疼冷弱腰脊風寒心腹冷痛霍亂轉筋下痢赤白堅肌骨強陰又墮胎為百藥長生犍為山谷及廣漢八月採為附子春採為烏頭地膽為之使惡蜈蚣畏防風黑豆甘草黃耆人參烏韭附子以八月上旬採也八角者良凡用三建皆熱灰炮令折勿過焦惟薑附湯生用之世方動用附子皆須甘草或人參乾薑相配者正以制其毒故也燉煌本新修卷十大觀卷十政和二四一頁側子味辛大熱有大毒主治癰腫風痺歷節腰腳疼冷寒熱鼠瘻又墮胎此即附子邊角之大者脫取之昔時不用比來醫家以治腳氣多驗凡此三建世中乃是同根而本經分生三處當各有所宜故也方云少室天雄朗陵烏頭皆稱本土今則無别矣少室山連嵩高朗陵縣屬豫州汝南郡今在北國燉煌本新修卷十大觀卷十政和二四四頁羊躑躅味辛溫有大毒主治賊風在皮膚溫瘧惡毒諸痺邪氣鬼疰蠱毒一名玉支生太行山及淮南山三月採花陰乾今近道諸山皆有之花黃似鹿蔥羊誤食其葉躑躅而死故以為名不可近眼燉煌本新修卷十大觀卷十政和二五八頁茵芋味苦溫微溫有毒主治五藏邪氣心腹寒熱羸瘦如瘧狀發作有時諸關節風濕痺痛治久風濕走四肢腳弱一名芫草一名卑共生太山川谷三月三日採葉陰乾好者出彭城今近道亦有莖葉狀如莽草而細軟取用之皆連細莖方用甚稀惟以合治風酒散用之燉煌本新修卷十大觀卷十政和二五七頁射干味苦平微溫有毒主治咳逆上氣喉痺咽痛不得消息散結氣腹中邪逆食飲大熱治老血在心肝脾間咳唾言語氣臭散胸中熱氣久服令人虛一名烏扇一名烏蒲一名烏翣一名烏吹一名草薑生南陽川谷生田野三月三日採根陰乾此即是烏翣根庭壇多種之黃色亦治毒腫方多作夜干字今射亦作夜音乃言其葉是鳶尾而復有鳶頭此蓋相似爾恐非烏翣即其葉名矣又别有射干相似而花白莖長似射人之執竿者故阮公詩云射干臨層城此不入藥用根亦無塊惟有其質燉煌本新修卷十大觀卷十政和二五二頁鳶尾味苦平有毒主治蠱毒邪氣鬼疰諸毒破癥瘕積聚大水下三蟲治頭眩殺鬼魅一名烏園生九疑山谷五月採方家皆云是夜干苗無鳶尾之名主治亦異此當别一種物方亦有用鳶頭者即應是其根治體相似而本草不顯之燉煌本新修卷十大觀卷十政和二四六頁由跋根主治毒腫結熱本出始興今都下亦種之狀如烏翣而布地花紫色根似附子苦酒摩塗腫亦效不入餘藥大觀卷十政和二四六頁藥實根味辛溫無毒主治邪氣諸痺疼酸續絶傷補骨髓一名連木生蜀郡山谷採無時新修一六六頁大觀卷十四政和三五七頁皂莢味辛鹹溫有小毒主治風痺死肌邪氣風頭淚出下水利九竅殺鬼精物治腹脹滿消穀破咳嗽囊結婦人胞不落明目益精可為沐藥不入湯生雍州川谷及魯鄒縣如豬牙者良九月十月採莢陰乾青葙子為之使惡麥門冬畏空青人參苦參今處處有長尺二者良世人見其皆有蟲孔而未嘗見蟲形皆言不可近令人惡病殊不爾其蟲狀如草菜上青蟲莢微欲黑便出所以難見爾但取生者看自知之也新修一六六頁大觀卷十四政和三四一頁楝實味苦寒有小毒主治溫疾傷寒大熱煩狂殺三蟲疥瘍利小便水道根微寒治蛔蟲利大腸生荆山山谷處處有世人五月五日皆取花葉佩帶之云辟惡其根以苦酒磨塗疥甚良煮汁作糜食之去蛔蟲新修一六七頁大觀卷十四政和三四四頁柳華味苦寒無毒主治風水黃疸面熱黑痂疥惡瘡金創一名柳葉主馬疥痂瘡取煎煮以洗馬疥立愈又治心腹內血止痛實主潰癰逐膿血子汁治渴生琅琊川澤柳即今水楊也花熟隨風起狀如飛雪陳元正方以為譬者當用其未舒時子亦隨花飛正應水漬取汁爾柳花亦宜貼灸瘡皮葉治漆瘡爾新修一六八頁大觀卷十四政和三四三頁桐葉味苦寒無毒主治惡蝕瘡著陰皮主五痔殺三蟲治奔豚氣病華敷豬瘡飼豬肥大三倍生桐柏山谷桐樹有四種青桐莖皮青葉似梧桐而無子梧桐色白葉似青桐有子子肥亦可食白桐與岡桐無異惟有花子爾花三月舒黃紫色禮云桐始花者也岡桐無子是作琴瑟者今此云花便應是白桐白桐亦堪作琴瑟一名椅桐人家多植之新修一六九頁大觀卷十四政和三四九頁梓白皮味苦寒無毒主治熱去三蟲治目中患華葉搗敷豬瘡飼豬肥大易養三倍生河內山谷此即梓樹之皮梓亦有三種當用朴素不腐者方藥不復用葉治手腳水爛桐葉及此以肥豬之法未見其事應在商丘子養豬經中爾新修一七頁大觀卷十四政和三五一頁蜀漆味辛平微溫有毒主治瘧腹中癥堅痞結積聚邪氣蠱毒鬼疰治胸中邪結氣吐出之生江林山川谷生蜀漢中恆山苗也五月採葉陰乾栝樓為之使惡貫衆猶是恆山苗而所出又異者江林山即益州江陽山名故是同處爾彼人採仍縈結作丸得時燥者佳矣燉煌本新修卷十大觀卷十政和二五四頁半夏味辛平生微寒熟溫有毒主治傷寒寒熱心下堅下氣喉咽腫痛頭眩胸脹咳逆腸鳴止汗消心腹胸中膈痰熱滿結咳嗽上氣心下急痛堅痞時氣嘔逆消癰腫胎墮治痿黃悅澤面目生令人吐熟令人下用之湯洗令滑盡一名地文一名水玉一名守田一名示姑生槐里川谷五月八月採根暴乾射干為之使惡皂莢畏雄黃生薑乾薑秦皮龜甲反烏頭槐里屬扶風今第一出青州吳中亦有以肉白者為佳不厭陳久用之皆湯洗十許過令滑盡不爾戟人咽喉方中有半夏必須生薑者亦以制其毒故也燉煌本新修卷十大觀卷十政和二四五頁欵冬味辛甘溫無毒主治咳逆上氣善喘喉痺諸驚癎寒熱邪氣消渴喘息呼吸一名橐吾一名顆東一名虎鬚一名菟奚一名氐冬生常山山谷及上黨水傍十一月採花陰乾杏人為之使得紫菀良惡皂莢消石玄參畏貝母辛夷麻黃黃耆黃芩黃連青葙第一出河北其形如宿蒪未舒者佳其腹里有絲次出高麗百濟其花乃似大菊花次亦出蜀北部宕昌而並不如其冬月在冰下生十二月正月旦取之大觀卷九政和二二六頁牡丹味辛苦寒微寒無毒主治寒熱中風瘛瘲痙驚癎邪氣除癥堅瘀血留舍腸胃安五藏治癰瘡除時氣頭痛客熱五勞勞氣頭腰痛風噤癲疾一名鹿韭一名鼠姑生巴郡山谷及漢中二月八月採根陰乾畏菟絲子貝母大黃今東間亦有色赤者為好用之去心按鼠婦亦名鼠姑而此又同殆非其類恐字誤大觀卷九政和二二七頁防己味辛苦平溫無毒主治風寒溫瘧熱氣諸癎除邪利大小便治水腫風腫去膀胱熱傷寒寒熱邪氣中風手腳攣急止泄散癰腫惡結諸蝸疥癬蟲瘡通腠理利九竅一名解離文如車輻理解者良生漢中川谷二月八月採根陰乾殷孽為之使殺雄黃毒惡細辛畏萆薢今出宜都建平大而青白色虛軟者好黯黑冰強者不佳服食亦須之是治風水家要藥爾大觀卷八政和二二三頁赤赫味苦寒有毒主治痂瘍惡敗瘡除三蟲邪氣生益州川谷二月八月採新修三六五頁大觀卷三十政和五四六頁黃環味苦平有毒主治蠱毒鬼疰鬼魅邪氣在藏中除咳逆寒熱一名凌泉一名大就生蜀郡山谷三月採根陰乾鳶尾為之使惡茯苓防己似防己亦作車輻理解蜀都賦所云青珠黃環者或云是大戟花定非也世用甚希市人鮮有識者新修一五頁大觀卷十四政和三五二頁巴戟天味辛甘微溫無毒主治大風邪氣陰痿不起強筋骨安五藏補中增志益氣治頭面遊風小腹及陰中相引痛下氣補五勞益精利男子生巴郡及下邳山谷二月八月採根陰乾覆盆子為之使惡朝生雷丸丹參今亦用建平宜都者狀如牡丹而細外赤內黑用之打去心大觀卷六政和一六五頁石南草味辛苦平有毒主養腎氣內傷陰衰利筋骨皮毛治腳弱五藏邪氣除熱女子不可久服令思男實殺蠱毒破積聚逐風痺一名鬼目生華陰山谷二月四月採葉八月採實陰乾五加為之使今廬江及東間皆有葉狀如枇杷葉方用亦稀新修一五一頁大觀卷十四政和三五一頁女菀味辛溫無毒主治風寒洗洗霍亂泄痢腸鳴上下無常處驚癎寒熱百疾治肺傷咳逆出汗久寒在膀胱支滿飲酒夜食發病一名白菀一名織女菀一名生漢中川谷或山陽正月二月採陰乾畏鹵鹹比來醫方都無復用之市人亦少有便是欲絶别復有白菀似紫菀非此之别名也大觀卷八政和二三七頁地榆味苦甘酸微無毒主治婦人乳痓痛七傷帶下十二病止痛除惡肉止汗治金瘡止膿血諸瘻惡瘡熱瘡消酒除消渴補絶傷産後內塞可作金瘡膏生桐柏及宛朐山谷二月八月採根暴乾得髮良惡麥門冬今近道處處有葉似榆而長初生布地而花子紫黑色如豉故名玉豉一莖長直上根亦入釀酒道方燒作灰能爛石也乏茗時用葉作飲亦好大觀卷九政和二二頁五加皮味辛苦溫微寒無毒主治心腹疝氣腹痛益氣治躄小兒不能行疽瘡陰蝕男子陰痿囊下濕小便餘瀝女人陰癢及腰脊痛兩腳疼痺風弱五緩虛羸補中益精堅筋骨強志意久服輕身耐老一名豺漆一名豺節五葉者良生漢中及宛朐五月七月採莖十月採根陰乾遠志為之使畏蛇脫皮玄參今近道處處有東間彌多四葉者亦好煮根莖釀酒至益人道家用此作灰亦以煮石與地榆並有祕法加字或作家字者也新修一七頁大觀卷十二政和三一頁澤蘭味苦甘微溫無毒主治乳婦內衄中風餘疾大腹水腫身面四肢浮腫骨節中水金瘡癰腫瘡膿産後金瘡內塞一名虎蘭一名龍棗一名虎蒲生汝南諸大澤傍三月三日採陰乾防己為之使今處處有多生下濕地葉微香可煎油或生澤傍故名澤蘭亦名都梁香可作浴湯人家多種之而葉小異今山中又有一種甚相似莖方葉小強不甚香既云澤蘭又生澤傍故山中者為非而藥家乃採用之大觀卷九政和二二二頁紫參味苦辛寒微寒無毒主治心腹積聚寒熱邪氣通九竅利大小便治腸胃大熱唾血衄血腸中聚血癰腫諸瘡止渴益精一名一名衆戎一名童腸一名馬行生河西及宛朐山谷三月採根火炙使紫色畏辛夷今方家皆呼為牡蒙用之亦少大觀卷八政和二一一頁蛇全味苦微寒無毒主治驚癎寒熱邪氣除熱金瘡疽痔鼠瘻惡瘡頭瘍治心腹邪氣腹痛濕痺養胎利小兒一名蛇銜生益州山八月採陰乾即是蛇銜蛇銜有兩種並生石上當用細葉黃花者處處有之亦生黃土地不必皆生石上也大觀卷十政和二五三頁草蒿味苦寒無毒主治疥瘙痂癢惡瘡殺蝨留熱在骨節間明目一名青蒿一名方潰生華陰川澤處處有之即今青蒿人亦取雜香菜食之大觀卷十政和二五頁雚菌味鹹甘平微溫有小毒主治心痛溫中去長蟲白瘲蟯蟲蛇螫毒癥瘕諸蟲疽蝸去蛔蟲寸白惡瘡一名雚蘆生東海池澤及渤海章武八月採陰乾得酒良畏雞子出北來此亦無有形狀似菌云鸛屎所化生一名鸛菌單末之豬肉臛和食可以遣蛔蟲大觀卷十政和二五五頁麕舌味辛微溫無毒主治霍亂腹痛吐逆止煩生水中五月採暴乾生小小水中今人五月五日採陰乾以治霍亂甚良方也大觀卷三十政和五四六頁雷丸味苦鹹寒微寒有小毒主殺三蟲逐毒氣胃中熱利丈夫不利女子作膏摩除小兒百病逐邪氣惡風汗出除皮中熱結積聚蠱毒白蟲寸白自出不止久服令陰痿一名雷矢一名雷實赤者殺人生石城山谷生漢中土中八月採根暴乾荔實厚朴為之使惡葛根今出建平宜都間纍纍相連如丸本經云利丈夫别録云久服陰痿於事相反新修一六頁大觀卷十四政和三四七頁貫衆味苦微寒有毒主治腹中邪熱諸毒殺三蟲去寸白破癥瘕除頭風止金創花治惡瘡令人泄一名貫節一名貫渠一名百頭一名虎卷一名扁苻一名伯萍一名樂藻此謂草鵄頭生玄山谷及宛朐又少室二月八月採根陰乾雚菌為之使近道亦有葉如大蕨其根形色毛芒全似老鵄頭故呼為草鵄頭也燉煌本新修卷十大觀卷十政和二五七頁青葙子味苦微寒無毒主治邪氣皮膚中熱風瘙身癢殺三蟲惡瘡疥蝨痔蝕下部瘡其子名草決明治脣口青一名草蒿一名萋蒿生平谷道傍三月采莖葉陰乾五月六月採子處處有似麥柵花其子甚細後又有草蒿别本亦作草藁今主治殊相類形名又相似極多足為疑而實兩種也燉煌本新修卷十大觀卷十政和二五五頁牙子味苦酸寒有毒主治邪氣熱氣疥瘙惡瘍瘡痔去白蟲一名狼牙一名狼齒一名狼子一名犬牙生淮方川谷及宛朐八月採根暴乾中濕腐爛生衣者殺人蕪荑為之使惡地榆棗肌近道處處有其根牙亦似獸之牙齒也燉煌本新修卷十大觀卷十政和二五八頁藜蘆味辛苦寒微寒有毒主治蠱毒咳逆泄痢腸澼頭瘍疥瘙惡瘡殺諸蟲毒去死肌治啘逆喉痺不通鼻中息肉馬刀爛瘡不入湯一名蔥苒一名蔥菼一名山蔥生太山山谷三月採根陰乾黃連為之使反細辛芍藥五參惡大黃近道處處有本下極似蔥而多毛用之止剔取根微炙之燉煌卷子本新修卷十大觀卷十政和二五一頁赭魁味甘平無毒主治心腹積聚除三蟲生山谷二月採狀如小芋子肉白皮黃近道亦有燉煌本新修卷十大觀卷十政和二五七頁及巳味苦平有毒主治諸惡瘡疥痂瘻蝕及牛馬諸瘡今人多用以合治疥膏甚驗也燉煌本新修卷十大觀卷十政和二五八頁連翹味苦平無毒主治寒熱鼠瘻瘰癧癰腫惡瘡癭瘤結熱蠱毒去白蟲一名異翹一名蘭華一名折根一名軹一名三廉生太山谷二月採陰乾處處有今用莖連花實也大觀卷十一政和二七五頁白頭翁味苦溫無毒有毒主治溫瘧狂易寒熱癥瘕積聚癭氣逐血止痛治金瘡鼻衄一名野丈人一名胡王使者一名奈何草生高山山谷四月採處處有近根處有白茸狀似人白頭故以為名方用亦治毒痢大觀卷十一政和二七頁茹味辛酸寒微寒有小毒主蝕惡肉敗瘡死肌殺疥蟲排膿惡血除大風熱氣善忘不樂去熱痺破癥瘕除息肉一名屈據一名離婁生代郡川谷五月採根陰乾黑頭者良甘草為之使惡麥門冬今第一出高麗色黃初斷時汁出凝黑如漆故云漆頭次出近道名草茹色白皆燒鐵爍頭令黑以當漆頭非真也葉似大戟花黃二月便生根亦治瘡大觀卷十一政和二七六頁白斂味苦甘平微寒無毒主治癰腫疽瘡散結氣止痛除熱目中赤小兒驚癎溫瘧女子陰中腫痛下赤白殺火毒一名菟核一名白草一名白根一名崑崙生衡山山谷二月八月採根暴乾代赭為之使反烏頭近道處處有之作藤生根如白芷破片以竹穿之日乾生取根搗敷癰腫亦效燉煌本新修卷十大觀卷十政和二五五頁白及味苦辛平微寒無毒主治癰腫惡瘡敗疽傷陰死肌胃中邪氣賊風鬼擊痱緩不收除白癬疥蟲一名甘根一名連及草生川谷及宛朐及越山紫石英為之使惡理石畏李核杏人近道處處有之葉似杜若根形似菱米節間有毛方用亦稀可以作糊大觀卷十政和二五五頁占斯味苦溫無毒主治邪氣濕痺寒熱疽瘡除水堅積血癥月閉無子小兒躄不能行諸惡瘡癰腫止腹痛令女人有子一名炭皮生太山山谷採無時解狼毒毒李云是梓樹上寄生樹大銜枝在肌肉今人皆以胡桃皮當之非是真也案桐君録云生上洛是木皮狀如厚朴色似桂白其理一縱一橫今市人皆削乃似厚朴而無正縱橫理不知此復是何物莫測真假何者為是也新修三六六頁大觀卷三政和五四六頁蜚廉味苦平無毒主治骨節熱脛重酸疼頭眩頂重皮間邪風如蜂螫針剌魚子細起熱瘡癰疽痔濕痺止風邪咳嗽下乳汁久服令人身輕益氣明目不老可煮可乾一名漏蘆一名天薺一名伏豬一名飛輕一名伏兔一名飛雉一名木禾生河內川澤正月採根七月八月採花陰乾得烏頭良惡麻黃處處有極似苦芺惟葉下附莖莖有皮起似箭羽葉又多刻缺花紫色世方殆無用而道家服其枝莖可得長生又入神枕方今既别有漏蘆則非此别名爾大觀卷七政和一八四頁虎掌味苦溫微寒有大毒主治心痛寒熱結氣積聚伏梁傷筋痿拘緩利水道除陰下濕風眩生漢中山谷及宛朐二月八月採陰乾蜀漆為之使惡莽草近道亦有極似半夏但皆大四邊有子如虎掌今用多破之或三四片爾方藥亦不正用也燉煌本新修卷十大觀卷十政和二四六頁莨菪味苦甘寒有毒主治齒痛出蟲肉痺拘急使人健行見鬼治癲狂風癎顛倒拘攣多食令人狂走久服輕身走及奔馬強志益力通神一名橫唐一名行唐生海濱川谷及雍州五月採子今處處亦有子形頗似五味核而極小惟入治癲狂方用尋此乃不可多食過劑爾久服自無嫌通神健行足為大益而仙經不見用之今方家多作莨蓎也燉煌本新修卷十大觀卷十政和二四九頁欒華味苦寒無毒主治目痛泣傷眥消目腫生漢中川谷五月採決明為之使新修一五八頁大觀卷十四政和三五八頁杉材微溫無毒主治漆瘡削作柿煮以洗漆瘡無不即差又有鼠查生去地高尺餘許煮以洗漆多差又有漆姑葉細細多生石邊亦治漆瘡其雞子及蟹並是舊方新修一五八頁大觀卷十四政和三五五頁楠材微溫主治霍亂吐下不止削作柿煮服之窮無他藥用此新修一五九頁大觀卷十四政和三五九頁棐實味甘主治五痔去三蟲蠱毒鬼疰生永昌今出東陽諸郡食其子乃言治寸白蟲不復有餘用不入藥方疑此與後蟲品彼子治説符同新修一五九頁大觀卷十四政和三五六頁紫真檀木味鹹微寒主治惡毒風毒世人磨以塗風毒諸腫亦效然不及青木香又主金創止血亦治淋用之新修一七四頁大觀卷十四政和三五四頁淮木味苦平無毒主治久咳上氣傷中虛羸補中益氣女子陰漏下赤白沃一名百歲城中木生晉陽平澤方藥亦不復用新修三六五頁大觀卷三政和五四六頁别羇味苦微溫無毒主治風寒濕痺身重四肢疼酸寒邪歷節痛一名别枝一名别一名龞羇生藍田川谷二月八月採方家時有用處今世亦絶爾也新修三六頁大觀卷三十政和五四五頁石下長卿味鹹平有毒主治鬼疰精物邪惡氣殺百精蠱毒老魅注易亡走啼哭悲傷恍惚一名徐長卿生隴西池澤山谷此又名徐長卿恐是爾方家無用此處世中皆不復識别也新修三六一頁大觀卷三十政和五四六頁羊桃味苦寒有毒主治熛熱身暴赤色風水積聚惡痬除小兒熱去五藏五水大腹利小便益氣可作浴湯一名鬼桃一名羊腸一一名御戈一名銚戈生山林川谷及生田野二月採陰乾山野多有甚似家桃又非山桃子小細苦不堪噉花甚赤詩云隰有萇楚者即此也方藥亦不復用大觀卷十一政和二七三頁羊蹄味苦寒無毒主治頭秃疥瘙除熱女子陰蝕浸淫殺蟲一名東方宿一名連蟲陸一名鬼目一名蓄生陳留川澤今人呼名秃菜即是蓄音之訛詩云言採其蓄又一種極相似而味酸呼為酸模根亦治疥也大觀卷十一政和二六七頁鹿藿味苦平無毒主治蠱毒女子腰腹痛不樂腸癰瘰癧瘍氣生汶山山谷方藥不復用人亦罕識葛根之苗又一名鹿藿大觀卷十一政和二七九頁練石草味苦寒無毒主治五癃破石淋膀胱中結氣利水道小便生南陽川澤一名爛石草又云即馬矢蒿新修三六二頁大觀卷三政和五四六頁牛扁味苦微寒無毒主治身皮瘡熱氣可作浴湯殺牛蝨小蟲又治牛病生桂陽川谷今人不復識此牛疫代代不無用之既要牛醫家應用而亦無知者大觀卷十一政和二八二頁陸英味苦寒無毒主治骨間諸痺四肢拘攣疼酸膝寒痛陰痿短氣不足腳腫生熊耳川谷及冤句立秋採大觀卷十一政和二八頁菌草味鹹平無毒主養心氣除心溫溫辛痛浸淫身熱可作鹽生淮南平澤七月採礬石為之使新修三六二頁大觀卷三政和五四六頁藎草味苦平無毒主治久咳上久寒驚悸痂疥白秃瘍氣殺皮膚小蟲可以染黃作金色生青衣川谷九月十月採畏鼠婦青衣在益州西大觀卷十一政和二八一頁恆山味苦辛寒微寒有毒主治傷寒寒熱熱發溫瘧鬼毒胸中痰結吐逆治鬼蠱往來水脹灑灑惡寒鼠瘻一名互草生益州川谷及漢中八月採根陰乾畏玉札出宜都建平細實黃者呼為雞骨恆山用最勝燉煌本新修卷十大觀卷十政和二五三頁夏枯草味苦辛寒無毒主治寒瘰癧鼠瘻頭瘡破癥散癭結氣腳腫濕痺輕身一名夕句一名乃東一名燕面生蜀郡川四月採土瓜為之使大觀卷十一政和二八三頁蘘草味甘苦寒無毒主治溫瘧寒熱酸嘶邪氣辟不祥生淮南山谷新修三六三頁大觀卷三十政和五四六頁戈共味苦寒無毒主治驚氣傷寒腹痛羸瘦皮中有邪氣手足寒無色生益州山谷畏玉札蜚蠊新修三六二頁大觀卷三政和五四六頁烏韭味甘寒無毒主治利小腸膀胱氣治黃疸金瘡內塞補中益氣好顏色生山谷石上垣衣亦名烏韭而為治異非是此種類也大觀卷十一政和二七八頁溲疏味辛苦寒微寒無毒主治身皮膚中熱除邪氣止遺溺通利水道除胃中熱下氣可作浴湯一名巨骨生掘耳川四月採漏蘆為之使李云溲疏一名楊櫨一名牡荆一名空疏皮白中空時時有節子似枸杞子冬月熟色赤味甘苦末代乃無識者此實真也非人籬援之楊櫨也李當之此説於論牡荆乃不為大乖而濫引溲疏恐斯誤矣又云溲疏與空疏亦不同掘耳疑應作熊耳熊耳山名而都無掘耳之號也新修一六一頁大觀卷十四政和三五三頁釣樟根皮主治金創止血出桂陽邵陵諸處亦呼作鳥樟方家乃不用而世人多識此刮根皮屑以治金創斷血易合甚驗又有一草似狼牙氣辛臭名地菘人呼為劉草五月五日採乾作屑亦主治金瘡言劉昔採用之爾新修一六頁大觀卷十四政和三四九頁櫸樹皮大寒主治時行頭痛熱結在腸胃山中處處有皮似檀槐葉如櫟槲人亦多識用之削取裹皮去上甲煎服之夏日作飲云熱新修一六三頁大觀卷十四政和三四八頁釣藤微寒無毒主治小兒寒熱十二驚癎出建平亦作弔藤字惟治小兒不入餘方新修一六五頁大觀卷十四政和三五七頁苦芺微寒主治面目通身漆瘡處處有之傖人取莖生食之五月五日採暴乾燒作灰以治金瘡甚驗大觀卷十一政和二八二頁馬鞭草主治下部瘡村墟陌甚多莖似細辛花紫色葉微似蓬蒿也大觀卷十一政和二六九頁馬勃味辛平無毒主治惡瘡馬疥一名馬庀生園中久腐處世人呼為馬勃紫色虛軟狀如狗肺彈之粉出敷諸瘡用之甚良也大觀卷十一政和二八五頁雞腸草主治毒腫止小便利人家園庭亦有此草小兒取挼汁以捋蜘蛛網至黏可掇蟬治蠼螋溺也大觀卷二十九政和五二一頁蛇莓汁大寒主治胸腹大熱不止園野亦多子赤色極似莓而不堪噉人亦無服此為藥者治溪毒射工傷寒大熱甚良大觀卷十一政和二七六頁苧根寒主治小兒赤丹其漬苧汁治渴即今績苧爾又有山苧亦相似可入用也大觀卷十一政和二七頁孤根大寒主治腸胃痼熱消渴止小便利孤根亦如蘆根冷利復甚也大觀卷十一政和二六七頁狼跋子有小毒主治惡瘡蝸疥殺蟲魚出交廣形扁扁爾搗以雜米投水中魚無大小皆浮出而死人用苦酒摩治疥亦效大觀卷十一政和二八四頁蒴藋味酸溫有毒主治風瘙癮疹身癢濕痺可作浴湯一名蓳草一名芨生田野春夏採葉秋冬採莖根田野墟村中甚多絶治風痺癢痛多用薄洗不堪入服亦有酒漬根稍飲之者大觀卷十一政和二六五頁船船味酸無毒主下氣止煩滿可作浴湯藥色黃生蜀郡立秋取方藥不用世人無識者也大觀卷三十政和五四六頁敗船茹平主治婦人崩中吐痢血不止此是大艑步典切他盍切刮竹茹以挰直萌切漏處者取乾煮之亦燒作屑服之大觀卷十一政和二八四頁敗蒲席平主治筋溢惡瘡燒之蒲席惟船家用狀如蒲帆爾人家所用席皆是莞草而薦多是蒲方家有用也大觀卷十一政和二七五頁敗天公平主治鬼疰精魅此是人所戴竹笠之敗者也取上竹燒酒服之大觀卷十一政和二八六頁鼠姑味苦平寒無毒主治咳逆上氣寒熱鼠瘻惡瘡邪氣一名生丹水今人不識此鼠姑乃牡丹又名鼠姑罔知孰是大觀卷三十政和五四六頁
