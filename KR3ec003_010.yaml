body:
  text: 卷第六蟲獸三品上品龍骨味甘平微寒無毒主治心腹鬼疰精物老魅咳逆泄痢膿血女子漏下癥瘕堅結小兒熱氣驚癎治心腹煩滿四肢痿枯汗出夜卧自驚恚怒伏氣在心下不得喘息腸癰內疽陰蝕止汗小便利溺血養精神定魂魄安五藏白龍骨治夢寤泄精小便泄精龍齒主治小兒大人驚癎癲疾狂走心下結氣不能喘息諸痙殺精物治小兒五驚十二癎身熱不可近人大人骨間寒熱又殺蠱毒得人參牛黃良畏石膏角主治驚癎瘛瘲身熱如火腹中堅及熱泄畏乾漆蜀椒理石久服輕身通神明延年生晉地川及太山巖水岸土穴石中死龍處採無時今多出益州梁州間巴中亦有骨欲得脊腦作白地錦文舐之著舌者良齒小強猶有齒形角強而實又有龍腦肥軟亦斷痢云皆是龍蛻非實死也比來巴中數得龍胞吾自親見形體具存云治産難産後餘疾正當末服之新修一八一頁大觀卷十六政和三六八頁注牛黃味苦平有小毒主治驚癎寒熱熱盛狂痓除邪逐鬼治小兒百病諸癎熱口不開大人狂癲又墮胎久服輕身增年令人不忘生晉地平澤生於牛得之即陰乾百日使時燥無令見日月光人參為之使得牡丹昌蒲利耳目惡龍骨地黃龍膽蜚蠊畏牛膝舊云神牛出人鳴吼者有之伺其出角上以盆水承而吐之即墮落水中今人多皆就膽中得之爾多出梁益一子如雞子黃大相重疊藥中之貴莫復過此一子起二三分好者直五六千至一萬也世人多假作甚相似唯以磨爪甲舐拭不脫者是真之新修一八三頁大觀卷十六政和三七頁注麝香味辛溫無毒主辟惡氣殺鬼精物溫瘧蠱毒癎痓去三蟲治諸凶邪鬼氣中惡心腹暴痛脹急痞滿風毒婦人産難墮胎去面目中膚翳久服除邪不夢寤魘寐通神仙生中臺川谷雍州山中春分取之生者益良麝形似獐恆食柏葉又噉蛇五月得香往往有蛇皮骨故麝香治蛇毒今以蛇蛻皮裹麝香彌香則是相使也其香正在麝陰莖前皮內别有膜裹之今出隨郡義陽晉熙諸蠻中者亞之今出其形貌直如粟人又云是卵不然也香多被破雜蠻猶差於益州益州香形扁仍以皮膜裹之一子真者分糅作三四子刮取其血膜亦雜以餘物大都亦有精麁破看一片有毛在裹中者為勝彼人以為志若於諸羌夷中得者多真好燒當門沸起良久亦好今唯得活者自看取之必當全真爾生香人云是其精溺凝作之殊不爾麝夏月食蛇蟲多至寒香滿入春患急痛自以腳剔出著屎溺中覆之皆有常處人有遇得乃至一斗五升也用此香乃勝殺取者帶麝非但香亦辟惡以真者一子置頭間枕之辟惡夢及尸疰鬼氣新修一八四頁大觀卷十六政和三六九頁注人乳汁主補五藏令人肥白悅澤張倉恆服人乳故年百歲餘肥白如瓠新修一八六頁大觀卷十五政和三六四頁髮味苦溫小寒無毒主治五癃關格不得小便利水道治小兒癎大人痓仍自還神化合雞子黃煎之消為水治小兒驚熱下痢李云是童男髮神化之事未見别方今世中嫗母為小兒作雞子煎用髮雜熬良久得汁與兒服去痰熱治百病而用髮皆用其父梳頭亂者爾不知此髮審取是何物且字書記所無或作算音人今呼斑髮為算髮書家亦呼亂髮為恐即是音也童男之理未或全明新修一八六頁大觀卷十五政和三六三頁注亂髮微溫主治咳嗽五淋在小便不通小兒驚癎止血鼻衄燒之吹內立已此常人頭髮爾術家用已亂髮及爪燒山人飲之相親愛此與髮治體相似新修一八七頁大觀卷十政和三六三頁注頭垢主治淋閉不通術云頭垢浮針以肥膩故爾今當用悅澤人者其垢可丸亦主噎又治勞復也新修一八八頁大觀卷十五政和三六四頁注人屎寒主治時行大熱狂走解諸毒宜用絶乾者搗末沸湯沃服之人溺治寒熱頭痛溫氣童男者尤良溺白垽治鼻衄湯火灼瘡東向圊厠溺坑中青泥治喉痺肖癰腫若已有膿即潰交廣俚人用焦銅為箭鏃射人才傷皮便死惟飲糞汁即差而射豬狗不死以其食糞故也時行大熱飲糞汁亦愈今近城寺别塞空罌口內糞倉中積年得汁甚黑而苦名為黃龍湯治溫病垂死飲皆差若人初得頭痛直飲溺數升亦多愈合蔥鼓作湯彌佳溺垽及青泥為治並如所説又婦人月水亦解毒箭並女勞復浣褌汁亦善扶南國舊有奇術能禁令刀斫人不入惟以月水塗刀便死此是污穢壞神氣也又人合藥所以忌觸之皮既一種物故從屎溺之例又人精和鷹屎亦滅瘢新修一八八頁大觀卷十五政和三六四頁注馬乳止渴今人不甚服當緣難得也新修一九頁大觀卷十六政和三七三頁牛乳微寒主補虛羸止渴下氣牛為佳不用新被飲竟者新修一九頁大觀卷十六政和三七三頁注羊乳溫補寒冷虛乏牛乳羊乳實為補潤故北人皆多肥健新修一九頁大觀卷十六政和三七二頁注酪酥微寒主補五藏利大腸主治口瘡酥出外國亦從益州來本是牛羊乳所為作之自有法佛經稱乳成酪酪成酥酥成醍醐醍醐色黃白作餅甚甘肥亦時至江南新修一九一頁大觀卷十六政和三七三頁注熊脂味甘微寒微溫無毒主治筋急五藏腹中積聚寒熱羸瘦頭瘍白秃面皯皰久服強志不飢輕身長年生雍州山谷十一月取此脂即是熊白是背上膏寒月則有夏月則無其腹中肪及身中膏煎取可作藥而不中噉今東西諸山林皆有之自是非易得物爾痼病人不可食熊肉令終身不除愈也新修一九一頁大觀卷十六政和三七頁注石蜜味甘平微溫無毒主治心腹邪氣諸驚癎痓安五藏諸不足益氣補中止痛解毒除衆病和百藥養脾氣除心煩食飲不下止腸澼肌中疼痛口瘡明耳目久服強志輕身不飢不老延年神仙一名石飴生武都山谷河源山谷及諸山石中色白如膏者良石蜜即崖蜜也高山巖石間作之色青赤味小醶食之心煩其蜂黑色似又木蜜呼為食蜜懸樹枝作之色青白樹空及人家養作之者亦白而濃厚味美凡蜂作蜜皆須人小便以釀諸花乃得和熟狀似作飴須蘗也又有土蜜於土中作之色青白味醶今出晉安檀崖者多土蜜云最勝出東陽臨海諸處多木蜜出於潛懷安諸縣多崖蜜亦有雜木蜜及人家養者例皆被添殆無淳者必須親自看取之乃無雜爾且又多被煎煮其江南向西諸蜜皆是木蜜添雜最多不可為藥用道家丸餌莫不須之仙方亦單煉服之致長生不老也大觀卷二十政和四一頁注蜜蠟味甘微溫無毒主治下痢膿血補中續絶傷金瘡益氣不飢耐老白蠟治久泄澼後重見白膿補絶傷利小兒久服輕身不飢生武都山谷生於蜜房木石間惡芫花齊蛤此蜜蠟爾生於蜜中故謂蜜蠟蜂皆先以此為蜜跖煎蜜亦得之初時極香軟人更煮煉或加少醋酒便黃赤以作燭色為好今藥家皆應用白蠟但取削之於夏月日曝百日許自然白卒用之亦可煬內水中十餘過亦白世方惟以合治下丸而仙經斷穀最為要用今人但嚼食方寸者亦一日不飢也大觀卷二十政和四一二頁注蜂子味甘平微寒無毒主治風頭除蠱毒補虛羸傷中治心腹痛大人小兒腹中五蟲口吐出者面目黃久服令人光澤好顏色不老輕身益氣大黃蜂子主治心腹脹滿痛乾嘔輕身益氣土蜂子主治癰腫嗌痛一生武都山谷畏黃芩芍藥牡蠣前直云蜂子即應是蜜蜂子也取其未成頭足時炒食之又酒漬以敷面令面悅白黃蜂則人家屋上者及蜂也大觀卷二十政和四一一頁注白膠味甘平溫無毒主治傷中勞絶腰痛羸瘦補中益氣婦人血閉無子止痛安胎治吐血下血崩中不止四肢酸疼多汗淋露折跌傷損久服輕身延年一名鹿角膠生雲中煮鹿角作之得火良畏大黃今人少復煮作惟合角弓猶言用此膠爾方藥用亦稀道家時又須之作白膠法先以米汁漬七日令軟然後煮煎之如作阿膠法爾又一法即細銼角與一片乾牛皮角即消爛矣不爾相厭百年無一熟也新修一九二頁大觀卷十六政和三七一頁注阿膠味甘平微溫無毒主治心腹內崩勞極灑灑如瘧狀腰腹痛四肢酸疼女子下血安胎丈夫少腹痛虛勞羸瘦陰氣不足腳酸不能久立養肝氣久服輕身益氣一名傅致膠生東平郡煮牛皮作之出東阿惡大黃得火良出東阿故曰阿膠今都下能作之用皮亦有老少膠則有清濁凡三種清薄者書畫用厚而清者名為盆覆膠作藥用之用之皆火炙丸散須極燥入湯微炙爾濁黑者可膠物用不入藥也用一片鹿角即成膠不爾不成也新修一九三頁大觀卷十六政和三七二頁注白鵝膏主治耳卒聾以灌之毛主射工水毒肉平利五藏東川多溪毒養鵝以辟之毛羽亦佳中射工毒者飲血又以塗身鵝未必食射工特以威相制爾乃言鵝不食生蟲今鵝子亦噉蚯蚓輩新修二二九頁大觀卷十九政和三九九頁注鴈肪味甘平無毒主治風擊拘急偏枯氣不通利久服長益氣不飢輕身耐老一名驚肪生江南池澤取無時詩云大曰鴻小曰鴈今鴈類亦有大小皆同一形又别有野鵝大於鴈猶似家倉鵝謂之駕鵝鴈肪自不多食其肉應亦好鶩作木音云是野鴨今此一名鶩肪則鴈鶩皆相類爾此後又有鴨事别注在後夫鴈乃住江湖而夏應産伏皆往北恐鴈門北人不食此鳥故也中原亦重之爾雖採無時以冬月為好新修二三頁大觀卷十九政和四頁注丹雄雞味甘微溫微寒無毒主治女人赤白沃補虛溫中止血不傷之瘡通神殺毒辟不祥頭主殺鬼東門上者彌良白雄雞肉味酸微溫主下氣治狂邪安五藏傷中消渴烏雄雞肉微溫主補中止痛膽微寒主治目不明肌瘡心主治五邪血主踒折骨痛及痿痺肪主治耳聾雞腸平主治遺尿小便數不禁肝及左翅毛主起陰冠血主治乳難肶胵裏黃皮微寒主治泄痢小便利遺溺除熱止煩屎白微寒主消渴傷寒寒熱破石淋及轉筋利小便止遺溺滅瘢痕黑雌雞主治風寒濕痺五緩六急安胎其血無毒平主治中惡腹痛及踒折骨痛乳難翮羽主下血閉黃雌雞味酸甘平主治傷中消渴小便數不禁腸澼泄痢補益五藏續絶傷治虛勞益氣力肋骨主治小兒羸瘦食不生肌雞子主除熱火瘡治癎痓可作虎魄神物卵白微寒治目熱赤痛除心下伏熱止煩滿咳逆小兒下泄婦人産難胞衣不出醯漬之一宿治黃疸破大煩熱卵中白皮主久咳結氣得麻黃紫菀和服之立已雞白蠹能肥脂生朝鮮平澤雞此例又甚多云雞子作虎魄者用欲卵黃白混雜煮作之亦極相似惟不拾芥爾又煮白合銀口含須臾色如金雞子不可合葫蒜及李子食之烏雞肉不可合犬肝腎食之小兒食雞肉好生蛔蟲又雞不可合芥葉蒸食之朝鮮乃在玄兔樂浪不應總是雞所出今云白蠹不知是何物恐此别一種爾新修二二五頁大觀卷十九政和三九七頁注鶩肪味甘無毒主治風虛寒熱白鴨屎名鴨通主殺石藥毒解結縛散蓄熱肉補虛除熱和藏府利水道鶩即是鴨鴨有家有野前本經云鴈肪一名鶩肪其治小異此説則專是家鴨爾黃雌鴨為補最勝鴨卵不可合鱉肉食之凡鳥自死口不閉者皆不可食之食之殺人新修二三頁大觀卷十九政和四頁注牡蠣味鹹平微寒無毒主治傷寒寒熱溫瘧灑灑驚恚怒氣除拘緩鼠瘻女子帶下赤白除留熱在關節榮衛虛熱去來不定煩滿止汗心痛氣結止渴除老血澀大小腸止大小便治泄精喉痺咳嗽心脅下痞熱久服強骨節殺邪鬼延年一名蠣蛤一名牡蛤生東海池澤採無時貝母為之使得甘草牛膝遠志蛇牀良惡麻黃吳茱萸辛夷是百歲雕所化以十一月採為好去肉二百日成今出東海永嘉晉安皆好道家方以左顧者是雄故名牡蠣右顧則牝蠣爾生著石皆以口在上舉以腹向南視之口邪向東則是或云以尖頭為左顧者未詳孰是例以大者為好又出廣州南海亦如此但多右顧不用爾丹方以泥釜皆除其甲口止取朏朏如粉處爾世用亦如之彼海人皆以泥煮鹽釜耐水火而不破漏大觀卷二十政和四一二頁注魁蛤味甘平無毒主治痿痺泄痢便膿血一名魁陸一名活東生東海正圓兩頭空表有文取無時形似紡軖小狹長外有縱橫文理云是老蝙蝠化為用之至少而本經海蛤一名魁蛤與此為異也大觀卷二十政和四一七頁注石決明味鹹平無毒主治目障翳痛青盲久服益精輕身生南海世云是紫貝定小異亦難得又云是鰒魚甲附石生大者如手明耀五色內亦含珠人今皆水漬紫貝以尉眼頗能明此一種本亦附見在決明條甲既是異類今為副品也大觀卷二十政和四一五頁注秦龜味苦無毒主除濕痺氣身重四肢關節不可動搖生山之陰土中二月八月取此即山中龜不入水者形大小無定方藥不甚用龜類雖多入藥止有兩種爾又有鴦龜小狹長尾乃言治蛇毒以其食蛇故也用以卜則吉凶正反帶秦龜前臑骨令人入山不迷廣州有蟕蠵其血甚治俚人毒箭傷大觀卷二十政和四一三頁鮑魚味辛臭溫無毒主治墜墮腿蹶踠折瘀血血痺在四肢不散者女子崩中血不止勿令中鹹所謂鮑魚之肆言其臭也世人呼為魚字似鮑又言鹽之以成故也作藥當用少鹽臭者不知正何種魚爾乃言穿貫者亦入藥方家自少用之今此鮑魚乃是鱅魚長尺許合完淡乾之而都無臭氣要自治漏血不知何者是真大觀卷二十政和四一九頁鮧魚味甘無毒主治百病此是鯷也今人皆呼慈音即是鮎魚作臛食之云補又有鱯魚相似而大又有鮠魚亦相似黃而美益人其合鹿肉及赤目赤鬚無鰓者食之並殺人又有人魚似鯷而有四足聲如小兒食之治瘕疾其膏燃之不消耗始皇驪山冢中用之謂之人膏也荆州臨沮青溪至多此魚大觀卷二十政和四一七頁鱓魚味甘大溫無毒主補中益血治瀋脣五月五日取頭骨燒之止痢鱓是荇芩根化作之又云是人髮所化今其腹中自有子不必盡是變化也性熱作臛食之亦補而時行病起食之多復又喜令人霍亂凡此水族魚蝦之類甚多其有名者已注在前條雖皆可食而甚損人故不入藥用又有食之反能致病者今條注如後説凡魚頭有白色如連珠至脊上者腹中無膽者頭中無鰓者並殺人魚汁不可合鸕鷀肉食之鯽魚不可合猴雉肉食之鱓不可合白犬血食之鯉魚子不可合豬肝食之鯽魚亦爾青魚鮓不可合生胡荽及生葵並麥醬食之蝦無鬚及腹下通黑及煮之反白皆不可食生蝦鱠不可合雞肉食之亦損人又有鯆魮亦益人尾有毒治齒痛又有魚至能醒酒鯸鮧魚有毒不可食大觀卷二十政和四一八頁注中品零羊角味鹹苦寒微寒無毒主明目益氣起陰去惡血注下辟蠱毒惡鬼不祥安心氣常不魘寐治傷寒時氣寒熱熱在肌膚溫風注毒伏在骨間除鬱驚夢狂越僻謬及食噎不通久服強筋骨輕身起陰益氣利丈夫生石城山川谷及採無時今出建平宜都諸蠻中及西域多兩角者一角者為勝角甚多節蹙蹙圓繞别有山羊角極長惟一邊有節節亦疏大不入方用而爾雅云名羱羊而羌夷云只此即名零羊甚能陟峻坂短角者乃是山羊爾亦未詳其正新修一九七頁大觀卷十七政和三八二頁注羖羊角味鹹苦溫微寒無毒主治青盲明目殺疥蟲止寒泄辟惡鬼虎狼止驚悸治百節中結氣風頭痛及蠱毒吐血婦人産後餘痛燒之殺鬼魅辟虎狼久服安心益氣力輕身生河西川谷取無時勿使中濕濕有毒菟絲為之使羊髓味甘溫無毒主治男女傷中陰氣不足利血脈益經氣以酒服之青羊膽主治青盲明目羊肺補肺主治咳嗽羊心主止憂恚膈氣羊腎主補腎氣益精髓羊齒主治小兒羊癎寒熱三月三日取之羊肉味甘大熱無毒主緩中字乳餘疾及頭腦大風汗出虛勞寒冷補中益氣安心止驚羊骨熱主治虛勞寒中羸瘦羊屎燔之主治小兒泄痢腸鳴驚癎羖羊角方藥不甚用餘皆入湯煎羊有三四種最以青色者為勝次則烏羊爾其羺羊及虜中無角羊正可噉食之為藥不及都下者其乳髓則肥好也羊肝不可合豬肉及梅子小豆食之傷人心大病人新修一九九頁大觀卷十七政和三七九頁注犀角味苦鹹酸寒微寒無毒主治百毒蠱邪鬼瘴氣殺鈎吻鴆羽蛇毒除邪不迷惑魘寐治傷寒溫疫頭痛寒熱諸毒氣久服輕身駿健生永昌川及益州松脂為之使惡雚菌雷丸今出武陵交州寧州諸遠山犀有二角以額上者為勝又有通天犀角上有一白縷直上至端此至神驗或云是水犀角出水中漢書所云駭雞犀者以置米邊雞皆驚駭不敢啄又置屋中烏鳥不敢集屋上昔者有人以犀為纛死於野中有行人見有鳶飛翔其上不敢下往者疑犀為異抽取便羣競集又云通天犀夜露不濡以此知之凡犀見成物皆被蒸煮不堪入藥惟生者為佳雖曰屑片亦是已煮炙況用屑乎又有光犀其角甚長文理亦似犀不堪藥用爾新修一九五頁大觀卷十七政和三八三頁注牛角主下閉血瘀血疼痛女人帶下下血燔之味苦無毒水牛角主治時氣寒熱頭痛髓補中填骨髓久服增年髓味甘溫無毒主安五藏平三焦溫骨髓補中續絶傷益氣止泄痢消渴以酒服之膽可丸藥膽味苦大寒主除心腹熱渴利口焦燥益目精此朱書牛角髓其膽本經附出牛黃條中此以類相從爾非上品之藥今撥出隨例在此不關件數猶黑書别品之限爾心主治虛忘肝主明目腎主補腎氣益精齒主治小兒牛癎肉味甘平無毒主治消渴止啘泄安中益氣養脾胃自死者不良屎寒主治水腫惡氣用塗門戶著壁者燔之主治鼠瘻惡瘡黃犍牛烏牯牛溺主治水腫腹脹腳滿利小便此牛亦以牛為好青牛最良水牛為可充食爾自死謂疫死肉多毒青牛腸不可共犬肉犬血食之令人成病也新修二二頁大觀卷十七政和三七七頁注白馬莖味鹹甘平無毒主治傷中脈絶陰不起強志益氣長肌肉肥健生子小兒驚癎陰乾百日眼主治驚癎腹滿瘧疾當殺用之懸蹄主治驚癎瘛瘲乳難辟惡氣鬼毒蠱注不祥止衄血內漏齲齒生雲中平澤白馬蹄主治婦人漏下白崩赤馬蹄主治婦人赤崩並溫齒主治小兒馬癎鬐頭膏主生髮鬐毛主治女子崩中赤白心主治喜忘肺主治寒熱小兒莖痿肉味辛苦冷主除熱下氣長筋強腰脊壯健強意利志輕身不飢脯主治寒熱痿痺屎名馬通微溫主治婦人崩中止渴利吐下血鼻衄金創止血頭骨主治喜眠令人不睡溺味辛微寒主治消渴破癥堅積聚男子伏梁積疝婦人瘕疾銅器承飲之東行白馬蹄下土作方術用知女人外情馬色類甚多以純白者為良其口眼蹄皆白世中時有兩三爾小小用不必爾馬肝及鞍下肉舊言殺人食駿馬肉不飲酒亦殺人白馬青蹄亦不可食禮云馬黑脊而班臂漏脯亦不復中食骨傷人有毒人體有瘡馬汗馬氣馬毛亦並能為害人也新修二四頁大觀卷十七政和三七四頁注牡狗陰莖味鹹平無毒主治傷中陰痿不起令強熱大生子除女子帶下十二疾一名狗精六月上伏取陰乾百日膽主明目痂瘍惡瘡心主治憂恚氣除邪腦主治頭風痺痛治下部瘡鼻中息肉齒主治癲癎寒熱卒風痱伏日取之頭骨主治金創止血四腳蹄煮飲之下乳汁白狗血味鹹無毒主治癲疾發作肉味鹹酸溫主安五藏補絶傷輕身益氣屎中骨主治寒熱小兒驚癎白狗烏狗入藥用白狗骨燒屑治諸瘡瘻及妬乳癰腫黃狗肉大補虛牝不及牡牡者父也又呼為犬言腳上别有一懸蹄者是也白犬血合白雞肉白鵝肝白羊肉烏雞肉蒲子羹等皆病人不可食犬春月目赤鼻燥欲狂猘不宜食新修二八頁大觀卷十七政和三八一頁注鹿茸味甘酸溫微溫無毒主治漏下惡血寒熱驚癎益氣強志生齒不老治虛勞灑灑如瘧羸瘦四肢酸疼腰脊痛小便利泄精溺血破留血在腹散石淋癰腫骨中熱疽養骨安胎下氣殺鬼精物不可近陰令痿久服耐老四月五月解角時取陰乾使時燥麻勃為之使角味鹹無毒主治惡瘡癰腫逐邪惡氣留血在陰中除少腹血急痛腰脊痛折傷惡血益氣七月取杜仲為之使髓味甘溫主治丈夫女子傷中脈絶筋急痛咳逆以酒和服之良腎平主補腎氣肉溫主補中強五藏益氣力生者治口僻銼薄之野肉之中唯麞鹿可食生則不羶腥又非辰屬八卦無主而兼能溫補於人則生死無尤故道家許聽為脯過其餘肉雖牛羊雞犬補益充肌膚於亡魂皆為愆責並不足噉凡肉脯炙之不動及見水而動及曝之不燥並殺人又茅屋漏脯即名漏脯藏脯密器中名鬱脯并不可食之新修二一頁大觀卷十七政和三七六頁注麞骨微溫主治虛損泄精肉溫主補益五藏髓益氣力悅澤人面世云白肉正是麞不純於鹿言其白膽易驚怖也又呼為麕麕肉不可合鵠肉食之成癥痼也新修二一二頁大觀卷十七政和三八六頁注虎骨主除邪惡氣殺鬼疰毒止驚悸治惡瘡鼠瘻頭骨尤良膏治狗嚙瘡爪主闢惡魅肉主治惡心欲嘔益氣力世云熱食虎肉壞人齒信自如此虎頭作枕闢惡魘以置户上闢鬼鼻懸户上令生男兒骨雜朱書符治邪鬚治齒痛爪多以繫小兒臂闢惡鬼新修二一二頁大觀卷十七政和三八四頁注豹肉味酸平無毒主安五藏補絶傷輕身益氣久服利人豹至稀有為用亦鮮唯尾可貴新修二一三頁大觀卷十七政和三八六頁注狸骨味甘溫無毒主治風疰尸疰鬼疰毒氣在皮中淫躍如針剌者心腹痛走無常處及鼠瘻惡瘡頭骨尤良肉亦治諸疰陰莖治月水不通男子陰頽燒之以東流水服之狸類又甚多今此用虎狸無用貓者貓狸亦好其骨至難别自取乃可信又有音信色黃而臭肉亦主鼠瘻及狸肉作羹如常法並佳新修二一四頁大觀卷十七政和三八六頁注兔頭骨平無毒主治頭眩痛癲疾骨主治熱中消渴腦主治凍瘡肝主治目暗肉味辛平無毒主補中益氣兔肉乃大美亦益人妊身不可食令子脣缺其肉又不可合白雞肉食之令人面發黃合獺肉食之令人病遁尸新修二一五頁大觀卷十七政和三八五頁注雉肉味酸微寒無毒主補中益氣力止泄利除蟻瘻雉雖非辰屬而正是離禽丙午日不可食者明其王於火也新修二三二頁大觀卷十九政和四三頁注鷹屎白主治傷撻滅瘢止單用白亦不能滅瘢復應合諸藥殭蠶衣魚之屬以為膏也新修二三二頁大觀卷十九政和四二頁注雀卵味酸溫無毒主下氣男子陰痿不起強之令熱多精有子腦主治耳聾頭血主治雀盲雄雀屎主治目痛決癰癤女子帶下溺不利除疝瘕五月取之良雀性利陰陽故卵亦然術云雀卵和天雄丸服之令莖大不衰人患黃昏間目無所見謂之為雀盲其頭血治之雄雀屎兩頭尖是也亦治齲齒雀肉不可合李食之亦忌合醬食妊身尤禁也新修二三三頁大觀卷十九政和四一頁注鸛骨味甘無毒主治鬼蠱諸疰毒五尸心腹疾鸛亦有兩種似鵠而巢樹者為白鸛黑色曲頸者為陽烏鸛今宜用白者新修二三四頁大觀卷十九政和四四頁注雄鵲味甘寒無毒主治石淋消結熱可燒作灰以石投中散解者是雄也五月五日鵲腦入術家用一名飛駁烏鳥之雌雄難别舊言其翼左覆右是雄右覆左是雌又燒毛作屑內水中沉者是雄浮者是雌今云投石恐止是鵲爾餘鳥未必爾並未識之新修二三四頁大觀卷十九政和四四頁注伏翼味鹹平無毒主治目瞑癢痛治淋利水道明目夜視有精光久服令人喜樂媚好無憂一名蝙蝠生太山川谷及人家屋間立夏後採陰乾莧實雲實為之使伏翼目及膽術家用為洞視法自非白色倒懸者亦不可服之也大觀卷十九政和四二頁注蝟皮味苦平無毒主治五痔陰蝕下血赤白五色血汁不止陰腫痛引腰背酒煮殺之又治腹痛疝積亦燒為灰酒服之生楚山川谷田野取無時勿使中濕得酒良畏桔梗麥門冬田野中時有此獸人犯近便藏頭足毛剌人不可得捉能跳入虎耳中而見鵲便自仰腹受啄物有相制不可思議爾其脂煬鐵注中內少水銀則柔如鉛錫矣大觀卷二十一政和四二三頁注石龍子味鹹寒有小毒主治五癃邪結氣破石淋下血利小便水道一名蜥蜴一名山龍子一名守宫一名石蜴生平陽川谷及荆山石間五月取著石上令乾惡硫黃斑貓蕪荑其類有四種一大形純黃色為蛇醫母亦名蛇舅母不入藥次似蛇醫小形長尾見人不動名龍子次有小形而五色尾青碧可愛名斷蜴並不螫人一種喜緣籬壁名蝘蜓形小而黑乃言螫人必死而未常聞中人案東方朔云若非守宫則蜥蜴如此蝘蜓名守宫矣以朱飼之滿三斤殺乾末以塗女子身有交接事便脫不爾如赤志故謂守宫今此一名守宫猶如野葛鬼臼之義也殊難分别大觀卷二十一政和四三二頁注露蜂房味苦鹹平有毒主治驚癎瘛瘲寒熱邪氣癲疾鬼精蠱毒腸痔火熬之良又治蜂毒毒腫一名蜂場一名百穿一名蜂生牂牁山谷七月七日採陰乾惡乾薑丹參黃芩芍藥牡蠣此蜂房多在樹腹中及地中今此曰露蜂房當用人家屋間及樹枝間苞裹者乃遠舉牂牁未解所以大觀卷二十一政和四二四頁注樗雞味苦平有小毒主治心腹邪氣陰痿益精強志生子好色補中輕身又治腰痛下氣強陰多精不可近目生河內川谷樗樹上七月採暴乾形似寒螿而小今出梁州方用至稀惟合大麝香丸用之樗樹似漆而臭今以此樹上為好亦如芫青亭長必以芫葛上為良矣大觀卷二十一政和四三一頁注蚱蟬味鹹甘寒無毒主治小兒驚癎夜啼癲病寒熱驚悸婦人乳難胞衣不出又墮胎生楊柳上五月採蒸乾之勿令蠹蚱字音作笮即是蟬痖雌蟬也不能鳴者蟬類甚多莊子云蟪蛄不知春秋則是今四月五月小紫青色者而離騷云蟪蛄鳴兮啾啾歲暮兮不自聊此乃寒螿爾九月十月中鳴甚悽急又二月中便鳴者名母似寒螿而小七月八月鳴者名蛁蟟色青今此云生楊柳樹上是詩云鳴蜩嘒嘒者形大而黑傴僂丈夫止是掇此昔人噉之故禮有雀鷃蜩范范有冠蟬有緌亦謂此蜩此蜩復五月便鳴世云五月不鳴嬰兒多災今其治亦專主小兒也大觀卷二十一政和四二七頁注白殭蠶味鹹辛平無毒主治小兒驚癎夜啼去三蟲滅黑令人面色好治男子陰瘍病女子崩中赤白産後餘痛滅諸瘡瘢痕生穎川平澤四月取自死者勿令中濕濕有毒不可用人家養蠶時有合箔皆殭者即曝燥都不壞今見小白色似有鹽度者為好末以塗馬齒即不能食草以桑葉拭去乃還食此明蠶即馬類也大觀卷二十一政和四三頁注桑螵蛸味鹹甘平無毒主治傷中疝瘕陰痿益精生子女子血閉腰痛通五淋利小便水道又治男子虛損五藏氣微夢寐失精遺溺久服益氣養神一名蝕疣生桑枝上螳螂子也二月三月採蒸之當火炙不爾令人泄得龍骨治泄精畏旋覆華世呼螳螂為螂逢樹便産以桑上者為好是兼得桑皮之津氣市人恐非真皆令合枝斷取之爾者亦以膠著桑枝之上也大觀卷二十政和四一五頁注蟲味鹹寒有毒主治心腹寒熱洗洗血積癥瘕破堅下血閉生子大良一名地鱉一名土鱉生河東川澤及沙中人家墻壁下土中濕處十月取暴乾畏皂莢昌蒲形扁扁如鱉故名土鱉而有甲不能飛小有臭氣今人家亦有之大觀卷二十一政和四三四頁注蠐螬味鹹微溫微寒有毒主治惡血血瘀痺氣破折血在脅下堅滿痛月閉目中淫膚青翳白膜治吐血在胸腹不去及破骨踒折血結金瘡內塞産後中寒下乳汁一名蟦一名蜰齊一名齊生河內平澤及取無時反行者良蜚虻為之使惡附子大者如足大指以背滾行乃駛於腳雜豬蹄作羹與乳母不能别之詩云領如蝤蠐今此别之名以蠐字在下恐此云蠐螬倒爾大觀卷二十一政和四二八頁注蛞味鹹寒無毒主治賊風喎僻軼筋及脫肛驚癎攣縮一名陵蠡一名土蝸一名附蝸生太山池澤及陰地沙石垣八月取蛞蝓無殼不應有蝸名其附蝸者復名蝸牛生池澤沙石則應是今山蝸或當言其頭形類猶似蝸牛蟲者世名蝸牛者作瓜字則蝸字亦音瓜莊子所云戰於蝸角也蛞蝓入三十六禽限又是四種角蟲之類熒室星之精矣方家殆無復用乎大觀卷二十一政和四三二頁注海蛤味苦鹹平無毒主治咳逆上氣喘息煩滿胸痛寒熱治陰痿一名魁蛤生東海蜀漆為之使畏狗膽甘遂芫花此物以細如巨勝潤澤光淨者好有麁如半杏人者不入藥用大觀卷二十政和四一六頁注文蛤味鹹平無毒主治惡瘡蝕五痔咳逆胸痺腰痛脅急鼠瘻大孔出血崩中漏下生東海表有文取無時海蛤至潤澤云從鴈屎中得之二三十過方為良今人多取相摝令磨蕩似之爾文蛤小大而有紫斑此既異類而同條若别之則數多今以為附見而在副品限也凡有四物如此大觀卷二十政和四一六頁注鯉魚膽味苦寒無毒主治目熱赤痛青盲明目久服強悍益志氣肉味甘主咳逆上氣黃疸止渴生者主治水腫腳滿下氣骨主女子帶下赤白齒主石淋生九江池澤取無時鯉魚最為魚之主形既可愛又能神變乃至飛越山湖所以琴高乘之山上水中有鯉不可食又鯉鮓不可合小豆蒮食之其子合豬肝食之亦能害人爾大觀卷二十政和四一九頁注蠡魚味甘寒無毒主治濕痺面目浮腫下大水治五痔有瘡者不可食令人瘢白一名鮦魚生九江池澤取無時今皆作鱧字舊言是公蠣蛇所變然亦有相生者至難死猶有蛇性合小豆白煮以治腫滿甚效大觀卷二十政和四一七頁龜甲味鹹甘平有毒主治漏下赤白破癥瘕痎瘧五痔陰蝕濕痺四肢重弱小兒囟不合治頭瘡難燥女子陰瘡及驚恚氣心腹痛不可久立骨中寒熱傷寒勞復或肌體寒熱欲死以作湯良久服輕身不飢益氣資智亦使人能食一名神屋生南海池澤及湖水中採無時勿令中濕中濕即有毒惡沙參蜚蠊此用水中神龜長一尺二寸者為善厴可以供卜殼可以充藥亦入仙方用之當炙生龜溺甚治久嗽亦斷瘧肉作羹臛大補而多神靈不可輕殺書家載之甚多此不具説也大觀卷二十政和四一三頁注鱉甲味鹹平無毒主治心腹癥瘕堅積寒熱去痞息肉陰蝕痔惡肉治溫瘧血瘕腰痛小兒脅下堅肉味甘主傷中益氣補不足生丹池澤取無時惡礬石生取甲剔去肉為好不用煮脫者今看有連厴及乾巖便好若上有甲兩邊骨出巳被煮也用之當炙夏月銼鱉以赤莧包置濕地則變化生鱉人有裹鱉甲屑經五月皆能變成鱉子此其肉亦不足食多作癥瘕其目陷者及合雞子食之殺人不可合莧菜食之其厴下有如王字形者亦不可食大觀卷二十一政和四二五頁鮀魚甲味辛微溫有毒主治心腹癥瘕伏堅積聚寒熱女子崩中下血五色小腹陰中引相痛瘡疥死肌治五邪涕泣時驚腰中重痛小兒氣癃眥潰肉主少氣吸吸足不立地生南海池澤取無時蜀漆為之使畏狗膽芫花甘遂鮀即今鼉甲也用之當炙皮可以貫鼓肉至補益於物難死沸湯沃口入腹良久乃剝爾肉亦補食之如鼉法此等老者多能變化為邪魅自非急勿食之大觀卷二十一政和四三一頁注烏賊魚骨味鹹微溫無毒主治女子漏下赤白經汁血閉陰蝕腫痛寒熱癥瘕無子治驚氣入腹腹痛環臍陰中寒腫令人有子又止瘡多膿汁不燥肉味酸平主益氣強志生東海池澤取無時惡白斂白及此是烏所化作今其口腳具存猶相似爾用其骨亦炙之其魚腹中有墨今作好墨用之大觀卷二十一政和四二八頁注蟹味鹹寒有毒主治胸中邪氣熱喎僻面腫敗漆燒之致鼠解結散血愈漆瘡養筋益氣爪主破胞墮胎生伊洛池澤諸取無時殺莨菪毒漆毒蟹類甚多蝤擁劍彭螖皆是並不入藥惟蟹最多有用仙方以化漆為水服之長生以黑犬血灌之三日燒之諸鼠畢至未被霜甚有毒云食水莨所為人中之不即治多死目相向者亦殺人服冬瓜汁紫蘇汁及大黃丸皆得差海邊又有彭蜞擁劍似彭螖而大似蟹而小不可食蔡謨初渡江不識而噉之幾死嘆曰讀爾雅不熟為勸學者所誤大觀卷二十一政和四二六頁注鰻鱺魚味甘有毒主治五痔瘡瘻殺諸蟲能緣樹食藤花形似鱓取作臛食之炙以熏諸木竹辟蛀蟲膏治諸瘻瘡又有鰌亦相似而短也大觀卷二十一政和四三一頁原蠶蛾雄者有小毒主益精氣強陰道交接不倦亦止精屎溫無毒主腸鳴熱中消渴風痺癮原蠶是重養者世呼為魏蠶道家用其蛾止精其翁繭入術用屎名蠶沙多入諸方用不但尉風而已也大觀卷二十一政和四二九頁下品六畜毛蹄甲味鹹平有毒主治鬼疰寒熱驚癎痓癲疾狂走駱駝毛尤良六畜謂馬牛羊豬狗雞也騾驢亦其類駱駝出外國方家並不復用且馬牛羊雞豬狗毛蹄亦已各出其身之品類中所主治不必皆同此矣新修二一六頁大觀卷十八政和三九五頁注弓弩弦主治難産胞衣不出産難取弓弩弦以縛腰及燒弩牙令赤內酒中飲之皆取發放快速之義也大觀卷十一政和二八一頁注敗鼓皮平主治中蠱毒此用穿敗者燒作屑水和服之病人即唤蠱主姓名仍往令其呼取蠱便差白蘘荷亦然大觀卷十八政和三九五頁鯪鯉甲微寒主治五邪驚啼悲傷燒之作灰以酒或水和方寸匕治蟻瘻其形似鼉而短小又似鯉魚有四足能陸能水出岸開鱗甲伏如死令蟻入中忽閉而入水開甲蟻皆浮出於是食之故主蟻瘻方用亦稀惟治瘡癩及諸疰疾爾大觀卷二十二政和四五四頁獺肝味甘有毒主治鬼疰蠱毒却魚鯁止久嗽燒服之肉治疫氣溫病及牛馬時行病煮屎灌之亦良獺有兩種有獱獺形大頭如馬身似蝙蝠不入藥用此當取常所見者其骨亦治食魚骨鯁有牛馬家可取屎收之多出溪岸邊其肉不可與兔肉雜食也新修二二一頁大觀卷十八政和三九二頁注狐陰莖味甘有毒主治女子絶産陰癢小兒陰頽卵腫五藏及腸味苦微寒有毒主治蠱毒寒熱小兒驚癎雄狐屎燒之辟惡在木石上者是江東無狐皆出北方及益州間形似狸而黃亦善能為魅也新修二二二頁大觀卷十八政和三九一頁注麋脂味辛溫無毒主治癰腫惡瘡死肌寒風濕痺四肢拘緩不收風頭腫氣通腠理柔皮膚不可近陰令痿一名宮畏大黃角味甘無毒主痺止血益氣力生南山山谷生淮海邊澤中十月取今海陵間最多千百為羣多牝少牡人言一牡輒交十餘牝交畢即死其脂墮土中經年人得之方好名曰遁脂酒服至良尋麋性乃爾媱快不應萎人陰一方言不可近陰令陰不痿此乃有理麋肉不合蝦及生菜梅李果實食之皆病人其角刮去屑熬香酒服之大益人事出彭祖傳中新修二一七頁大觀卷十八政和三九頁注蝦蟆味辛寒有毒主治邪氣破癥堅血癰腫陰瘡服之不患熱病治陰蝕疽癘惡瘡猘犬傷瘡能合玉石一名蟾蜍一名一名去甫一名苦蠪生江湖池澤五月五日取陰乾東行者良此是腹大皮上多痱磊者其皮汁甚有毒犬嚙之口皆腫人得溫病斑出困者生食一兩枚無不差者五月五日取東行者五枚反縛著密室中閉之明旦視自解者取為術用能使人縛亦自解燒灰敷瘡立驗其肪塗玉則刻之如蠟故云能合玉石但肪不可多得取肥者銼煎膏以塗玉亦軟滑易截古玉器有奇特非雕琢人功者多是昆吾刀及蝦蟆肪所刻也大觀卷二十二政和四四頁注蛙味甘寒無毒主治小兒赤氣肌瘡臍傷止痛氣不足一名長股生水中取無時凡蜂蟻蛙蟬其類最多大而青脊者俗名土鴨其鳴甚壯又一種黑色南人名為蛤子食之至美又一種小形善鳴唤名蛙子此則是也大觀卷二十二政和四五三頁注石蠶味鹹寒有毒主治五癃破石淋墮胎肉解結氣利水道除熱一名沙蝨生江漢池澤李云江左無識此者謂為草根其實類蟲形如老蠶生附石傖人得而食之味鹹而微辛李之所言有理但江漢非傖地爾大都應是生氣物猶如海中蠣蛤輩附石生不動亦皆活物也今世用草根黑色多角節亦似蠶恐未是實方家不用沙蝨自是東間水中細蟲人入水浴著人略不可見痛如針剌挑亦得之今此名或同爾非其所稱也大觀卷二十二政和四四九頁注蚺蛇膽味甘苦寒有小毒主治心腹痛下部瘡目腫痛膏平有小毒主皮膚風毒婦人産後腹痛餘疾此蛇出晉安大者三二圍在地行往不舉頭者是真舉頭者非真形多相似彼土人以此别之膏膽又相亂也真膏纍纍如梨豆子相著他蛇膏皆大如梅李子真膽狹長通黑皮膜極薄舐之甜苦摩以注水即沉而不散其偽者並不爾此物最難得真真膏多所入藥用亦云能治伯牛疾大觀卷二十二政和四四三頁蝮蛇膽味苦微寒有毒主治瘡肉釀作酒治癩疾諸瘻心腹痛下結氣除蠱毒其腹中吞鼠有小毒治鼠瘻蝮蛇黃黑色黃頷尖口毒最烈虺形短而扁毒不異於蚖中人不即治多死蛇類甚衆惟此二種及青蝰為猛治之並别有方蛇皆有足五月五日取燒地令熱以酒沃之置中足出術家所用赤黃頷多在人家屋間吞鼠子雀雛見腹中大者破取乾之大觀卷二十二政和四四五頁注蛇蛻味鹹甘平無毒主治小兒二十種驚癎瘛瘲癲疾寒熱腸痔蟲毒蛇癎弄舌搖頭大人五邪言語僻越惡瘡嘔咳明目火熬之一名蛇符一名龍子皮一名龍子單衣一名弓皮生荆州川谷及田野五月五日十五日取之良畏磁石及酒草中不甚見虺蝮蛻惟有長者多是赤黃頷輩其皮不可復識今往往得爾皆須完全石上者彌佳燒之甚治諸惡瘡也大觀卷二十二政和四四三頁注蜈蚣味辛溫有毒主治鬼疰蠱毒噉諸蛇蟲魚毒殺鬼物老精溫瘧去三蟲治心腹寒熱結聚墮胎去惡血生大吳川谷江南赤頭足者良今赤足者多出京口長山高麗山茅山亦甚有於腐爛積草處得之勿令傷曝乾之黃足者甚多而不堪用人多火炙令赤以當之非真也一名蝍蛆莊周云蝍蛆甘帶淮南子云騰蛇遊霧而殆於蝍蛆其性能制蛇忽見大蛇便緣而噉其腦蜈蚣亦嚙人以桑汁白鹽塗之即愈大觀卷二十二政和四四六頁馬陸味辛溫有毒主治腹中大堅癥破積聚息肉惡瘡白秃治寒熱痞結脅下滿一名百足一名馬軸生玄菟川谷李云此蟲形長五六寸狀如大蛩夏月登樹鳴冬則蟄今人呼為飛蚿蟲也恐不必是馬陸爾今有一細黃蟲狀如蜈蚣而甚長俗名土蟲雞食之醉悶亦至死書云百足之蟲至死不殭此蟲足甚多寸寸斷便寸行或欲相似方家既不復用市人亦無取者未詳何者的是大觀卷二十二政和四五三頁蠮螉味辛平無毒主治久聾咳逆毒氣出剌出汗治鼻窒其土房主癰腫風頭一名土蜂生熊耳川谷及牂牁或人屋間此類甚多雖名土蜂不就土中為窟謂摙土作房爾今一種黑色腰甚細銜泥於人室及器物邊作房如併竹管者是也其生子如粟米大置中乃捕取草上青蜘蛛十餘枚滿中仍塞口以擬其子大為糧也其一種入蘆竹管中者亦取草上青蟲一名蜾螺詩人云螟蛉有子蜾螺負之言細腰物無雌皆取青蟲教祝便變成己子斯為謬矣造詩者乃可不詳未審夫子何為因其僻邪聖人有闕多皆類也大觀卷二十二政和四四六頁注雀甕味甘平無毒主治小兒驚癎寒熱結氣蠱毒鬼疰一名躁舍生漢中採蒸之生樹枝間蛅蟖房也八月取蛅蟖蚝蟲也此蟲多在石榴樹上世呼為蚝蟲其背毛亦螫人生卵形如雞子大如巴豆今方家亦不用此蚝一作爾大觀卷二十二政和四五頁注彼子味甘溫有毒主治腹中邪氣去三蟲蛇螫蟲毒鬼疰伏尸生永昌山谷方家從來無用此者古今諸醫及藥家了不復識又一名羆子不知其形何類也大觀卷三十政和五四七頁注鼠婦味酸溫微寒無毒主治氣癃不得小便婦人月閉血瘕癎痓寒熱利水道一名負一名蝛一名蜲生魏郡平谷及人五月五日取一名鼠負言鼠多在坎中背則負之今作婦字如似乖理又一名鼠姑大觀卷二十二政和四五五頁注螢火味辛微溫無毒主明目小兒火瘡傷熱氣蠱毒鬼疰通神精一名夜光一名放光一名熠耀一名即照生階地池澤七月七日取陰乾此是腐草及爛竹根所化初猶未如蟲腹下已有光數日便變而能飛方術家捕取內酒中令死乃乾之世藥用之亦稀大觀卷二十二政和四五五頁注衣魚味鹹溫無毒主治婦人疝瘕小便不利小兒中風項強背起摩之又治淋墮胎塗瘡滅瘢一名白魚一名蟫生咸陽平澤衣中乃有而不可常得多在書中亦可用於小兒淋閉以摩臍及小腹即溺通也大觀卷二十二政和四五六頁注白頸蚯蚓味鹹寒大寒無毒主治蛇瘕去三蟲伏尸鬼疰蠱毒殺長蟲仍自化作水治傷寒伏熱狂謬大腹黃疸一名土龍生三月取陰乾白頸是其老者爾取破去土鹽之日暴須臾成水道術多用之溫病大熱狂言飲其汁皆差與黃龍湯治同也其屎呼為蚓螻食細土無沙石入合丹泥釜用若服此乾蚓應熬作屑去蛔蟲甚有驗也大觀卷二十二政和四四五頁注螻蛄味鹹寒無毒主治産難出肉中刺潰癰腫下哽噎解毒除惡瘡一名蟪姑一名天螻一名生東城平澤夜出者良夏至取暴乾以自出者其自腰以前甚澀主止大小便從腰以後甚利主下大小便若出拔剌多用其腦此物頗協神鬼昔人獄中得其蟪力者今人夜忽見出多打殺之言為鬼所使也大觀卷二十二政和四五三頁注蜣蜋味鹹寒有毒主治小兒驚癎瘛瘲腹脹寒熱大人癲疾狂易手足端寒肢滿賁豚一名蛣羌火熬之良生長沙池澤五月五日取蒸藏之臨用當炙勿置水中令人吐畏羊角石膏莊子云蛣蜣之智在於轉丸其喜入人糞中取屎丸而却推之俗名推丸當取大者其類有三四種以鼻頭扁者為真大觀卷二十二政和四五一頁注地膽味辛寒有毒主治鬼疰寒熱鼠瘻惡瘡死肌破癥瘕墮胎蝕瘡中惡肉鼻中息肉散結氣石淋去子服一刀圭即下一名蚖一名青蛙生汶山川谷八月取惡甘草真者出梁州狀如大馬蟻有翼偽者即斑貓所化狀如大豆大都治體略同必不能得真爾此亦可用故有蚖青之名蚖字乃異恐是相承誤矣大觀卷二十二政和四五四頁注馬刀味辛微寒有毒主治寒熱破石淋殺禽獸賊鼠除五藏問熱肌中鼠止煩滿補中去厥痺利機關用之當鍊得水爛人腸又云得水良一名馬蛤生江湖池澤及東海取無時李云生江漢中長六七寸江漢間人名為單姥亦食其肉肉似蚌今人多不識之大都似今蝏而非方用至少凡此類皆不可多食而不正入藥惟蛤蜊煮之醒酒蜆殼陳久者止痢車螯蚶蠣蝛之屬亦可為食無損益不見所主雉入大水變為蜄蜄云是大蛤乃是蚌爾煮食諸蜊蝸與菜皆不利人也大觀卷二十二政和四四一頁注貝子味鹹平有毒主治目翳鬼疰蠱毒腹痛下血五癃利水道除寒熱溫疰解肌散結熱燒用之良一名貝齒生東海池澤此是今小小貝子人以飾軍容服物者乃出南海燒作細屑末以吹眼中治翳良又真馬珂搗末亦治肓翳大觀卷二十二政和四四九頁田中螺汁大寒主治目熱赤痛止渴生水田中及湖瀆岸側形圓大如梨橘者人亦煮食之煮汁亦治熱醒酒止渴患眼痛取真珠並黃連內其中良久汁出取以注目中多差大觀卷二十二政和四四九頁蝸牛味鹹寒主治賊風喎僻踠跌大腸下脫肛筋急及驚癎蝸牛字是力戈反而世呼為瓜牛生山中及人家頭形如蛞蝓但背負殼爾前以注説之海邊又一種正相似火炙殼便走出食之益顏色名為寄居方家既不復用人無取者未詳何者的是也大觀卷二十一政和四三二頁鵄頭味鹹平無毒主治頭風眩顛倒癎疾即世人呼為老鵄者一名作緑音又有雕鶚並相似而大雖不限雌雄恐雄者當勝今合鵄頭酒用之當微炙不用蠧蟲者新修二三六頁大觀卷十九政和四三頁注鴆鳥毛有大毒入五藏爛殺人其口主殺蝮蛇毒一名日生南海此乃是兩種鴆鳥狀如孔雀五色雜斑高大黑頭赤喙出交廣深山中日鳥狀如黑傖雞其共禁大朽樹令反覓蛇吞之作聲似云同力故江東人呼為同力鳥並噉蛇人誤食其肉亦即死鴆毛羽不可近人而並治毒蛇帶鴆喙亦辟蛇昔時皆用鴆毛為毒酒故名鴆酒頃來不復爾又云有物赤色狀如龍名海薑生海中亦大有毒甚於鴆羽也新修三六七頁大觀卷三十政和五四七頁注鸕鷀屎一名蜀水華主去面黑黶志頭微寒主治及噎燒服之溪谷間甚多見之當自取其屎擇用白處市賣不可信骨亦主魚哽此鳥不卵生口吐其獨為一異也新修二三六頁大觀卷十九政和四四頁注孔雀屎微寒主治女子帶下小便不利出廣益諸州都下亦養之方家不見用其屎也新修二三五頁大觀卷十九政和四一頁注豚卵味甘溫無毒主治驚癎癲疾鬼疰蠱毒除寒熱賁豚五癃邪氣攣縮一名豚顛陰乾藏之勿令敗豬懸蹄主治五痔伏熱在腸腸癰內蝕豬四足小寒治傷撻諸敗瘡下乳汁心主驚邪憂恚腎冷和理腎氣通利膀胱膽治傷寒熱渴肚補中益氣止渴利齒主小兒驚癎五月五日取鬐膏主生髮肪膏主煎諸膏藥解斑貓芫青毒豭豬肉味酸冷治狂病凡豬肉味苦主閉血脈弱筋骨豬為用最多惟肉不宜人人有多食皆能暴肥此蓋虛肌故也其脂能悅澤皮膚作手膏不皸裂肪膏煎藥無不用之勿令中水臘月者歷年不壤頸上膏謂之負革脂入道家用其屎汁極治溫毒食其肉飲酒不可卧秫稻穰中又白豬蹄白雜青者不可食食豬膏又忌烏梅也吐魯番出土集注殘簡新修二一八頁大觀卷一八政和三八八頁注屎味辛平有毒主治蠱毒鬼疰逐不祥邪破五癃利小便生高谷山平谷有兩種有胡有越紫胸輕小者是越不入藥用胸斑黑聲大者是胡世呼胡為夏候其作窠喜長人言有容一匹絹者令家富窠亦入藥用與屎同多以作湯洗浴治小兒驚邪也窠戶有北向及尾倔色白者皆數百歲食之延年凡肉不可食令人入水為蛟龍所吞亦不宜殺之吐魯番出土殘卷集注新修二三五頁大觀卷一九政和四一頁注天鼠屎味辛寒有毒主治面癰腫皮膚説説時痛腹中血氣破寒熱積聚除驚悸去面黑一名鼠沽一名石肝生合浦山谷十月十二月取惡白斂白薇方家不復用世不識也吐魯番出土集注殘卷大觀卷十九政和四二頁注鼹鼠味鹹無毒主治癰疽諸瘻蝕惡瘡陰爛瘡在土中行五月取令乾燔之世中一名鼠一名鼹鼠形如鼠大而無尾黑色長鼻甚強恆穿耕地中行討掘即得今諸山林中又有一獸大如水牛形似豬灰赤色下腳似象胸前尾上皆白有力而鈍亦名鼹鼠人張綱取食之肉亦似牛肉多以作脯其膏亦云主瘻乃云此是鼠王其精溺一滴落地輒成一鼠穀有鼠災年則多出恐非虛爾穀字一作此鼠蹄燒末酒服又以骨搗碎釀酒將服之並治瘻良驗也吐魯番出土殘卷集注新修二二頁大觀卷十八政和三九三頁注鼠主墮胎生乳易生山都平谷鸓是鼠一名飛生狀如蝙蝠大如鵄毛紫色暗夜行飛行生人取其皮毛以與産婦持之令兒易出又有水馬生海中是魚蝦類狀如馬形亦主易産此鼺鼠别類而同一條中當以其是皮毛之物也今亦在副品限也新修二一六頁大觀卷十八政和三九三頁注牡鼠微溫無毒主治踒折續筋骨搗敷之三日一易四足及尾主婦人墮胎易産肉熱無毒主治小兒哺露大腹炙食之糞微寒無毒主治小兒癎疾大腹時行勞復牡鼠父鼠也其屎兩頭尖專治勞復鼠目主明目夜見書術家用之臘月鼠燒之辟惡氣膏煎之亦治諸瘡膽主目暗但才死膽便消故不可得之大觀卷二十二政和四四頁注斑貓味辛寒主治寒熱鬼疰蠱毒鼠瘻疥癬惡瘡疽蝕死肌破石癃血積傷人肌墮胎一名龍尾生河東川谷八月取陰乾馬畏巴豆丹參空青惡膚青豆花時取之甲上黃黑斑色如巴豆大者是也大觀卷二十二政和四四八頁芫青味辛微溫有毒主治蠱毒風疰鬼疰墮胎三月取暴乾芫花時取之青黑色亦治鼠瘻大觀卷二十二政和四五四頁葛上亭長味辛微溫有毒主治蠱毒鬼疰破淋結積聚墮胎七月取暴乾葛花時取之身黑而頭赤喻如人著玄衣赤幘故名亭長此一蟲五變為治皆相似二月三月在芫花上即呼芫青四月五月在王不留行上即呼王不留行蟲六月七月在葛花上即呼為葛上亭長八月在豆花上即呼斑貓九月十月欲還地蟄即呼為地膽此是偽地膽爾為治猶同其類亭長腹中有卵白如米粒主治諸淋結也大觀卷二十二政和四四六頁注蜘蛛微寒主治大人小兒七月七日取其網治喜忘蜘蛛類數十種爾雅止載七八種爾今此用懸網狀如魚者亦名蜂及蜈蚣螫人取置肉上則能吸毒又以斷瘧及乾嘔霍亂術家取其網著衣領中辟忘有赤斑者世名絡新婦亦入方術用之其餘雜種並不及藥詩云蠨蛸在户正謂此也大觀卷二十二政和四四四頁注蜻蛉微寒主強陰止精此有五六種今用青色大眼者一名諸乘世呼胡蜊道家用以止精眼可化為青珠其餘黃細及黑者不入藥用一名蜻蜓大觀卷二十二政和四五五頁木味苦平有毒主治目赤痛眥傷淚出瘀血血閉寒熱酸無子一名魂常生漢中川澤五月取此不噉血狀似而小近道草中不見有市人亦少有賣者方家所用惟是蜚也大觀卷二十一政和四三三頁蜚味苦微寒有毒主逐瘀血破下血積堅痞癥瘕寒熱通利血脈及九竅女子月水不通積聚除賊血在胸腹五藏者及喉痺結塞生江夏川谷五月取腹有血者良此即今噉牛馬血者伺其腹滿掩取乾之方家皆呼為虻蟲矣大觀卷二十一政和四三三頁蜚蠊味鹹寒有毒主治血瘀癥堅寒熱破積聚喉咽痺內塞無子通利血脈生晉陽川及人家屋間立秋採形亦似蟲而輕小能飛本在草中八月九月知寒多入人家屋里逃爾有兩三種以作廉薑氣者為真南人亦噉之大觀卷二十一政和四三三頁注水蛭味鹹苦平微寒有毒主逐惡血瘀血月閉破血瘕積聚無子利水道又墮胎一名蚑一名至掌生雷澤池澤五月六月採暴乾蚑今復有數種此用馬蜞得人腹中有血者仍乾為佳山蚑及諸小者皆不用楚王食寒葅所得而吞之果能去結積雖日陰祐亦是物性兼然大觀卷二十二政和四四八頁注
