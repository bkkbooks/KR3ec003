body:
  text: 卷第七果菜米穀有名無實果部藥物上品豆蔻味辛溫無毒主溫中心腹痛嘔吐去口臭氣生南海味辛烈者為好甚香可恆含之其五和糝中物皆宜人廉薑最溫中下氣益智熱枸櫞溫甘蕉麂目並小冷爾新修二四二頁大觀卷二十三政和四六頁注葡萄味甘平無毒主治筋骨濕痺益氣倍力強志令人肥健耐飢忍風寒久食輕身不老延年可作酒逐水利小便生山谷魏國使人多來狀如五味子而甘美可作酒云用其藤汁殊美好北國人多肥健耐寒蓋食斯乎不植淮南亦如橘之變於河北矣人説即是此間櫻薁恐如彼之枳類橘耶新修二四二頁大觀卷二十三政和四六三頁注蓮虆味酸鹹平無毒主安五藏益精氣長陰令堅強志倍力有子又治暴中風身熱大驚久不老一名覆盆一名陵纍一名陰纍生荆山平澤及宛朐李云即是人所食莓爾新修二四三頁大觀卷二十三政和四六四頁注覆盆子味甘平無毒主益氣輕身令髮不白五月採實蓬虆是根名方家不用乃昌容所服以易顏色者也覆盆是實名李云是莓子乃似覆盆之形而以津汁為味其核甚微細藥中所用覆盆子小異此未詳孰是新修二四四頁大觀卷二十三政和四六五頁注大棗味甘平無毒主治心腹邪氣安中養脾助十二經平胃氣通九竅補少氣少津身中不足大驚四肢重和百藥強力除煩悶心下懸腸澼久服輕身長年不飢神仙一名乾棗一名美棗一名良棗八月採暴乾三歲陳核中人燔之味苦主腹痛邪氣生棗味甘辛多食令人多寒熱羸瘦者不可食葉覆麻黃能令出汗生河東平澤大棗殺烏頭毒舊云河東猗氏縣棗特異今出青州彭城棗形小核細多膏甚甜鬱州互市亦得之而鬱州者亦好小不及爾江東臨沂金城棗形大而虛少脂好者亦可用南棗大惡殆不堪噉道家方藥以棗為佳餌其皮利肉補虛所以合湯皆擘用之新修二四五頁大觀卷二十三政和四六二頁注藕實莖味甘平寒無毒主補中養神益氣力除百疾久服輕身耐老不飢延年一名水芝丹一名蓮生汝南池澤八月採即今蓮子八月九月取堅黑者乾搗破之花及根並入神仙用今云莖恐即是根不爾不應言甘也宋帝時太官作羊血庖人削藕皮誤落血中遂皆散不凝醫仍用藕治血多效也新修二四七頁大觀卷二十三政和四六頁注雞頭實味甘平無毒主治濕痺腰脊膝痛補中除暴疾益精氣強志令耳目聰明久服輕身不飢耐老神仙一名鴈喙實一名芡生雷澤池澤八月採此即今蒍子子形上花似雞冠故名雞頭仙方取此並蓮實合餌能令小兒不長自别有方正爾食之亦當益人新修二四七頁大觀卷二十三政和四六六頁注芰實味甘平無毒主安中補藏不飢輕身一名廬江間最多皆取火煏以為米充糧今多蒸曝蜜和餌之斷榖長生水族中又有菰首性冷恐非上品被霜後食之令陰不強又不可雜白蜜食令生蟲新修二四八頁大觀卷二十三政和四六五頁注栗味鹹溫無毒主益氣厚腸胃補腎氣令人忍飢生山陰九月採今會稽最豐諸暨栗形大皮厚不美剡及始豐皮薄而甜相傳有人患腳弱往栗樹下食數升便能起行此是補腎之義然應生噉之今若餌服故宜蒸曝之新修二四九頁大觀卷二十三政和四六四頁注嬰桃味辛平無毒主止泄腸澼除熱調中益脾氣令人好色美志一名牛桃一名英豆實大如麥多毛四月採陰乾此非今果實櫻桃形乃相似而實乖異山間乃時有方藥亦不復用耳新修三六七頁大觀卷三十政和五四六頁注櫻桃味甘主調中益脾氣令人好顏色美志此即今朱櫻桃味甘酸可食而所主又與前嬰桃相似恐醫家濫載之未必是今者爾又故頽子凌冬不凋子亦應益人或云寒熱病不可食新修二四九頁大觀卷二十三政和四六六頁注中品梅實味酸平無毒主下氣除熱煩滿安心肢體痛偏枯不仁死肌去青黑志惡疾止下痢好唾口乾生漢中川五月採火乾此亦是今烏梅也用之去核微熬之傷寒煩熱水漬飲汁生梅子及白梅亦應相似今人多用白梅和藥以點志蝕惡肉也服黃精人云禁食梅實新修二五頁大觀卷二十三政和四六六頁注柿味甘無毒寒主通鼻耳氣腸澼不足柿有數種云今烏柿火熏者性熱斷下又治狗齧瘡火熘者亦好日乾者性冷鹿心柿尤不可多食令人腹痛利生柿彌冷又有椑色青惟堪生噉其性冷復乃甚於柿散石熱家噉之亦無嫌不入藥用新修二五一頁大觀卷二十三政和四六八頁注木瓜實味酸溫無毒主治濕痺邪氣霍亂大吐下轉筋不止其枝亦可煮用山陰蘭亭尤多彼人以為良藥最治轉筋轉筋時但呼其名及書上作木瓜字皆愈理亦不可尋解世人拄木瓜杖云利筋脛又有榠樝大而黃可進酒去痰又樝子澀斷利禮云樝梨日欑至鄭公不識樝乃云是梨之不藏者然則古亦以樝為果今則不入例也凡此屬多不益人者也新修二五一頁大觀卷二十三政和四六七頁注甘蔗味甘平無毒主下氣和中補脾氣利大腸今出江東為勝廬陵亦有好者廣州人種數年生皆如大竹長丈餘取汁以為沙糖甚益人又有荻蔗節疏而細亦可噉也新修二五二頁大觀卷二十三政和四七一頁注芋味辛平有毒主寬腸胃充肌膚滑中一名土芝錢塘最多生則有毒蘞不可食性滑中下石服餌家所忌種芋三年不採成梠芋又别有野芋名尤芋形葉相似如一根並殺人人不識而食垂死者他人以土漿及糞汁與飲之得活矣新修二五四頁大觀卷二十三政和四六八頁注烏芋味苦甘微寒無毒主治消渴痺熱熱中益氣一名藉姑一名水萍二月生葉葉如芋三月三日採根暴乾今藉姑生水田中葉有丫狀如澤瀉不正似芋其根黃似芋子而小煮食之乃可噉疑其有烏名今有烏者根極相似細而美葉乖異狀頭如莞草呼為鳧茨恐此非也新修二五四頁大觀卷二十三政和四六九頁注下品鬱核味酸平無毒主治大腹水腫面目四肢浮腫利小便水道根主齒齗腫齲齒堅齒去白蟲一名爵李一名車下李一名棣生高山川谷及丘陵上五月六月採根山野處處有其子熟赤色亦可噉之新修一五六頁大觀卷十四政和三四五頁注杏核人味甘苦溫冷利有毒主治咳逆上氣雷鳴喉痺下氣産乳金創寒心賁豚驚癎心下煩熱風氣去來時行頭痛解肌消心下急殺狗毒一名杏子五月採其兩人者殺人可以毒狗花味苦無毒主補不足女子傷中寒熱痺厥逆實味酸不可多食傷筋骨生晉山川谷得火良惡黃耆黃芩葛根解錫毒畏蘘草處處有藥中多用之湯浸去赤皮熬令黃新修二五五頁大觀卷二十三政和四七三頁注桃核人味苦甘平無毒主治瘀血閉瘕邪氣殺小蟲主咳逆上氣消心下堅除卒暴擊血破癥瘕通月水止痛七月採取人陰乾桃華殺疰惡鬼令人好顏色味苦平無毒主除水氣破石淋利大小便下三蟲悅澤人面三月三日採陰乾桃梟殺百鬼精物味苦微溫主治中惡腹痛殺精魅五毒不祥一名桃奴一名梟景是實著樹不落實中者正月採之桃毛主下血瘕寒熱積聚無子帶下諸疾破堅閉刮取實毛用之桃蠧主殺鬼辟邪惡不祥食桃樹蟲也其莖白皮味苦辛無毒除邪鬼中惡腹痛去胃中熱其葉味苦辛平無毒主除尸蟲出瘡中蟲其膠鍊之主保中不飢忍風寒其實味酸多食令人有熱生太川谷今處處有京口者亦好當取解核種之為佳又有山龍桃其人不堪用世用桃人作酪乃言冷桃膠入仙家用三月三日採花亦供丹方所需方言服三樹桃花盡則面色如桃花人亦無試之者服朮人云禁食桃也新修二五六頁大觀卷二十三政和四七一頁注李核人味甘苦平無毒主治僵仆躋瘀血骨痛根皮大寒主治消渴止心煩逆奔氣實味苦主除痼熱調中李類又多京口有麥李麥秀時熟小而甜脆核不入藥今此用姑熟所出南居李解核如杏子者為佳凡李實熟食之皆好不可合雀肉食又不可臨水上噉之李皮水煎含之治齒痛佳新修二五九頁大觀卷二十三政和四七七頁注梨味苦寒多食令人寒中主治金創乳婦尤不可食梨種復殊多並皆冷利世人以為快果不入藥用食之損人新修二五九頁大觀卷二十三政和四七六頁注奈味苦寒多食令人臚脹病人尤甚奈江南乃有而北國最豐皆以作脯不宜人有林檎相似而小亦恐非益人者枇杷葉已出上卷其實乃宜人東陽尋陽最多也新修二六頁大觀卷二十三政和四七八頁注安石榴味酸甘損人不可多食其酸實殼主治下痢止漏精其東行根主治蛔蟲寸白石榴以花赤可愛故人多植之尤為外國所重入藥唯根殼而已其味有甜酢藥家用酢者其子為服食所忌也新修二六頁大觀卷二十三政和四七五頁注菜部藥物上品白瓜子味甘平寒無毒主令人悅澤好顔色益氣不飢久服輕身耐老主除煩滿不樂久服寒中可作面脂令悅澤一名水一名白爪子生嵩高平澤冬瓜人也八月採之白冬瓜微寒主除小腹水脹利小便止渴被霜後合取置經年破取核水洗燥乃擂取人用之冬瓜性冷利解毒消渴止煩悶直搗絞汁服之新修二六二頁大觀卷二十七政和五四頁注冬葵子味甘寒無毒主治五藏六府寒熱羸瘦五癃利小便治婦人乳難內閉久服堅骨長肌肉輕身延年生少室十二月採黃芩為之使新修二六五頁大觀卷二十七政和四九九頁葵根味甘寒無毒主治惡瘡治淋利小便解蜀椒毒葉為百菜主其心傷人以秋種葵覆養經冬至春作子謂之冬葵多入藥用至滑利能下石淋春葵子亦滑利不堪餘藥用根故是常葵爾葉尤冷利不可多食術家取此葵子微炒令熚烢散著濕地遍踏之朝種葵暮生遠不過宿又云取羊角馬蹄燒作灰散於濕地即生羅勒世呼為西王母菜食之益人生菜中又有胡荽蕓臺白苣邪蒿並不可多食大都服藥通忌生菜爾佛家齋忌食薰渠不的知是何菜多言今蕓臺憎其臭故也新修二六五頁大觀卷二十七政和四九九頁注莧實味甘寒大寒無毒主治青盲白翳明目除邪利大小便去寒熱殺蛔蟲久服不飢輕身一名馬莧一名莫實細莧亦同生淮陽川澤及田中葉如藍十一月採李云即莧菜也今馬莧别一種布地生實至微細俗呼為馬齒莧亦可食小酸恐非今莧實其莧實當是白莧所以云細莧亦同葉如藍也細莧即是粳莧食之乃勝而並冷利被霜乃熟故云十一月採又有赤莧莖純紫能治赤下而不堪食藥方用莧實甚稀斷榖方中時用之新修缺莧實大觀卷二十七政和五頁注苦菜味苦寒無毒主治五藏邪氣厭榖胃痺腸澼渴熱中疾惡瘡久服益氣聰察少卧輕身耐老耐飢寒高氣不老一名荼苦一名選一名遊冬生益州川谷生山陵道傍凌冬不死三月三日採陰乾疑此則是今茗茗一名荼又令人不眠亦凌冬不凋而嫌其止生益州益州乃有苦菜正是苦識爾上卷上品白英下已注之桐君藥録云苦菜葉三月生扶疏六月華從葉出莖直花黃八月實黑實落根復生冬不枯今茗極似此西陽武昌及盧江晉熙茗皆好東人止作青茗茗皆有脖飲之宜人凡所飲物有茗及木葉天門冬苗並菝葜皆益人餘物並冷利又巴東間别有真荼火煏作卷結為飲亦令人不眠恐或是此世中多煮檀葉及大皂李作荼飲並冷又南方有瓜蘆木亦似茗至苦澀取其葉作屑煮飲汁即通夜不眠煮鹽人唯資此飲爾交廣最所重客來先設乃加以香芼輩爾新修二六六頁大觀卷二十七政和五六頁注薺味甘溫無毒主利肝氣和中其實主明目目痛薺類又多此是人可食者生葉作葅羹亦佳詩云誰謂荼苦其甘如薺又疑荼是菜類矣新修二六八頁大觀卷二十七政和五八頁注蕪青及蘆蔔味苦溫無毒主利五藏輕身益氣可長食之蕪菁子主明目蘆蔔是今溫菘其根可食葉不中噉蕪菁根乃細於溫菘而葉似菘好食西川惟種此而其子與溫菘甚相似小細爾世方無用服食家亦煉餌之而不云蘆蔔子恐不用也世人蒸其根及作葅皆好但小熏臭爾細而過辛不宜服也新修二六八頁大觀卷二十七政和五一頁注菘味甘溫無毒主通利腸胃除胸中煩解酒渴菜中有菘最為恆食性和利人無餘逆忤今人多食如似小冷而又耐霜雪其子可作油敷頭長髮塗刀劍令不鏽其有數種猶是一類正論其美與不美爾服藥有甘草而食菘令病不除新修二七頁大觀卷二十七政和五六頁注芥味辛溫無毒歸鼻主除腎邪氣利九竅明耳目安中久服溫中似菘而有毛味好作葅亦生食其子可藏冬瓜又有莨以作葅甚快新修二七頁大觀卷二十七政和五五頁注苜蓿味苦平無毒主安中利人可久食長安中乃有苜蓿園北人甚重此江南人不甚食之以無氣味故也外國復别有苜蓿草以治目非此類也新修二七一頁大觀卷二十七政和五八頁注荏子味辛溫無毒主治咳逆下氣溫中補體葉主調中去臭氣九月採陰乾荏狀如蘇高大白色不甚香其子研之雜米作糜甚肥美下氣補益東人呼為以其似蘇字但除禾邊故也榨其子作油日煎之即今油帛及和漆用者服食斷穀亦用之名為重油新修二七一頁大觀卷二十七政和五七頁注中品蓼實味辛溫無毒主明目溫中耐風寒下水氣面目浮腫癰瘍葉歸舌除大小腸邪氣利中益志馬蓼去腸中蛭蟲輕身生雷澤川澤此類又多人所食有三種一是紫蓼相似而紫色一是香蓼亦相似而香並不甚辛而好食一是青蓼人家常有其葉有圓有尖以圓者為勝所用即是此乾之以釀酒主治風冷大良馬蓼生下濕地莖斑葉大有黑點亦有兩三種其最大者名蘢古即是葒草已在上卷中品新修二七二頁大觀卷二十八政和五九頁注蔥實味辛溫無毒主補中不足其莖蔥白平可作湯主治傷寒寒熱出汗中風面目腫傷寒骨肉痛喉痺不通安胎歸目除肝邪氣安中利五藏益目精殺百藥毒蔥根主傷寒頭痛蔥汁平溫主溺血解藜蘆毒新修二七三頁大觀卷二十八政和五一頁注薤味辛苦溫無毒主治金創創敗輕身不飢耐老歸骨菜芝也除寒熱去水氣溫中散結利病人諸瘡中風寒水腫以塗之生魯山平澤蔥薤異物而今共條本經既無韭以其同類故也今亦取為副品種數方家多用蔥白及葉中涕名蔥苒無復用實者蔥亦有寒熱其白冷青熱傷寒湯不得令有青也能消桂為水亦化五石仙術所用薤又溫補仙方及服食家皆須之偏入諸膏用並不可生噉熏辛為忌耳新修二七四頁大觀卷二十八政和五一二頁注韭味辛微酸溫無毒歸心主安五藏除胃中熱利病人可久食子主夢泄精溺白根主養髮韭子入棘剌諸丸主漏精用根入髮膏用葉人以煮鯽魚鮓斷卒下痢多驗但此菜殊辛臭雖煮食之便出猶奇熏灼不如蔥薤熟則無氣最是養性所忌也生薑是常食物其已隨乾薑在中品今依次入食更别顯之而復有小異處所以彌宜書生薑微溫辛歸五藏去淡下氣止嘔吐除風邪寒熱久服少志少智傷心氣如此則不可多食長御有病者是所宜也爾今人噉諸辛辣物惟此最恆故論語云不撤薑食即可常噉但勿過多爾新修二七五頁大觀卷二十八政和五一一頁注白蘘荷微溫主治中蠱及瘧今人乃呼赤者為蘘荷白者為覆葅葉同一種爾於人食之赤者為勝藥用白者中蠱者服其汁並卧其葉即呼蠱主姓名亦主諸溪毒沙蝨輩多食損藥勢又不利腳人家種白蘘荷亦云辟蛇新修二七六頁大觀卷二十八政和五一三頁注菾菜味甘苦大寒主治時行壯熱解風熱毒即今以雜作鮓蒸者菾作甜音字亦作忝時行熱病初得便搗飲汁皆除差新修二七六頁大觀卷二十八政和五一三頁注蘇味辛溫主下氣除寒中子尤良葉下紫色而氣甚香其無紫色不香似荏者名野蘇不任用子主下氣與橘皮相宜同治也新修二七七頁大觀卷二十八政和五一四頁注水蘇味辛微溫無毒主下氣殺榖除飲食辟口臭去毒辟惡氣久服通神明輕身耐老主吐血衄血血崩一名雞蘇一名勞祖一名芥苴一名瓜苴一名道華生九真池澤七月採方藥不用世中莫識昔九真遼遠亦無能識訪之新修二七七頁大觀卷二十八政和五一四頁注香薷味辛微溫主治霍亂腹痛吐下散水腫處處有此惟供生食十月中取乾之霍亂煮飲無不差作煎除水腫尤良之也新修二七八頁大觀卷二十八政和五一五頁注下品瓜蒂味苦寒有毒主治大水身面四肢浮腫下水殺蠱毒咳逆上氣及食諸果不消病在胸腹中皆吐下之去鼻中息肉黃疸其花主心痛咳逆生嵩高平澤七月七日採陰乾瓜蒂多用早青蒂此云七月七日採便是甜瓜蒂也人亦有用熟瓜蒂者取吐乃無異此止論其蒂所主爾今瓜例皆冷利早青者尤甚熟瓜乃有數種除瓤食不害人若覺食多入水自漬便消永嘉有寒瓜甚大今每即取藏經年食之亦有再熟瓜又有越瓜人以作葅者食之亦冷並非藥用爾博物志云水浸至項食瓜無數又云斑瓜花有毒分採之瓜皮殺蟲也新修二六四頁大觀卷二十七政和五三頁注苦瓠味苦寒有毒主治大水面目四肢浮腫下水令人吐生晉地川澤瓠與冬瓜氣類同輩而有上下之殊當是為其苦者爾今瓠自忽有苦者如膽不可食非别生一種也又有瓠亦是瓠類小者名瓢食之乃勝瓠凡此等皆利水道所以在夏月食之大理自不及冬瓜矣新修二八頁大觀卷二十九政和五一六頁注水斳味甘平無毒主治止血養精保血脈益氣令人肥健嗜食一名水英生南海池澤論斳主治乃應是上品未解何意乃在下其二月三月英時善可作葅及熟爚食之亦利小便消水腫又有渣斳可為生菜此斳亦可生噉世中皆作芹字也新修二八一頁大觀卷二十九政和五一九