body:
  text: 卷第二玉石三品上品玉屑味甘平無毒主除胃中熱喘息煩滿止渴屑如麻豆服之久服輕身長年生藍田采無時惡鹿角此云玉屑亦是以玉為屑非應别一種物也仙經服瑴玉有擣如米粒乃以苦酒輩消令如泥亦有合為漿者凡服玉皆不得用已成器物及塚中玉璞也好玉出藍田及南陽徐善亭部界中日南盧容水中外國於闐疎勒諸處皆善仙方名玉為玄真潔白如猪膏叩之鳴者是真也其比類甚多相似宜精别之所以燕石入笥卞氏長號也新修三頁大觀卷三政和八一頁注玉泉味甘平無毒主治柔筋强骨安魂魄長肌肉益氣利血脉治婦人帶下十二病除氣癃明耳目久服耐不飢渴不老神仙輕身長年人臨死服五斤死三年色不變一名玉札生藍田山谷采無時畏欵冬花藍田在長安東南舊出美玉此當是玉之精華白者質色明澈可消之為水故名玉泉今人無復的識者惟通呼為玉爾張華又云服玉用藍田瑴玉白色者此物平常服之則應神仙有人臨死服五斤死經三年其色不變古來發塚見屍如生者其身腹內外無不大有金玉漢制王公葬皆用珠襦玉匣是使不朽故也煉服之法亦應依仙經服玉法水屑隨宜雖日性平而服玉者亦多乃發熱如寒食散狀金玉既天地重寶不比餘石若未深解節度勿輕用之新修三頁大觀卷三政和八二頁注丹沙味甘微寒無毒主治身體五藏百病養精神安魂魄益氣明目通血脉止煩滿消渴益精神悦澤人面殺精魅除中惡腹痛毒氣疥瘻諸瘡久服通神明不老輕身神仙能化為汞作末名真朱光色如雲母可析者良生符陵山谷採無時惡礠石畏鹹水案此化為汞及名真朱者即是今朱沙也世醫皆别取武都仇池雄黄夾雌黃者名為丹沙方家亦往往俱用此為謬矣符陵是涪州接巴郡南今無復采者乃出武陵西川諸蠻夷中皆通屬巴地故謂之巴沙仙經亦用越沙即出廣州臨漳者此二處並好惟須光明瑩澈為佳如雲母片者謂雲母沙如樗蒲子紫石英形者謂馬齒沙亦好如大小豆及大塊圓滑者謂豆沙細末碎者謂末沙此二種粗不入藥用但可畫用爾採沙皆鑿坎入數丈許雖同出一郡縣亦有好惡地有水井勝火井也鍊餌之法備載仙方最為長生之寶新修四頁大觀卷三政和七九頁注水銀味辛寒有毒主治疥瘙痂瘍白秃殺皮膚中蟲蝨墮胎除熱以傅男子陰陰消無氣殺金銀銅錫毒鎔化還復為丹久服神仙不死一名汞生符陵平土出於丹砂畏礠石今水銀有生熟此云生符陵平土者是出朱沙腹中亦别出沙地皆青白色最勝出於丹沙者是今燒麁末朱沙所得色小白濁不及生者甚能消金銀使成泥人以鍍物是也還復為丹事出仙經酒和日曝服之長生燒時飛著釜上灰名汞粉世呼為水銀灰最能去蝨新修四頁大觀卷四政和一七頁注空青味甘酸寒大寒無毒主治青耳聾明目利九竅通血脉養精神益肝氣治目赤痛去膚瞖止淚出利水道下乳汁通關節破堅積久服輕身延年不老令人不忘志高神仙能化銅鐵鉛錫作金生益州山谷及越巂山有銅處銅精熏則生空青其腹中空三月中旬採亦無時越巂屬益州今出銅官者色最鮮深出始興者弗如益州諸郡無復有恐久不採之故也凉州西平郡有空青山亦甚多今空青俱圓實如鐵珠無空復者皆鑿土石中取之又以合丹成則化鉛為金矣諸石藥中惟此最貴醫方乃稀用之而多充畫也殊為可惜新修六頁大觀卷三政和九頁注曾青味酸小寒無毒主治目痛止淚出風痺利關節通九竅破癥堅積聚養肝膽除寒熱殺白蟲治頭風腦中寒止煩渴補不足盛陰氣久服輕身不老能化金銅生蜀中山谷及越巂採無時畏菟絲子此說與空青同山療體亦相似今銅官更無曾青惟出始興形纍纍如黄連相綴色理小類空青甚難得而貴仙經少用之化金之法事同空青新修八頁大觀卷三政和九一頁注白青味甘酸鹹平無毒主明目利九竅耳聾心下邪氣令人吐殺諸毒三蟲久服通神明輕身延年不老可消為銅劔辟五兵生豫章山谷採無時此醫方不復用市人亦無賣者惟仙經三十六水方中時有須處銅劔之法具在九元子術中新修九頁大觀卷三政和九四頁注扁青味甘平無毒主治目痛明目折跌癰腫金創不瘳破積聚解毒氣利精神去寒熱風痺及丈夫莖中百病益精久服輕身不老生朱崖山谷武都朱提採無時仙經世方都無用者朱崖郡先屬交州在南海中晉代省之朱提郡今屬寧州新修十頁大觀卷三政和九六頁注石膽味酸辛寒有毒主明目目痛金創諸癎痙女子陰蝕痛石淋寒熱崩中下血諸邪毒氣令人有子散癓積欬逆上氣及鼠瘻惡瘡鍊餌服之不老久服增壽神仙能化鐵為銅成金銀一名畢石一名黑石一名碁石一名銅勒生羌道山谷羌里句二月庚子辛丑日採水英為之使畏牡桂菌桂芫花辛夷白薇仙經有用此處世方甚少此藥殆絶今人時有採者其色青緑狀如瑠璃而有白文易破折梁州信都無復有世用乃以青色礬石當之殊無髣髴仙經一名立制石新修一一頁大觀卷三政和八九頁注雲母味甘平無毒主治身皮中風寒熱如在車舩上除邪氣安五藏益子精明目下氣堅肌續絶補中療五勞七傷虚損少氣止痢久服輕身延年悦澤不老耐寒暑志高神仙一名雲珠色多赤一名雲華五色具一名雲英色多青一名雲液色多白一名雲砂色青黃一名磷色正白生太山山谷齊廬山及琅琊北定山石閒二月採澤瀉為之使畏鱓甲反流水惡徐長卿案仙經雲母乃有八種向日視之色青白多黑者名雲母色黄白多青名雲英色青黄多赤名雲珠如冰露乍黄乍白名雲砂黄白皛皛名雲液皎然純白明澈名磷石此六種并好服而各有時月其黯黯純黑有文斑斑如鐵者名雲膽色雜黑而强肥者名涿此二種並不可服鍊之有法惟宜精細不爾入腹大害人今虚勞家丸散用之并只擣篩殊為未允琅琊在彭城東北青州亦有今江東惟有盧山者為勝以沙上養之歲月生長今鍊之用礬石則柔爛亦便是相畏之効百草上露乃勝東流水亦用五月茅屋溜水新修一三頁大觀卷三政和八頁注朴消味苦辛寒大寒無毒主治百病除寒熱邪氣逐六府積聚結固留癖胃中食飲熱結破留血閉絶停痰痞滿推陳致新能化七十二種石鍊餌服之輕身神仙鍊之白如銀能寒能熱能滑能澀能辛能苦能鹹能酸入地千歲不變色青白者佳黄者傷人赤者殺人一名消石朴生益州山谷有鹹水之陽採無時畏麦句薑今出益州北部汶山郡西川蠶陵二縣界生山崖上色多青白亦雜黑斑世人擇取白軟者以當消石用之當燒令汁沸出狀如礬石也仙經惟云消石能化他石今此亦云能化石疑必相似可試之新修一六頁大觀卷三政和八七頁注消石味苦辛寒大寒無毒主治五藏積熱胃脹閉滌去蓄結飲食推陳致新除邪氣治五藏十二經脉中百二十疾暴傷寒腹中大熱止煩滿消渴利小便及瘻蝕瘡鍊之如膏久服輕身天地至神之物能化成十二種石一名芒消生益州山谷及武都隴西西羌採無時螢火為之使惡苦參苦菜畏女菀治病亦與朴消相似仙經多用此消化諸石今無正識别此者頃來尋訪猶云與朴消同山所以朴消名消石朴也如此則非一種物先時有人得一種物其色理與朴消大同小異朏朏如握鹽雪不冰强燒之紫青烟起仍成灰不停沸如朴消云是真消石也此又云一名芒消今芒消乃是練朴消作之與後皇甫説同並未得覈研其驗須試效當更證記爾化消石法在三十六水方中隴西屬秦州在長安西羌中今宕昌以北諸山有鹹土處皆有之新修一八頁大觀卷三政和八五頁注礬石味酸寒無毒主治寒熱洩痢白沃陰蝕惡瘡目痛堅骨齒除固熱在骨髓去鼻中息肉鍊餌服之輕身不老增年歧伯云久服傷人骨能使鐵為銅一名羽一名羽澤生河西山及隴西武都石門採無時甘草為之使惡牡蠣今出益州北部西川從河西來色青白生者名馬齒礬已練成絶白蜀人又以當消石名白礬其黄黑者名雞屎礬不入藥惟堪鍍作以合熟銅投苦酒中塗鐵皆作銅色外雖銅色內質不變仙經單餌之丹方亦用世中合藥皆先火熬令沸燥以治齒痛多即壞齒是傷骨之證而云堅骨齒誠為疑也新修二二頁大觀卷三政和八四頁注芒消味辛苦大寒主治五藏積聚久熱胃閉除邪氣破留血腹中痰實結搏通經脉利大小便及月水破五淋推陳致新生於朴消石韋為之使畏麦句薑案神農本經無芒消只有消石名芒消爾後名醫别載此説其治與消石正同疑此即是消石舊出寧州黄白粒大味極辛苦頃來寧州道斷都絶今醫家多用煮練作者色全白粒細而味不甚烈此云生於朴消則作者亦好又皇甫士安解散消石大凡説云無朴消可用消石生山之陰鹽之膽也取石脾與消石以水煮之一斛得三斗正白如雪以水投中即消故名消石其味苦無毒主消渴熱中止煩滿三月採於赤山朴消者亦生山之陰有鹽鹹苦之水則朴消生於其陽其味苦無毒其色黄白主治熱腹中飽脹養胃消穀去邪氣亦得水而消其療與消石小異按如此説是取芒消合煮更成為真消石但不知石脾復是何物本草乃有石脾石肺人無識者皇甫既是安定人又明醫藥或當詳練之以朴消作芒消者但以暖湯淋朴消取汁清澄煮之減半出着木盆中經宿即成狀如白英石皆六道也作之忌雜人臨視今益州人復鍊礬石作消石絶柔白而味猶是礬石爾孔氏解散方又云熬鍊消石令沸定汁盡如此消石猶是有汁也今仙家須之能化他石乃用於理第一新修二頁大觀卷三政和八六頁注滑石味甘寒大寒無毒主治身熱洩澼女子乳難癃閉利小便蕩胃中積聚寒熱益精氣通九竅六府津液去留結止渴令人利中久服耐飢長年一名液石一名共石一名脱石一名畨石生赭山谷及太山之陰或掖北白山或卷山採無時石韋為之使惡曾青滑石色正白仙經用之以為泥又有冷石小青黄性並冷利亦能熨油污衣物今出湘州始安郡諸處初取軟如泥久漸堅强人多以作塚中明器物並散熱人用之不正入方藥赭陽縣先屬南陽漢哀帝置明本經所注郡縣必是後漢時也掖縣屬青州東萊卷縣屬司州榮陽新修二三頁大觀卷三政和八八頁注紫石英味甘辛温無毒主治心腹欬補不足女子風寒在子宮絶孕十年無子治上氣心腹痛寒熱邪氣結氣補心氣不足定驚悸安魂魄填下膲止消渴除胃中久寒散癰腫令人悦澤久輕身延年生太山山谷採無時長石為之使得茯苓人參芍藥共治心中結氣得天雄昌蒲共治霍亂畏扁青附子不欲蟬甲黄連麦句薑今第一用太山石色重澈下有根次出雹零山亦好又有南城石無根又有青綿石色亦重黑不明澈又有林邑石腹裹必有一物如眼吳興石四面纔有紫色無光澤會稽諸暨石形色如石榴子先時並雜用今丸散家採擇惟太山最勝余處者可作丸酒餌仙經不正用而為世方所重也新修二五頁大觀卷三政和九二頁注白石英味甘辛微温無毒主治消渴陰痿不足咳逆胸膈間久寒益氣除風濕痺治肺痿下氣利小便補五藏通日月光久服輕身長年耐寒熱生華陰山谷及太山大如指長二三寸六面如削白澈有光其黄端白稜名黄石英赤端名赤石英青端名青石英黑端名黑石英二月採亦無時惡馬目毒公今醫家用新安所出極細長白澈者壽陽八公山多大者不正用之仙經大小並有用惟須精白無瑕雜者如此説則大者為佳其四色英今不復用新修二八頁大觀卷三政和九二頁注青石赤石黄石白石黑石脂等味甘平主治黄疸洩痢腸澼膿血陰蝕下血赤白邪氣癰腫疽痔惡瘡頭瘍疥瘙久服補髓益氣肥健不飢輕身延年五石脂各隨五色補五藏生南山之陽山谷中青石脂味酸平無毒主養肝膽氣明目治黄疸洩痢腸澼女子帶下百病及疽痔惡瘡久服補髓益氣不飢延年生齊區山及海崖採無時赤石脂味甘酸辛大温無毒主養心氣明目益精治腹痛洩澼下痢赤白小便利及癰疽瘡痔女子崩中漏下產難胞衣不出久服補髓好顏色益智不飢輕身延年生濟南射陽及太山之陰採無時惡大黄畏芫花黄石脂味苦平無毒主養脾氣安五藏調中大人小兒洩痢腸澼下膿血去白蟲除黄疸癰疽蟲久服輕身延年生嵩山色如鶯雛採無時曾青為之使惡細辛畏蜚蠊白石脂味甘酸平無毒主治養肺氣厚腸補骨髓治五藏驚悸不足心下煩止腹痛下水小腸澼熱溏便膿血女子崩中漏下赤白沃排癰疽瘡痔久服安心不飢輕身長年生太山之陰採無時得厚朴並米汁飲止便膿鷰屎為之使惡松脂畏黄芩黑石脂味鹹平無毒主治養腎氣强陰主陰蝕瘡止腸澼洩痢治口瘡咽痛久服益氣不飢延年一名石涅一名石墨出穎川陽城採無時此五石脂如本經治體亦相似别録各條所以具載今世用赤石白石二脂爾仙經亦用白石脂以塗丹釜好者出吳郡猶與赤石脂同源赤石脂多赤而色好惟可斷下不入五石散用好者亦出武陵建平義陽今五石散皆用義陽者出縣界東八十里狀如豚腦色鮮紅可愛隨採隨復而生不能斷痢而不用之餘三色脂有而無正用黑石脂乃可畫用爾新修二八三三一頁大觀卷三政和九三九四頁注太一禹餘糧味甘平無毒主治欬逆上氣癥瘕血閉漏下除邪氣肢節不利大飽絶力身重久服耐不飢輕身飛行千里神仙一名石腦生太山山谷九月採杜仲為之使畏貝母昌蒲鐵落今人惟總呼為太一禹餘糧自專是禹餘糧爾無復識太一者然治體亦相似仙經多用之四鎮丸亦總名太一禹餘糧新修三三頁大觀卷三政和九一頁注禹餘糧味甘寒平無毒主治欬逆寒熱煩滿下利赤白血閉癥瘕大熱治小腹痛結煩疼練餌服之不飢輕身延年一名白餘糧生東海池澤及山島中或池澤中今多出東陽形如鵝鴨卵外有殼重叠中有黄细末如蒲黄無沙者為佳近年茅山鑿地大得之極精好乃有紫華靡靡仙經服食用之南人又呼平澤中有一種藤葉如菝葜根作塊有節似菝葜而色赤根形似署預謂為禹餘糧言昔禹行山乏食採此以充糧而棄其餘此云白餘糧也生池澤復有仿佛或疑今石者即是太一也張華云池多蓼者必有餘糧今廬江閒便是也適有人于銅官採空青於石坎大得黄赤色石極似今之餘糧而色過赤好疑此是太一也彼人呼為雌黄試塗物正如雄黄色爾新修三四頁大觀卷三政和九一頁注中品金屑味辛平有毒主鎮精神堅骨髓通利五藏除邪毒氣服之神仙生益州採無時金之所生處處皆有梁益寧三州及建晉多有出水沙中作屑謂之生金辟惡而有毒不煉服之殺人建晉亦有金沙出石中燒熔鼓鑄為碢雖被火亦未熟猶須更煉又高麗扶南及西域外國成器金皆煉熟可服仙經以蜜及猪肪牡荆酒輩煉餌柔軟服之神仙亦以合水銀作丹沙外醫方都無用當是猶慮其毒害故也仙方名金為太真新修三八頁大觀卷四政和一九頁注銀屑味辛平有毒主治安五藏定心神止驚悸除邪氣久服輕身長年生永昌採無時銀所出處亦與金同但皆是生石中耳煉餌法亦相似今醫方合鎮心丸用之不可正服爾為屑當以水銀磨令消也永昌本屬益州今屬寧州絶遠不復賓附仙經又有服煉法此當無正主治故不為本草所載古者名金為黄金銀為白金銅為赤金今銅有生熟煉熟者柔赤而本草並無用今銅青及大錢皆入方用並是生銅應在下品之例也新修三九頁大觀卷四政和一一頁注雄黄味苦甘平寒大温有毒主治寒熱鼠瘻惡瘡疽痔死肌治疥蟲瘡目痛鼻中息肉及絶筋破骨百節中大風積聚癖氣中惡腹痛鬼疰殺精物惡鬼邪氣百蟲毒腫勝五兵殺諸蛇虺毒解藜蘆毒悦澤人面煉食之輕身神仙餌服之皆飛入人腦中勝鬼神延年益壽保中不飢得銅可作金一名黄食生武都山谷燉煌山之陽採無時煉服雄黄法皆在仙經中以銅為金亦出黄白術中晉末已來氐羌中紛擾此物絶不復通人間時有三五兩其價如金合丸皆用石門始興石黄之好者爾始以齊初梁州互市微有所得將至都下余最先見於使人陳典籤處撿獲見十餘片伊輩不識此物是何等見有挾雌黄或謂是丹沙吾示語并更屬覔於是漸漸而來好者作雞冠色不臭而堅實若黯黑及虚軟者不好也武都氐羌是為仇池宕昌亦有與仇池正同而小劣燉煌在凉州西數千里所出者未甞得來江東不知當復云何此藥最要無所不入也新修四一頁大觀卷四政和一一頁注雌黄味辛甘平大寒有毒主治惡瘡頭秃痂疥殺毒蟲蝨身癢邪氣諸毒蝕鼻中息肉下部瘡身面白駮散皮膚死肌及恍惚邪氣殺蜂蛇毒鍊之久服輕身增年不老令人腦滿生武山谷與雄黄同山生其陰山有金金精熏則生雌黄採無時今雌黄出武都仇池者謂為武都仇池黄色小赤出扶南林邑者謂崑崙黄色如金而似雲母甲錯畫家所重依此言既有雌雄之名又同山之陰陽於合藥便當以武都為勝用之既稀又賤於崑崙仙經無單服法唯以合丹沙雄黄共飛煉為丹耳金精是雌黄銅精是空青而服空青反勝於雌黄其意難了也新修四三頁大觀卷四政和一三頁注石錘乳味甘温無毒主治欬逆上氣明目益精安五藏通百節利九竅下乳汁益氣補虚損治脚弱疼冷下焦傷竭强陰久服延年益壽好顏色不老令人有子不鍊服之令人淋一名公乳一名蘆石一名夏石生少室山谷及太山採無時蛇牀為之使惡牡丹玄石牡畏紫石英蘘草第一出始興而江陵及東境名山石洞亦皆有之惟通中輕薄如鵝翎管碎之如爪甲中無雁齒光明者為善長挺乃有一二尺者色黄以苦酒洗刷則白仙經用之少而世方所重亦甚貴新修一五頁大觀卷三政和八三頁注殷孽味辛温無毒主治爛傷瘀血洩痢寒熱鼠瘻癥瘕結氣脚冷疼弱一名薑石鍾乳根也生趙國山谷又梁山及南海採無時惡朮防己趙國屬冀州此即今人所呼孔公孽大如牛羊角長一二尺左右亦出始興新修四四頁大觀卷四政和一一三頁注孔公孽味辛温無毒主治傷食不化邪結氣惡瘡疽瘻痔利九竅下乳汁治男子陰瘡女子陰蝕及傷食病恒欲眠睡一名通石殷孽根也青黄色生梁山山谷木蘭為之使惡細辛梁山屬馮翊郡此即今鍾乳牀也亦出始興皆大塊折破之凡鍾乳之類三種同一體從石室上汁溜積久盤結者為鍾乳牀即此孔公孽也其次長小巃嵸者為殷孽今人呼為孔公孽殷孽復溜輕好者為鍾乳雖同一類而療體為異貴賤懸殊此二孽不堪丸散人皆搗末酒漬飲之治脚弱其前諸治恐宜水煮為湯也案今三種同根而所生各異處當是隨其土地為勝爾新修四五頁大觀卷四政和一一三頁注石腦味甘温無毒主治風寒虚損腰脚疼痺安五藏益氣一名石飴餅生名山土石中採無時此石亦鍾乳之類形如曾青而白色黑斑軟脆易破今茅山東及西平山并有鑿土堪取之世方不見用仙經有劉君導仙散用之又真誥云李愸採服治風痺虚損而得長生也新修四六頁大觀卷四政和一一五頁注石硫黄味酸温大熱有毒主治婦人陰蝕疽痔惡血堅筋骨除頭秃治心腹積聚邪氣冷癖在胁欬逆上氣脚冷疼弱無力及鼻衄惡瘡下部瘡止血殺疥蟲能化金銀銅鐵奇物生東山谷中及太山河西山礬石液也東海郡屬北徐州而箕山亦有今第一出扶南林邑色如鵝子初出殼名崑崙黄次出外國從蜀中來色深而煌煌世方用之治脚弱及痼冷甚良仙經頗用之所化奇物並是黄白術及合丹法此云礬石液今南方則無礬石恐不必爾新修四七頁大觀卷四政和一二頁注磁石味辛鹹寒無毒主治周痺風濕肢節中痛不可持物洗洗酸痟除大熱煩滿及耳聾養腎藏强骨氣益精除煩通關節消癰腫鼠瘻頸核喉痛小兒驚癎煉水飲之亦令人有子一名玄一名處石生大川谷及慈山山陰有鐵處則生其陽採無時柴胡為之使殺鐵毒惡牡丹莽草畏黄石脂今南方亦有其好者能懸吸針虚連三四五為佳殺鐵物毒消金仙經丹方黄白術中多用也新修五三頁大觀卷四政和一一一頁注凝水石味辛甘寒大寒無毒主治身熱腹中積聚邪氣皮中如火燒爛煩滿水飲之除時氣熱盛五藏伏熱胃中熱煩滿口渴水腫少腹痺久服一名白水石一名寒水石一名凌水石色如雲母可折者良鹽之精也生常山山谷又中水縣及邯鄲解巴豆毒畏地榆常山即恒山屬并州中水縣屬河閒郡邯鄲即是趙郡並屬冀州城此處地皆鹹鹵故云鹽精而碎之亦似朴消也此石末置水中夏月能為冰者佳新修五頁大觀卷四政和一一二頁注石膏味辛甘微寒大寒無毒主治中風寒熱心下逆氣驚喘口乾舌焦不能息腹中堅痛除邪鬼產乳金瘡除時氣頭痛身熱三膲大熱皮膚熱腸胃中膈熱解肌發汗止消渴煩逆腹脹暴氣喘息咽熱亦可作浴湯一名細石細理白澤者良黄者令人淋生齊山山及齊廬山魯蒙山採無時鷄子為之使惡莽草毒公二郡之山即青州徐州也今出錢塘縣獄地中雨後時時自出取之皆方如棋子白澈最佳比難得皆用靈隱山者彭城者亦好近道多有而大塊用之不及彼土仙經不須此新修五一頁大觀卷四政和一八頁注陽起石味鹹微温無毒主治崩中漏下破子藏中血癥瘕結氣寒熱腹痛無子陰陽痿不合補不足治男子莖頭寒陰下濕癢去臭汗消水腫久服不饑令人有子一名白石一名石生一名羊起石雲母根也生齊山山谷及瑯琊或雲山陽起山採無時桑螵蛸為之使惡澤瀉菌桂雷丸蛇蜕皮畏菟絲子此所出即與雲母同而甚似雲母但厚實耳今用乃出益州與礬石同處色小黄黑即礬石雲母根未知何者是世用乃希仙經亦服之新修四八頁大觀卷四政和一一二頁注玄石味鹹温無毒主治大人小兒驚癎女子絶孕少腹寒痛少精身重服之令人有子一名玄水石一名處石生太山之陽山陰有銅銅者雌玄石者雄惡松脂柏子菌桂本經磁石一名玄石别録各一種今案其一名處石名既同治體又相似而寒温銅鐵及畏惡有異世中既不復用無識其形者不知與磁石相類否新修五四頁大觀卷四政和一一二頁注理石味辛甘寒大寒無毒主治身熱利胃解煩益精明目破積聚去三蟲除榮衛中去來大熱結熱解煩毒止消渴及中風痿痺一名立制石一名肌石如石膏順理而細生漢中山谷及採無時滑石為之使畏麻黄漢中屬梁州盧山屬青州今出寧州世用亦希仙經時須亦呼為長理石石膽一名立制石今此又名立制疑必相亂類新修五五頁大觀卷四政和一一六頁注長石味辛苦寒無毒主治身熱胃中結氣四肢寒厥利小便通血脉明目去翳眇去三蟲殺蠱毒止消渴下氣除胁肋肺間邪氣久服不饑一名方石一名土石一名直石理如馬齒方而潤澤玉色生長子山谷及太山臨淄採無時長子縣屬上黨郡臨淄縣屬青州世方及仙經并無用此者也新修五六頁大觀卷四政和一一七頁注緑青味酸寒無毒主益氣治鼽鼻止洩痢生山之陰穴中色青白此即用畫緑色者亦出空青中相帶挾今畫工呼為碧青而呼空青作緑青正反矣新修八頁大觀卷三政和九五頁注鐵落味辛甘平無毒主治風熱惡瘡瘍疽瘡痂疥氣在皮膚中除胸膈中熱氣余食不下心煩去黑子一名鐵液可以染皂生牧羊及祊城或析城採無時新修五七頁大觀卷四政和一一五頁鐵主治堅肌耐痛新修五八頁大觀卷四政和一一五頁生鐵微寒主治下部及脱肛新修五八頁大觀卷四政和一一五頁鋼鐵味甘平無毒主治金瘡煩滿熱中胸膈中氣塞食不化一名跳鐵新修五八頁大觀卷四政和一一五頁鐵精平微温主明目化銅治驚悸定心氣小兒風癎除頺脱肛鐵落是染皁鐵漿生鐵是不被鑐釜之類鋼鐵是雜鍊生鐮作刀鉘者鐵精出鍛竈中如塵紫色輕者為佳亦以摩瑩銅器用也新修五八頁大觀卷四政和一一四頁注鉛丹味辛微寒主治欬逆胃反驚癎癲疾除熱下氣止小便利除毒熱臍攣金瘡溢血鍊化還成九光久服通神明生平澤一名鉛華生於鉛即今熬鈆所作黄丹畫用者世方亦稀用唯仙經塗丹釜所須此云化成九光者當為九光丹以為釜耳無别變鍊法新修七五頁大觀卷五政和一二六頁注下品青琅玕味辛平無毒主治身癢火瘡癰傷白秃疥瘙死肌浸淫在皮膚中煮煉服之起陰氣可化為丹一名石珠一名青珠生蜀郡平澤採無時殺錫毒得水銀良畏烏鷄骨此即蜀都賦所稱青珠黄環者也黄環乃是草苟取名類而種族為乖琅玕也是崑山上樹名又九真經中太丹名也此石今亦無用唯以治手足逆臚耳化丹之事未的見其術新修六六頁大觀卷五政和一三二頁注膚青味辛鹹平無毒主治蠱毒毒蛇菜肉諸毒惡瘡不可久服令人瘦一名推青一名推石生益州川谷世方及仙經並無用此者亦相與不復識之新修五七頁大觀卷四政和一一七頁注礜石味辛甘大熱生温熟寒有毒主治寒熱鼠瘻蝕瘡死肌風痺腹中堅癖邪氣除熱明目下氣除膈中熱止消渴益肝氣破積聚痼冷腹痛去鼻中息肉久服令人筋攣火煉百日服一刀圭不煉服則殺人及百獸一名青分石一名立制石一名固羊石一名白礜石一名大白石一名澤乳一名食鹽生漢中山谷及少室採無時得火良棘針為之使惡毒公鶩屎虎掌細辛畏水也今蜀漢亦有而好者出南康南野溪及彭城界中洛陽城南壍常取少室生礜石内水中令水不冰如此則生亦大熱今以黄土泥苞炭火燒之一日一夕則解碎可用治冷結為良丹方及黄白術皆多用此善能柔金又湘東新寧縣及零陵皆有白礜石新修六七頁大觀卷五政和一二四頁注方解石味苦辛大寒無毒主治胸中留熱結氣黄疸通血脉去蠱毒一名黄石生方山採無時惡巴豆案本經長石一名方石治體亦相似疑是此也新修七頁大觀卷五政和一三五頁注蒼石味甘平有毒主治寒熱下氣瘻蝕殺飛禽鼠生西城採無時世中不復用莫識其狀新修七頁大觀卷五政和一三六頁注土陰孽味鹹無毒主治婦人陰蝕大熱乾痂生高山崖上之陰色白如脂採無時此猶似鐘乳孔公孽之類故亦有孽名但在崖上耳今時有之但不復採用耳新修七一頁大觀卷五政和一三四頁注代赭味苦甘寒無毒主治鬼疰賊風蠱毒殺精物惡鬼腹中毒邪氣女子赤沃漏下帶下百病產難胞衣不出墮胎養血氣除五藏血脉中熱血痺血瘀大人小兒驚氣入腹及陰痿不起一名須丸出姑幕者名須丸出代郡者名代赭一名血師生齊國山谷赤紅青色如鷄冠有澤染爪甲不渝者良採無時畏天雄舊說云是代郡城門下土江東久絶頃魏國所獻猶是彼間赤土耳非復真物此於世用乃疎而為丹方之要并與戎鹽鹵鹹皆是急須新修七一頁大觀卷五政和一二八頁注鹵鹹味苦鹹寒無毒主治大熱消渴狂煩除邪及吐下蠱毒柔肌膚去五藏腸胃留熱結氣心下堅食已嘔逆喘滿明目目痛生河東鹽池云是煎鹽釜下凝滓新修七二頁大觀卷五政和一三頁注戎鹽主明目目痛益氣堅肌骨去毒蟲味鹹寒無毒治心腹痛溺血吐血齒舌血出一名胡鹽生胡鹽山及西羌北地及酒泉福禄城東南角北海青南海赤十月採今世中不復見鹵鹹唯魏國所獻虜鹽即是河東大鹽形如結冰圓强味鹹苦夏月小潤液虜中鹽乃有九種白鹽食鹽常食者黑鹽治腹脹氣滿胡鹽治耳聾目痛柔鹽治馬脊瘡又有赤鹽駮鹽臭鹽馬齒鹽四種並不入食馬齒即大鹽黑鹽疑是鹵鹹柔鹽疑是戎鹽而此戎鹽又名胡鹽兼治眼痛二三相亂今戎鹽虜中甚有從涼州來芮芮河南使及北部胡客從燉煌來亦得之自是稀少爾其形作塊片或如鷄鴨卵或如菱米色紫白味不甚鹹口氣臭正如毈鷄子臭者言是真又河南鹽池泥中自有凝鹽如石片打破皆方青黑色善治馬脊瘡又疑此或是鹽雖多種而戎鹽鹵鹹最為要用又巴東朐縣北岸大有鹽井鹽水自凝生粥子鹽方一二寸中央突張如繖形亦有方如石膏博碁者李云戎鹽味苦臭是海潮水澆山石經久鹽凝著石取之北海者青南海者紫赤又云鹵鹹即是人煮鹽釜底凝强鹽滓如此二說並未詳新修七三頁大觀卷五政和一二九頁注大鹽令人吐生邯鄲及河東池澤味甘鹹寒無毒主治腸胃結熱喘逆吐胸中病漏蘆為之使新修七三頁大觀卷五政和一三頁注特生礜石味甘温有毒主明目利耳腹内絶寒破堅結及鼠瘻殺百蟲惡獸久服延年一名蒼礜石一名礜石一名鼠毒生西城採無時火煉之良畏水舊云鸛巢中者最佳鸛恒入水冷故取以壅卵令熱今不可得唯用出漢中者其外形紫赤色内白如霜中央有臼形狀如齒者佳大散方云出荆州新城郡防陵縣練白色為好用之亦先以黄土包燒之一日亦可内斧孔中燒之合玉壺諸丸多用此仙經不云特生則止是前白礜石耳新修六十八頁大觀卷五政和一三四頁注白堊味苦辛温無毒主治女子寒熱癥瘕月閉積聚陰腫痛漏下無子止洩痢不可久服傷五藏令人羸瘦一名白善生邯鄲山谷採無時此即今畫用者甚多而賤世方亦希仙經不須也新修七五頁大觀卷五政和一三二頁注粉錫味辛寒無毒主治伏尸毒螫殺三蟲去鼈瘕治惡瘡墮胎止小便利一名解即今化鉛所作胡粉也其有金色者治尸蟲彌良而謂之粉錫事與經乖新修七六頁大觀卷五政和一二七頁注錫銅鏡鼻主治女子血閉癥瘕伏腸絶孕及伏尸邪氣生桂山谷此物與胡粉異類而今共條當以其非正成具一藥故以附見錫品中也古無純以銅作鏡者皆用錫雜之别録用銅鏡鼻即是今破古銅鏡鼻爾用之當燒令赤内酒中飲之若置醯中出入百過亦可擣也鉛與錫本經云生桂陽今乃出臨賀臨賀猶是分桂陽所置鉛與錫雖相似而入用大異新修七六頁大觀卷五政和一二八頁注銅弩牙主治婦人產難血閉月水不通陰陽隔塞此即今人所用射者耳取燒赤内酒中飲汁亦以添之得古者彌勝制鏤多巧也新修七七頁大觀卷五政和一三三頁注金牙味鹹無毒主治鬼疰毒蠱諸疰生蜀郡如金色者良今出蜀漢似麁金而大小方皆如碁子又有銅牙亦相似但外色黑内色小淺不入藥用金牙唯以合酒散及五疰丸餘方不甚須此也新修七七頁大觀卷五政和一三三頁注石灰味辛温主治疽瘍疥瘙熱氣惡瘡癩疾死肌墮眉殺痔蟲去黑子息肉治髓骨疽一名惡灰一名希灰生中山川中山屬代郡今近山生石青白色作竈燒竟以水沃之則熱蒸而解末矣性至烈人以度酒飲之則腹痛下痢治金瘡亦甚良世名石堊古今多以構塚用捍水而辟蟲故古塚中水以洗諸惡瘡皆即差也新修七八頁大觀卷五政和一二三頁注冬灰味辛微温主治黑子去疣息肉疽蝕疥瘙一名藜灰生川澤此即今浣衣黄灰耳燒諸蒿藜積聚煉作之性烈又荻灰尤烈欲消黑痣疣贅取此三種灰水和蒸以點之即去不可廣用爛人皮肉新修七九頁大觀卷五政和一三二頁注鍛竈灰主治癥瘕堅積去邪惡氣此即今鍛鐵竈中灰爾兼得鐵力以治暴癥水有效二車丸用之新修七九頁大觀卷五政和一三四頁注伏龍肝味辛微温主治婦人崩中吐下血止欬逆止血消癰腫毒氣此竈中對釜月下黄土也取搗篩合葫塗癰甚效以竈有神故號為伏龍肝并亦迂隱其名耳今人又用廣州鹽城屑以治漏血瘀血亦是近月之土兼得火燒之義也新修七九頁大觀卷五政和一二二頁注東壁土主治下部瘡脱肛此屋之東壁上土耳當取東壁之東邊謂恒先見日光刮取用之亦治小兒風臍又可除油污衣書勝石灰滑石新修八頁大觀卷五政和一二七頁注半天河微寒主治鬼疰狂邪氣惡毒此竹籬頭水也及空樹中水皆可飲并洗諸瘡用之大觀卷五政和一三一頁注地漿寒主解中毒煩悶此掘地作坎以水沃其中攪令濁俄頃取之以解中諸毒山中有毒菌人不識煑食之無不死又楓樹菌食之令人笑不止惟飲土漿皆差餘藥不能救矣大觀卷五政和一三一頁注
