body:
  text: 卷第三草木上品青芝味酸平主明目補肝氣安精魂仁恕久食輕身不老延年神仙一名龍芝生太山大觀卷六政和一六八頁赤芝味苦平主治胸中結益心氣補中增智慧不忘久食輕身不老延年神仙一名丹芝生霍山南嶽本是衡山漢武帝始以小霍山代之非正也此則應生衡山也大觀卷六政和一六八頁黄芝味甘平主治心腹五邪益脾氣安神忠信和樂久食輕身不老延年神仙一名金芝生嵩山大觀卷六政和一六八頁白芝味辛平主治欬逆上氣益肺氣通利口鼻强志意勇悍安魄久食輕身不老延年神仙一名玉芝生華山大觀卷六政和一六八頁黑芝味鹹平主治癃利水道益腎氣通九竅聰察久食輕身不老延年神仙一名玄芝生恒山大觀卷六政和一六八頁紫芝味甘温主治耳聾利關節保神益精氣堅筋骨好顏色久服輕身不老延年神仙一名木芝生高夏山谷六芝皆無毒六月八月採署預為之使得髪良得麻子人白瓜子牡桂共益人惡恒山畏扁青茵陳蒿案郡縣無高夏名恐是山名爾此六芝皆仙草之類世所稀見族種甚多形色瓌異並載芝草圖中今世所用紫芝此是朽樹木株上所生狀如木檽名為紫芝盖止治痔而不宜以合諸補丸藥也凡得芝草便正爾食之無餘節度故皆不云服法也大觀卷六政和一六八頁赤箭味辛温主殺鬼精物蠱毒惡氣消癰腫下肢滿疝下血久服益氣力長陰肥健輕身增年一名離母一名鬼督郵生陳倉川雍州及太山少室三月四月八月採根曝乾陳倉屬雍州扶風郡案此草亦是芝類云莖赤如箭杆葉生其端根如人足又云如芋有十二子為衛有風不動無風自搖如此亦非世所見而徐長卿亦名鬼督郵又復有鬼箭莖有羽其治並相似而益人乖異恐並非此赤箭大觀卷六政和一六六頁龍眼味甘平無毒主治安志厭食除蟲去毒久服聰察輕身不老通神明一名益智其大者似檳榔生南山谷廣州别有龍眼似荔枝而小非益智恐彼人别名今者為益智耳食之並利人新修一二四頁大觀卷十三政和三三頁猪苓味甘苦平無毒主治痎瘧解毒辟蠱疰不祥利水道久服輕身耐老一名猳猪屎生衡山山谷及濟陰冤朐二月八月採陰乾今湘州衡山無有此道不通皆從寧州來舊云是楓樹苓其皮至黑作塊似猪屎故以名之肉白而實者佳用之削去黑皮乃秤之比年殊難得耳新修一二六頁大觀卷十三政和三二八頁茯苓味甘平無毒主治胸脇逆氣憂恚驚邪恐悸心下結痛寒熱煩滿欬逆止口焦舌乾利小便止消渴唾大腹淋瀝膈中痰水水腫淋結開胸腑調藏氣伐腎邪長陰益氣力保神守中久養神不飢延年一名茯菟其有抱根者名茯神茯神味甘平主辟不祥治風眩風虚五勞七傷口乾止驚悸多恚怒善忘開心益智安魂魄養精神生太山山谷大松下二月八月採陰乾馬間為之使案藥名無馬間或是馬莖聲相近故也得甘草防風芍藥紫石英麥門冬共治五藏惡白斂畏牡蒙地榆雄黄秦膠龜甲今出鬱州彼土人乃故斫松作之形多小虚赤不佳自然成者大如三四升器外皮黑細皺内堅白形如鳥獸龜鼈者良又復時燥則不水作丸散者皆先煮之兩三沸乃切曝乾白色者補赤色者利世用甚多仙經服食亦為至要云其通神而致靈和魂而練魄明竅而益肌厚腸而開心調營而理胃上品仙藥也善能斷穀不肌為藥無朽蛀吾嘗掘地得昔人所埋一塊計應卅許年而色理無異明其貞全不朽矣其有銜松根對度者為茯神是其次茯苓後結一塊也仙方唯云茯苓而無茯神為治旣同用之亦應無嫌新修八七頁大觀卷十二政和二九六頁虎魄味甘平無毒主安五藏定魂魄殺精魅邪鬼消瘀血通五淋生永昌舊説云是松脂淪入地千年所化今燒之亦作松氣世有虎魄中有一蜂形色如生博物志又云燒蜂巢所作恐非實此或當蜂為松脂所粘因墜地淪没耳有煮鷄子及青魚枕作者並非真唯以拾芥為驗世中多帶之辟惡刮屑服治瘀血至驗仙經無正用惟曲晨丹所須以赤者為勝今並從外國來而出茯苓處永無有不知出虎魄處復有茯苓以否新修八八頁大觀卷十二政和二九七頁松脂味苦甘温無毒主治癰惡瘡頭瘍白秃疥瘙風氣安五藏除熱胃中伏熱咽乾消渴及風痺死肌鍊之令白其赤者主惡風痺久服輕身不老延年一名松膏一名松肪生大山谷六月採松實味苦無毒温主風痺寒氣虚羸少氣補不足九月採陰乾松葉味苦温主風濕痺瘡氣生毛髮安五藏守中不飢延年松節温主百節久風風虚脚痺疼痛松根白皮主辟穀不飢採鍊松脂法並在服食方中以桑灰汁若酒煮輒内寒水中數十過白滑則可用其有自流出者乃勝於鑿樹及煮膏也其實不可多得唯葉止是斷榖所宜爾細切如粟以水及麺飲服之亦有陰乾擣為屑丸服者人患惡病服此無不差比來苦脚弱人釀松節酒亦皆愈松柏皆有脂潤又凌冬不凋理為佳物但人多輕忽近易之耳新修九頁大觀卷十二政和二九一頁柏實味甘平無毒主治驚悸安五藏益氣除風濕痺治恍惚虚損呼吸歷節腰中重痛益血止汗久服令人潤耳目聰明不飢不老輕身延年生太山山谷柏葉尤良柏葉味苦微温無毒主治吐血衄血痢血崩中赤白輕身益氣令人耐風寒去濕痺止飢四時各依方面採陰乾柏白皮主火灼爛瘡長毛髮牡蠣桂瓜子為之使惡菊華羊蹄諸石及柏葉實亦為服食所重鍊餌别有法柏處處有當以太山為佳並忌取塚墓上也雖四時俱有而秋夏為好其脂亦入用此云惡麹人有以釀酒無妨恐酒米相和異單用也新修九二頁大觀卷十二政和二九五頁天門冬味苦甘平大寒無毒主治諸暴風濕偏痺强骨髓殺三蟲去伏尸保定肺氣去寒熱養肌膚益氣力利小便冷而能補久服輕身益氣延年不飢一名生奉高山谷二月三月七月八月採根曝乾垣衣地黄為之使畏曾青奉高太山下縣名也今處處有以高地大根味甘者為好張華博物志云天門冬逆捋有逆剌若葉滑者名絺休一名棘可以浣縑素白如今越人名為浣草擘其根温湯中挼之以浣衣勝灰此非門冬相似爾案如此説今人所採皆是有剌者本名勒亦麁相似以浣垢衣則净桐君藥録又云葉有剌蔓生五月花白十月實黑根連數十枚如此殊相亂而不復更有門冬恐門冬自一種不即是浣草耶又有百部根亦相類但苗異爾門冬蒸剝去皮食之甚甘美止飢雖曝乾猶脂潤難擣必須薄切曝於日中或火烘之也世人呼苗為棘剌煮作飲乃宜人而終非真棘剌爾服天門冬禁食鯉魚大觀卷六政和一四七頁麦門冬味甘平微寒無毒主治心腹結氣傷中傷飽胃絡脉絶羸瘦短氣身重目黄心下支滿虚勞客熱口乾燥渴止嘔吐愈痿蹷强陰益精消穀調中保神定肺氣安五藏令人肥健美顏色有子久服輕身不老不飢秦名羊韭齊名愛韭楚名馬韭越名羊蓍一名禹葭一名禹餘糧葉如韭冬夏長生生凾谷川谷及堤坂肥土石間久廢處二月三月八月十月採陰乾地黄車前為之使惡款冬苦瓠畏苦參青蘘凾谷即秦關而門冬異於羊韭之名矣處處有以四月採冬月作實如青珠根似穬故謂門冬以肥大者為好用之湯澤抽去心不爾令人煩斷穀家為要二門冬潤時並重既燥即輕一斤減四五兩爾大觀卷六政和一五六頁朮味苦甘温無毒主治風寒濕痺死肌痙疸止汗除熱消食主大風在身面風眩頭痛目淚出消痰水逐皮間風水結腫除心下急滿及霍亂吐下不止利腰臍間血益津液暖胃消穀嗜食作煎餌久服輕身延年不飢一名山薊一名山薑一名山連生鄭山山谷漢中南鄭二月三月八月九月採根曝乾防風地榆為之使鄭山即南鄭也今處處有以蔣山白山茅山者為勝十一月十二月正月二月採好多脂膏而甘仙經云亦能除惡氣弭災疹丸散煎餌並有法其苗又可作飲甚香美去水朮乃有兩種白朮葉大有毛而作椏根甜而少膏可作丸散用赤朮葉細無椏根小苦而多膏可作煎用劉涓子挼取其精而丸之名守中金丸可以長生東境朮大而無氣烈不任用今市人賣者皆以米粉塗令白非自然用時宜刮去之大觀卷六政和一五一頁女萎萎蕤味甘平無毒主治中風暴熱不能動摇跌筋結肉諸不足心腹結氣虚熱濕毒腰痛莖中寒及目痛眦爛淚出久服去面黑好顏色潤澤輕身不老一名熒一名地節一名玉竹一名馬薰生太山山及丘陵立春後採陰乾畏鹵鹹案本經有女萎無萎蕤别録無女萎有萎蕤而為用正同疑女萎即萎蕤也惟名異爾今處處有其根似黄精而小異服食家亦用之今市人别用一種物根形狀如續斷莖味至苦乃言是女青根出荆州今治下痢方多用女萎而此都無止洩之説疑必非也萎蕤又主理諸石人服石不調和者煮汁飲之大觀卷六政和一五四頁黄精味甘平無毒主補中益氣除風濕安五蔵久服輕身延年不飢一名重樓一名菟竹一名雞格一名救窮一名鹿竹生山谷二月採根陰乾今處處有二月始生一枝多葉葉狀似竹而短根似萎蕤萎蕤根如荻根及昌蒲概節而平直黄精根如鬼臼黄連大節而不平雖燥並柔軟有脂潤世方無用此而為仙經所貴根葉實皆可餌服酒散隨宜具在斷穀方中黄精葉乃與鈎吻相似惟莖不紫花不黄為異而人多惑之其類乃殊遂致死生之反亦為奇事大觀卷六政和一四二頁乾地黄味甘苦寒無毒主治折跌絶筋傷中逐血痺填骨髓長肌肉作湯除寒熱積聚除痺主男子五勞七傷女子傷中胞漏下血破惡血溺血利大小腸去胃中宿食飽力斷絶補五蔵内傷不足通血脉益氣力利耳目生者尤生地黄大寒主婦人崩中血不止及産後血上薄心悶絶傷身胎動下血胎不落墮墜踠折瘀血留血衄鼻吐血皆擣飲之久服輕身不老一名地髓一名苄一名芑生咸陽川澤黄土地者二月八月採根隂乾得麦門冬清酒良惡貝母畏蕪荑咸陽即長安也生渭城者乃有子實實如小麦淮南七精散用之中間以彭城乾地黄最好次歷陽今用江寧板橋者為勝作乾者有法搗汁和蒸殊用工意而此直云陰乾色味乃不相似更恐以蒸作為失乎大貴時乃取牛膝萎蕤作之人不能别仙經亦服食要用其華又善生根亦主耳暴聾重聽乾者粘濕作丸散用須烈日曝之既燥則斤兩大減一斤才得十兩散耳用之宜加量也大觀卷六政和一四九頁菖蒲味辛温無毒主治風寒濕痺欬逆上氣開心孔補五藏通九竅明耳目出音聲主耳聾癰瘡温腸胃止小便利四肢濕痺不得屈伸小兒温瘧身積熱不解可作浴湯久服輕身聰耳明目不忘不迷惑延年益心智高志不老一名菖陽生上洛池澤及蜀郡嚴道一寸九節者良露根不可用五月十二月採根陰乾秦皮秦艽為之使惡地膽麻黄上洛郡屬梁州嚴道縣在蜀郡今乃處處有生石磧上概節為好在下濕地大根者名昌陽止主風濕不堪服食此藥甚去蟲并蚤蝨而今都不言之真昌蒲葉有脊一如劔刄四月五月亦作小釐華也東間溪側又有名溪蓀者根形氣色極似石上菖蒲而葉正如蒲無脊世人多呼此為石上菖蒲者謬矣此止主欬逆亦斷蚤蝨爾不入服御用詩咏多云蘭蓀正謂此也大觀卷六政和一四三頁遠志味苦温無毒主治欬逆傷中補不足除邪氣利九竅益智慧耳目聰明不忘强志倍力利丈夫定心氣止驚悸益精去心下膈氣皮膚中熱面目黄久服輕身不老好顔色延年葉名小草主益精補陰氣止虚損夢洩一名棘菀一名葽繞一名細草生太山川四月採根葉陰乾得茯苓冬葵子龍骨良殺天雄附子毒畏真珠藜蘆蜚蠊齊蛤案藥名無齊蛤恐是百合宛朐縣屬衮州濟隂郡今猶從彭城北蘭陵來用之打去心取皮今用一斤正得三兩皮爾市者加量之小草狀似麻黄而青遠志亦入仙方藥用大觀卷六政和一六三頁澤瀉味甘鹹寒無毒主治風寒濕痺乳難消水養五藏益氣力肥健補虚損五勞除五藏痞滿起陰氣止洩精消渴淋瀝逐膀胱三焦停水久服耳目聰明不飢延年輕身面生光能行水上扁鵲云多服病人眼一名水瀉一名及瀉一名芒芋一名鵠瀉生汝南池澤五月六月八月採根陰乾畏海蛤文蛤葉味鹹無毒主大風乳汁不出産難强陰氣久服輕身五月採實味甘無毒主風痺消渴益腎氣强陰補不足除邪濕久服面生光令人無子九月採汝南郡屬豫州今近道亦有不堪用惟用漢中南鄭青代形大而長尾間必有兩歧為好此物易朽蠹常須密藏之葉狹長叢生諸淺水中仙經服食斷穀皆用之亦云身輕能步行水上大觀卷六政和一六二頁薯蕷味甘温平無毒主治傷中補虚羸除寒熱邪氣補中益氣力長肌肉主頭面游風風頭目眩下氣止腰痛補虚勞羸瘦充五藏除煩熱强陰久服耳目聰明輕身不飢延年一名山芋秦楚名玉延鄭越名土薯生嵩山山谷二月八月採根曝乾紫芝為之使惡甘遂今近道處處有東山南江皆多掘取食之以充糧南康間最大而美服食亦用之大觀卷六政和一六頁菊花味苦甘平無毒主治風頭頭眩腫痛目欲脱淚出皮膚死肌惡風濕痺治腰痛去來陶陶除胸中煩熱安腸胃利五脉調四肢久服利血氣輕身耐老延年一名節華一名日精一名女節一名女華一名女莖一名更生一名周盈一名傅延年一名陰成生雍州川澤正月採根三月採葉五月採莖九月採花十一月採實皆陰乾朮枸杞根桑根白皮為之使菊有兩種一種莖紫氣香而味甘葉可作羹食者為真一種青莖而大作蒿艾氣味苦不堪食者名苦薏非真其華正相似唯以甘苦别之爾南陽酈縣最多今近道處處有取種之便得又有白菊莖葉都相似唯花白五月取亦主風眩能令頭不白仙經以菊為妙用但難多得宜常服之爾大觀卷六政和一四四頁甘草味甘平無毒主治五藏六府寒熱邪氣堅筋骨長肌肉倍力金瘡尰解毒温中下氣煩滿短氣傷藏欬嗽止渴通經脉利血氣解百藥毒為九土之精安和七十二種石一千二百種草久服輕身延年一名密甘一名美草一名蜜草一名蕗草生河西川谷積沙山及上郡二月八月除日採根曝干十日成朮乾漆苦參為之使惡遠志反大戟芫花甘遂海藻四物河西上郡不復通市今出蜀漢中悉從汶山諸夷中來赤皮斷理看之堅實者是抱罕草最佳抱罕羌地名亦有火炙干者理多虚疎又有如鯉魚腸者被刀破不復好青州間亦有不如又有紫甘草細而實乏時可用此草最為衆藥之主經方少不用者猶如香中有沉香也國老即帝師之稱雖非君為君所宗是以能安和草石而解諸毒也大觀卷六政和一四八頁人參味甘微寒微温無毒主補五藏安精神定魂魄止驚悸除邪氣明目開心益智治腸胃中冷心腹鼓痛胸脇逆滿霍亂吐逆調中止消渴通血脉破堅積令人不忘久服輕身延年一名人銜一名鬼蓋一名神草一名人微一名土精一名血參如人形者有神生上黨山谷二月四月八月上旬採根竹刀刮曝干無令見風茯苓為之使惡溲疏反藜蘆上黨郡在冀州西南今魏國所獻即是形長而黄狀如防風多潤實而甘世用不入服乃重百濟者形細而堅白氣味薄於上黨次用高麗高麗即是遼東形大而虚軟不及百濟百濟今臣屬高麗高麗所獻兼有兩種止應擇取之爾實用並不及上黨者其為藥切要亦與甘草同功而易蛀蚛唯内器中密封頭可經年不壞人參生一莖直上四五葉相對生花紫色高麗人作人參讚曰三椏五葉背陽向陰欲來求我椵樹相尋椵樹葉似桐甚大隂廣則多生隂地採作甚有法今近山亦有但作之不好大觀卷六政和一四五頁石斛味甘平無毒主治傷中除痹下氣補五藏虚勞羸瘦强陰益精補内絶不足平胃氣長肌肉逐皮膚邪熱疿氣脚膝疼冷痺弱久服厚輕身延年定志除驚一名林蘭一名禁生一名杜蘭一名石蓫生山谷水旁石上七月八月採莖隂乾陸英為之使惡凝水石巴豆畏殭蠶雷丸今用石斛出始興生石上細實桑灰湯沃之色如金形似蚱蜢髀者為佳近道亦有次宣城間生櫟樹上者名木斛其莖形長大而色淺六安屬廬江今始安亦出木斛至虚長不入丸散惟可為酒漬煮湯用爾世方最以補虚治脚膝大觀卷六政和一六四頁石龍芮味苦平無毒主治風寒濕痺心腹邪氣利關節止煩滿平腎胃氣補陰氣不足失精莖冷久服輕身明目不老令人皮膚光澤有子一名魯果能一名地椹一名石熊一名彭根一名天豆生太山川澤五月五日採子二月八月採皮陰乾大戟為之使畏蛇蜕吳茱萸今出近道子形麄似蛇牀子而扁非真好者人言是蓄菜子爾東山石上所生其葉芮芮短小其子狀如葶藶黄色而味小辛此乃實是也大觀卷八政和二八頁石龍蒭味苦微寒微温無毒主治心腹邪氣小便不利淋閉風濕鬼疰惡毒補内虚不足治痞滿身無潤澤出汗除莖中熱痛殺鬼疰惡毒氣久服補虚羸輕身耳目聰明延年一名龍須一名草續斷一名龍珠一名龍華一名懸莞一名草毒九節多味者良生梁州山谷濕地五月七月採莖曝乾莖青細相連實赤今出近道水石處似東陽龍鬚以作席者但多節爾大觀卷七政和一九頁絡石味苦温微寒無毒主治風熱死肌癰傷口乾舌焦癰腫不消喉舌腫不通水漿不下大驚入腹除邪氣養腎主腰髖痛堅筋骨利關節久服輕身明目潤澤好顔色不老延年通神一名石鯪一名石蹉一名略石一名明石一名領石一名懸石生太山川谷或石山之陰或高山巖石上或生人間正月採杜仲牡丹為之使惡鐵落畏貝母菖蒲不識此藥仙世方法都無用者或云是石類既云或生人間則非石猶如石斛等繋石以為名爾大觀卷七政和一七六頁千歲虆汁味甘平無毒主補五藏益氣續筋骨長肌肉去諸痺久服輕身不飢耐老通神明一名虆蕪生太山川谷作藤生樹如葡萄葉如鬼桃蔓延木上汁白今世人方藥都不復識用此仙經數處須之而遠近道俗咸不識此非甚是異物正是未研訪尋識之爾大觀卷七政和一八七頁木香味辛温無毒主治邪氣辟毒疫温鬼强志主淋露治氣劣肌中偏寒主氣不足消毒殺鬼精物温瘧蠱毒行藥之精久服不夢輕身致神仙一名蜜香生永昌山谷此即青木香也永昌不復貢今皆從外國舶上來乃云大秦國以治毒腫消惡氣有驗今皆用合香不入藥用惟制蛀蟲丸用之常能煮以沐浴大佳爾大觀卷六政和一六頁龍膽味苦寒大寒無毒主治骨間驚癎邪氣續絶傷定五藏殺蠱毒除胃中伏熱時氣温熱熱洩下痢去腸中小蟲益肝膽氣止驚惕久服益智不忘輕身耐老一名陵游生山谷及宛朐二月八月十一月十二月採根陰乾貫衆為之使惡防葵地黄今出近道吳興為勝狀似牛膝味甚苦故以膽為名大觀卷六政和一六三頁牛膝為君味苦酸平無毒主治寒四肢拘攣膝痛不可屈伸逐血氣傷熱火爛墮胎治傷中少氣男子陰消老人失溺補中續絶填骨髓除腦中痛及腰脊痛婦人月水不通血結益精利陰氣止髮白久服輕身耐一名百倍生河内川谷及臨朐二月八月十月採根陰乾惡螢火陸英龜甲畏白前今出近道蔡州者最長大柔潤其莖有節似牛膝故以為名也乃云有雌雄雄者莖紫色而節大為勝爾大觀卷六政和一五二頁卷柏味辛甘温平微寒無毒主治五藏邪氣女子隂中寒熱痛癥瘕血閉絶子止欬逆治脱肛散淋結頭中風眩痿蹷强陰益精久服輕身和顔色令人好容體一名萬歲一名豹足一名求股一名交時生常山山谷石間五月七月採陰乾今出近道叢生石土上細葉似柏卷屈狀如鷄足青黄色用之去下近石有沙土處大觀卷六政和一六八頁菌桂味辛温無毒主治百疾養精神和顔色爲諸藥先聘通使久服輕身不老面生光華媚好常如童子生交阯桂林山谷巖崖間無骨正圓如竹生桂林山谷立秋採交阯屬交州桂林屬廣州而蜀都賦云菌桂臨崖今世中不見正圓如竹者惟嫩枝破卷成圓猶依桂用恐非真菌桂也仙經乃有用菌桂云三重者良則判非今桂矣必當别是一物應更研訪新修九三頁大觀卷十二政和二九頁牡桂味辛温無毒主治上氣欬逆結氣喉痺吐吸心痛脇風脇痛温筋通脉止煩出汗利關節補中益氣久服通神輕身不老生南海山谷南海郡即是廣州今世用牡桂狀似桂而扁廣殊薄皮色黄脂肉甚少氣如木蘭味亦類桂不知當是别樹為復猶是桂生有老宿者爾亦所未究新修九四頁大觀卷十二政和二九頁桂味甘辛大熱有毒主温中利肝肺氣心腹寒熱冷疾霍亂轉筋頭痛腰痛出汗止煩止唾欬嗽鼻齆能墮胎堅骨節通血脉理疏不足宣導百藥無所畏久服神仙不老生桂陽二月七八月十月採皮陰乾得人參麦門冬甘草大黄黄芩調中益氣得柴胡紫石英乾地黄治吐逆案本經唯有菌桂牡桂而無此桂用體大同小異今世用便有三種以半卷多脂者單名桂入藥最多所用悉與前說相應仙經乃並有三種桂常服食以葱涕合和雲母蒸化為水者正是此種爾今出廣州湛惠為好湘州始興桂陽縣即是小桂亦有而不如廣州者交州桂州者形段小多脂肉亦好經云桂葉如柏葉澤黑皮黄心赤齊武帝時湘州送桂樹以植芳林苑中今東山有山桂皮氣麁相類而葉乖異亦能凌冬恐或是牡桂詩人多呼丹桂正謂皮赤爾北方今重此每食輒須之蓋禮所云薑桂以為芬芳也新修九六頁大觀卷十二政和二八九頁杜仲味辛甘平溫無毒主治腰脊補中益精氣堅筋骨强志除陰下癢濕小便餘瀝脚中酸疼痛不欲踐地久服輕身耐老一名思仙一名思仲一名木綿生上虞山谷又上黨及二月五月六月九月採皮陰乾畏蛇蜕皮玄參上虞在豫州虞號之虞非會稽上虞縣也今用出建平宜都者狀如厚朴折之多白絲為佳用之薄削去上甲皮橫理切令絲斷也新修九八頁大觀卷十二政和三五頁乾漆味辛温無毒有毒主治絶傷補中續筋骨填髓腦安五藏五緩六急風寒濕痺治欬嗽消瘀血痞結腰痛女子疝瘕利小腸去蛔蟲生漆去長蟲久服輕身耐老生漢中川夏至後採乾之半夏為之使畏鷄子今又忌油脂今梁州漆最勝益州亦有廣州漆性急易燥其諸處漆桶上蓋裹自然有乾者狀如蜂房孔孔隔者為佳生漆毒烈人以雞子白和服之去蟲猶有齧腸胃者畏漆人乃致死外氣亦能使身肉瘡腫自别有治法仙方用蟹消之為水鍊服長生新修九九頁大觀卷十二政和三一頁細辛味辛温無毒主治欬逆頭痛腦動百節拘攣風濕痺痛死肌温中下氣破痰利水道開胸中除喉痺齆鼻風癎癲疾下乳結汗不出血不行安五藏益肝膽通精氣久服明目利九竅輕身長年一名小辛生華陰山谷二月八月採根陰乾曾青桑根為之使得當歸芍藥白芷芎窮牡丹藁本甘草共治婦人得決明鯉魚膽青羊肝共治目痛惡狼毒山茱萸黄耆畏消石滑石反藜蘆今用東陽臨海者形段乃好而辛烈不及華陰高麗者用之去其頭節人患口臭者含之多效最能除痰明目也大觀卷六政和一六四頁獨活味苦甘平微温無毒主治風寒所擊金瘡止痛賁豚癎痓女子疝瘕治諸賊風百節痛風無久新者久服輕身耐老一名羌活一名羌青一名護羌使者一名胡王使者一名獨摇草此草得風不摇無風自動生雍州川谷或隴西南安二月八月採根曝乾豚實為之使藥名無豚實恐是蠡實此州郡縣並是羌活羌活形細而多節軟潤氣息極猛烈出益州北部西川為獨活色微白形虚大為用亦相似而小不如其一莖直上不為風摇故名獨活至易蛀宜密器藏之大觀卷六政和一五七頁升麻味甘苦平微寒無毒主解殺百精老物殃鬼辟温疫瘴氣邪氣蠱毒入口皆吐出中惡腹痛時氣毒癘頭痛寒熱風腫諸毒喉痛口瘡久服不夭輕身長年一名周麻生益州山谷二月八月採根日乾舊出寧州者第一形細而黑極堅實頃無復有今惟出益州好者細削皮青綠色謂之鷄骨升麻北部間亦有形又虚大黄色建平間亦有形大味薄不堪用人言是落新婦根不必爾其形自相似氣色非也落新婦亦解毒取葉挼作小兒浴湯主驚忤大觀卷六政和一五八頁茈胡為君味苦平微寒無毒主治心腹去腸胃中結氣飲食積聚寒熱邪氣推陳致新除傷寒心下煩熱諸痰熱結實胸中邪逆五藏間游氣大腸停積水脹及濕痺拘攣亦可作浴湯久服輕身明目益精一名地薰一名山菜一名茹草葉一名芸蒿辛香可食生洪農川谷及宛朐二月八月採根曝乾得茯苓桔梗大黃石膏麻子人甘草桂以水一煮取四升入消石三方寸匕治傷寒寒熱頭痛心下煩滿半夏為之使惡皂莢畏女菀藜蘆今出近道狀如前胡而强博物志云芸蒿葉似邪蒿春秋有白蒻長四五寸香美可食長安及河內並有之此茈胡治傷寒第用大觀卷六政和一五五頁防葵味辛甘苦寒無毒主治疝瘕腸洩膀胱熱結溺不下咳逆溫瘧癲癎驚邪狂走治五藏虚氣小腹支滿臚脹口乾除腎邪强志久服堅骨髓益氣輕身中火者不可服令人恍惚見鬼一名梨蓋一名房慈一名爵離一名農果一名利茹一名方蓋生臨淄川谷及嵩高太山少室三月三日採根曝乾北信斷今用建平間者云本與狼毒同根猶如三建今其形亦相似但置水中不沉爾而狼毒陳久亦不能沉矣大觀卷六政和一五五頁蓍實味苦酸平無毒主益充肌膚明目聰慧先知久服不飢不老輕身生少室山谷八月九月採實日乾大觀卷六政和一六七頁楮實味甘寒無毒主治陰痿水腫益氣充肌膚明目久服不飢不老輕身生少室山一名榖實所在有之八月九月採實日乾四十日成葉味甘無毒主治小兒身熱食不生肌可作浴湯又主治惡瘡生肉樹皮主逐水利小便莖主癮疹癢單煮洗浴其皮間白汁治癬此即今榖樹子也仙方採搗取汁和丹用亦乾服使人通神見鬼南人呼榖紙亦為楮紙作褚音武陵人作榖皮衣又甚堅好爾也大觀卷十二政和三頁酸棗味酸平無毒主治心腹寒熱邪結氣四肢酸疼濕痺煩心不得眠臍上下痛血轉久洩虚汗煩渴補中益肝氣堅筋大骨助陰氣令人肥健久服安五輕身延年生河東川澤八月採實陰乾卅日成惡防己今出東山間云即是山棗樹子子似武昌棗而味極酸東人乃噉之以醒睡與此治不得眠正反矣新修一一五頁大觀卷十二政和二九八頁槐實味苦酸鹹寒無毒主治五內邪氣熱止涎唾補絶傷治五痔火瘡婦人乳瘕子藏急痛以七月七日取之擣取汁銅器盛之日煎令可作丸大如鼠屎內竅中三易乃愈又墮胎久服明目益氣頭不白延年枝主洗瘡及陰囊下濕癢皮主爛瘡根主喉痺寒熱生河南平可作神燭景天為之使槐子以多連者為好十月上巳日採之新盆盛合泥百日皮爛為水核如大豆服之今令人腦滿髪不白而長生今處處有此云七月取其子未堅故搗絞取汁新修一一六頁大觀卷十二政和二九二頁枸杞味苦寒根大寒子微寒無毒主治五內邪氣熱中消渴周痺風濕下胸脇氣客熱頭痛補內傷大勞噓吸堅筋骨强陰利大小腸久服輕身耐老耐寒暑一名杞一名地骨一名枸忌一名地輔一名羊乳一名却暑一名仙人杖一名西王母杖生常山平澤及諸丘陵阪岸上冬採根春夏採葉秋採莖實陰乾今出堂邑而石頭烽火樓下最多其葉可作羹味小苦世諺云去家千里勿食蘿摩枸杞此言其補益精氣强盛陰道也蘿摩一名苦丸葉厚大作藤生摘有白乳汁人家多種之可生噉亦蒸煮食也枸杞根實為服食家用其説乃甚美仙人之杖遠自有旨乎也新修一一九頁大觀卷十二政和二九三頁蘇合味甘温無毒主治辟惡殺鬼精物温瘧蠱毒癎痓去三蟲除邪不夢忤魘脒通神明久服輕身長年生中臺川谷世傳云是獅子屎外國説不爾今皆從西域來真者難别亦不復入藥唯供合好香爾新修一二頁大觀卷十二政和三一頁橘柚味辛温無毒主治胸中瘕熱逆利水榖下氣止嘔欬除膀胱留熱下停水五淋利小便主脾不能消榖氣冲胸中吐逆霍亂止洩去寸白久服去臭下氣通神輕身長年一名橘生南山川谷生江南十月採此是説其皮功爾以東橘為好西江亦有而不如其皮小冷治氣乃言欲勝東橘北人亦用之以陳者為良其肉味甘酸食之多痰恐非益人也今此雖用皮既是果類所以猶宜相從柚子皮乃可食而不復入藥用此亦應下氣新修一二一頁大觀卷廿三政和四六一頁菴子味苦微寒微温無毒主治五藏瘀血腹中水氣臚脹留熱風寒濕痺身體諸痛治心下堅膈中寒熱周痺婦人月水不通消食明目久服輕身延年不老駏驉食之神仙生雍州川亦生上黨及道邊十月採實陰乾荆實薏苡為之使狀如蒿艾之類近道處處有仙經亦時用之人家種此辟蛇也大觀卷六政和一六七頁薏苡人味甘微寒無毒主治筋急不可屈伸風濕痺下氣除筋骨邪氣不仁利腸胃消水腫令人能食久服輕身益氣其根下三蟲一名解蟲一名屋菼一名起實一名生真定平澤及田野八月採實採根無時真定縣屬常山郡近道處處有多生人家交趾者子最大彼土呼為珠馬援大取將還人讒以為真珠也實重累者為良用之取中人今小兒病蚘蟲取根煮汁糜食之甚香而去蛔蟲大効大觀卷六政和一六一頁車前子味甘鹹寒無毒主治氣癃止痛利水道小便除濕痺男子傷中女子淋瀝不欲食養肺强陰益精令人有子明目治赤痛久服耐老葉及根味甘寒主金瘡止血衄鼻瘀血血瘕下血小便赤止煩下氣除小蟲一名當道一名芣苢一名蝦蟇衣一名牛遺一名勝舄生真定平澤丘陵阪道中五月五日採陰乾人家及路邊甚多其葉搗取汁服治洩精甚驗子性冷利仙經亦服餌之令人身輕能跳越岸谷不老而長生也韓詩乃言芣苢是木似李食其實宜子孫此為謬矣大觀卷六政和一五九頁蛇床子味苦辛甘平無毒主治婦人陰中腫痛男子陰痿濕癢除痺氣利關節癲癎惡瘡温中下氣令婦人子藏熱男子陰强久好顔色令人有子一名蛇粟一名蛇米一名虺牀一名思益一名繩毒一名棗棘一名牆蘼生臨淄川谷及田野五月採實陰乾惡牡丹巴豆貝母近道田野墟落間甚多花葉正似蘼蕪大觀卷七政和一八六頁菟絲子味辛甘平無毒主續絶傷補不足益氣力肥健汁去面養肌强陰堅筋骨主莖中寒精自出溺有餘瀝口苦燥渴寒血為積久服明目輕身延年一名生菟蘆一名菟縷一名蓎蒙一名玉女一名赤網一名菟纍生朝鮮川澤蔓延草木之上色黄而細為赤網色淺而大為菟纍九月採實曝乾得酒良署預松脂為之使惡雚菌宜丸不宜煑田野墟落中甚多皆浮生藍紵麻蒿上舊言下有茯苓上生菟絲今不必爾其莖挼以浴小兒治熱疿用其實先須酒漬之一宿仙經世方並以為補藥大觀卷六政和一五一頁菥蓂子味辛微温無毒主明目目痛淚出除痺補五藏益精光治心腹腰痛久服輕身不老一名薎菥一名大蕺一名馬辛一名大薺生咸陽川四月五月採曝乾得荆實細辛良惡乾薑苦參今處處有之人乃言是大薺子世用甚稀大觀卷六政和一六七頁茺蔚子味辛甘微温微寒無毒主明目益精除水氣治血逆大熱頭痛心煩久服輕身莖主治癮癢可作浴湯一名益母一名益明一名大札一名貞蔚生海濱池澤五月採今處處有葉如荏方莖子形細長三稜方用亦稀大觀卷六政和一五三頁地膚子味苦寒無毒主治膀胱熱利小便補中益精氣去皮膚中熱氣散惡瘡疝瘕强陰久服耳目聰明輕身耐老使人潤澤一名一名地麦生荆州平澤及田野八月十月採實陰乾今田野間亦多皆取莖苗為掃帚子微細入補丸散用仙經不甚須大觀卷七政和一八七頁青蘘味甘寒無毒主治五藏邪氣風寒濕痺益氣補腦髓堅筋骨久服耳目聰明不飢不老增壽巨勝苗也生中原川谷胡麻葉甚肥滑亦可以沐頭但不知云何服之仙方並無用此法正當陰乾搗為丸散耳既服其實故不復假苗五符巨勝丸方亦云葉名青蘘本生大宛度來千年爾新修二八九頁大觀卷二十四政和四八二頁忍冬味甘温無毒主治寒熱身腫久服輕身長年益壽十二月採陰乾今處處皆有似藤生凌冬不凋故名忍冬人惟取煮汁以釀酒補虚治風仙經少用此既長年益壽甚可常採服凡易得之草而人多不肯為之更求難得者是貴遠賤近庸人之情乎大觀卷七政和一八六頁蒺藜子味苦辛温微寒無毒主治惡血破癥結積聚喉痺乳難身體風癢頭痛欬逆傷肺肺痿止煩下氣小兒頭瘡癰腫陰可作摩粉其葉主風癢可煑以浴久服長肌肉明目輕身一名旁通一名屈人一名止行一名豺羽一名升推一名即一名茨生馮翊平澤七月八月採實曝乾烏頭為之使多生道上而葉布地子有剌狀如菱而小長安最饒人行多著木屐今軍家乃鑄鐵作之以布敵路亦呼蒺藜易云據於蒺藜言其凶傷詩云牆有茨不可掃也以剌梗穢也方用甚稀爾大觀卷七政和一七七頁肉蓯蓉味甘酸鹹微温無毒主治五勞七傷補中除莖中寒熱痛養五藏强陰益精氣多子治婦人癥瘕除膀胱邪氣腰痛止痢久服輕身生河西山谷及代郡鴈門五月五日採陰乾代郡鴈門屬并州多馬處便有言是野馬精落地所生生時似肉以作羊肉羹補虚乏極佳亦可生噉芮芮河南間至多今第一出隴西形扁廣柔潤多花而味甘次出北國者形短而少花巴東建平間亦有而不如也大觀卷七政和一七九頁白英味甘寒無毒主治寒熱八疸消渴補中益氣久服輕身延年一名榖菜一名白草生益州山谷春採葉夏採莖秋採花冬採根諸方藥不用此乃有蔛菜生水中人蒸食之此乃生山谷當非是又有白草葉作羹飲甚治勞而不用根華益州乃有苦菜土人專食之皆充健無病疑或是此大觀卷六政和一六五頁白蒿味甘平無毒主治五藏邪氣風寒濕痺補中益氣長毛髮令黑治心懸少食常飢久服輕身耳目聰明不老生中山川澤二月採蒿類甚多而世中不聞呼白蒿者方藥家既不用皆無復識之所主治既殊佳應更加研訪服食七禽散云白兔食之仙與前菴子同法爾大觀卷六政和一六六頁茵蔯蒿味苦平微寒無毒主治風濕寒熱邪氣熱結黄疸通身發黄小便不利除頭熱去伏瘕久服輕身益氣耐老面白悦長年白兔食之仙生太山及丘陵坡岸上五月及立秋採陰乾今處處有似蓬蒿而葉緊細莖冬不死春又生惟入治黄疸用仙經云白蒿白兔食之仙而今茵蔯乃云此恐是誤爾大觀卷七政和一八八頁漏蘆味苦鹹寒大寒無毒主治皮膚熱惡瘡疽痔濕痺下乳汁止遺溺熱氣瘡癢如麻豆可作浴湯久服輕身益氣耳目聰明不老延年一名野蘭生喬山山谷八月採根陰乾喬山應是黄帝所葬處乃在上郡今出近道亦有治諸瘻疥此久服甚益人而服食方罕用之今市人皆取苗用之世中取根名鹿驪根苦酒摩以治瘡疥大觀卷七政和一八一頁茜根味苦寒無毒主治寒濕風痺黄疸補中止血內崩下血膀胱不足踒跌蠱毒久服益精氣輕身可以染絳一名地血一名茹藘一名茅蒐一名蒨生喬山川谷二月三月採根暴乾畏鼠姑此則今染絳茜草也東間諸處乃有而少不如西多今世道經方不甚服用此當以其為治少而豐賤故也詩云茹藘在岅者是大觀卷七政和一八四頁旋花味甘温無毒主益氣去面黑色媚好其根味辛主治腹中寒熱邪氣利小便久服不飢輕身一名筋根花一名金沸一名美草生豫州平澤五月採陰乾東人呼為山薑南人呼為美草根似杜若亦似高良薑腹中冷痛煑服甚効作丸散服之辟榖止飢近有人從南還遂用此術與人斷榖皆得半年百日不飢不瘦但志淺嗜深不能久服爾其葉似薑花赤色殊辛美子狀如豆蔻此旋花之名即是其花也今山東甚多大觀卷七政和一八五頁藍實味苦寒無毒主解諸毒殺蠱蚑疰鬼螫毒久服頭不白輕身其葉汁殺百藥毒解狼毒射罔毒其莖葉可以染青生河內平澤此即今染碧所用者至解毒人卒不能得生藍汁乃浣布汁以解之亦善以汁塗五心又止煩悶尖葉者為勝甚治蜂螫毒大觀卷七政和一七三頁景天味苦酸平無毒主治大熱火瘡身熱煩邪惡氣諸蠱毒痂疕寒熱風痺諸不足花主治女人漏下赤白輕身明目久服通神不老一名戒火一名火母一名救火一名據火一名慎火生太山川谷四月四日七月七日採陰乾今人皆盆盛養之於屋上云以辟火葉可治金瘡止血以洗浴小兒去煩熱驚氣廣州城外有一樹云大三四圍呼為慎火樹江東者甚細小方用亦稀其花入服食衆藥之名此最為麗大觀卷七政和一八七頁天名精味甘寒無毒主治瘀血血瘕欲死下血止血利小便除小蟲去痺除胸中結熱止煩渴逐水大吐下久服輕身耐老一名麦句薑一名蝦蟇藍一名豕首一名天門精一名玉門精一名彘顱一名蟾蜍蘭一名覲生平原川澤五月採垣衣為之使此即今人呼為豨薟亦名豨首夏月搗汁服之以除熱病味至苦而云甘恐或非是大觀卷七政和一八二頁王不留行味苦甘平無毒主治金瘡止血逐痛出剌除風痺內寒止心煩鼻衄癰疽惡瘡瘻乳婦人難產久服輕身耐老增壽生太山山谷二月八月採今處處有人言是蓼子亦不爾葉似酸漿子似松子而多入癰瘻方用之大觀卷七政和一九一頁蒲黄味甘平無毒主治心腹膀胱寒熱利小便止血消瘀血久服輕身益氣力延年神仙生河東池澤四月採此即蒲釐花上黄粉也伺其有便拂取之甚治血仙經亦用此大觀卷七政和一八頁香蒲味甘平無毒主治五藏心下邪氣口中爛臭堅齒明目聰耳久服輕身耐老一名睢一名醮生南海池澤方藥不復用世人無採彼土人亦不復識者江南貢菁茅一名香茅以供宗廟縮酒或云是薰草又云是薦麦此蒲亦類爾大觀卷七政和一八頁蘭草味辛平無毒主利水道殺蠱毒辟不祥除胸中痰癖久服輕身不老通神明一名水香生大池澤四月五月採方藥世人並不復識用大吳即應是吳國爾太伯所居故呼大吳今東間有煎澤草名蘭香亦或是此也生濕地李云是今人所種似都梁香草大觀卷七政和一八六頁蘼蕪味辛温無毒主治欬逆定驚氣辟邪惡除蠱毒鬼疰去三蟲久服通神主身中老風頭中久風風眩一名薇蕪一名茳蘺芎藭苗也生川澤及宛朐四月五月採葉暴乾今出歷陽處處亦有人家多種之葉似蛇牀而香騷人借以為譬方藥用甚稀大觀卷七政和一七五頁雲實味辛苦温無毒主治洩痢腸澼殺蟲蠱毒去邪惡結氣止痛除寒熱消渴花主見鬼精物多食令人狂走殺精物下水燒之致鬼久服輕身通神明益壽一名員實一名雲英一名天豆生河間川十月採暴乾今處處有子細如葶藶子而小黑其實亦類莨菪燒之致鬼未見其法術大觀卷七政和一九頁徐長卿味辛温無毒主治鬼物百精蠱毒疫疾邪惡氣温瘧久服强悍輕身益氣延年一名鬼督郵生太山山谷及隴西三月採鬼督郵之名甚多今世用徐長卿者其根正如細辛小短扁扁爾氣亦相似今狗脊散用鬼督郵當取其强悍宜腰脚所以知是徐長卿而非鬼箭赤箭大觀卷七政和一九頁姑活味甘温無毒主治大風邪氣濕痺寒痛久服輕身益壽耐老一名冬葵子生河東川澤方藥亦無用此者乃有固活丸即是野葛一名爾此又名冬葵子非葵菜之冬葵子治體乖異新修三六頁大觀卷三政和五四五頁屈草味苦微寒無毒主治胸脇下痛邪氣腸間寒熱陰痺久服輕身益氣耐老生漢中川澤五月採方藥不復用世無識者也新修三六五頁大觀卷三政和五四六頁翹根味甘寒平有小毒主治下熱氣益陰精令人面悦好明目久服輕身耐老以作蒸飲酒病人生嵩高平澤二月八月採方藥不復用世無識者也新修三六三頁大觀卷三政和五四六頁牡荆實味苦温無毒主治除骨間寒熱通利胃氣止欬逆下氣生河間南陽冤句山谷或平壽都鄉高隄岸上牡荆生田野八月九月採實陰乾得朮柏實青葙共治頭風防風為之使惡石膏河間冤句平壽並在北南陽在西論蔓荆即應是今作杖棰之荆而復非見其子殊細正如小麻子色青黄荆子實小大如此也牡荆子乃出北方如烏豆大正圓黑仙術多用牡荆今人都無識之者李當之藥録乃注溲疏下云溲疏一名陽櫨一名牡荆一名空疏皮白中空時有節子似枸杞子赤色味甘苦冬月熟世乃無識者當此實是真非人籬垣陽櫨也案如此説溲疏主治與牡荆都不同其形類乖異恐乖實理而仙方用牡荆云能通神見鬼非唯其實乃枝葉並好又云有荆樹必枝枝相對此是牡荆有不對者即非牡荆既為父則不應有子如此並莫詳虚實須更博訪乃詳之爾新修一二頁大觀卷十二政和三二頁秦椒味辛温生温熟寒有毒主治風邪氣温中除寒痺堅齒長髮明目治喉痺吐逆疝瘕去老血產後餘疾腹痛出汗利五藏久服輕身好顏色耐老增年通神生太山川谷及秦嶺上或琅琊八月九月採實惡栝樓防葵畏雌黄今從西來形似椒而大色黄黑味亦頗有椒氣或呼為大椒又云即今樛樹子而樛子是楮椒恐謬新修一三五頁大觀卷十三政和三二六頁蔓荆實味苦辛微寒平温無毒主治筋骨間寒熱濕痺拘攣明目堅齒利九竅去白蟲長蟲主風頭痛腦鳴目淚出益氣久耐老令人光澤脂緻長鬚髮小荆實亦等生益州惡烏頭石膏小荆即應是牡荆牡荆子大於蔓荆子而反呼為小荆恐或以樹形為言復不知蔓荆樹若高大爾新修一頁大觀卷十二政和三三頁女貞實味苦甘平無毒主治補中安五藏養精神除百疾久服肥健輕身不老生武陵川立冬採葉茂盛凌冬不凋皮青肉白與秦皮為表裹其樹以冬生而可愛諸處時有仙經亦服食之世方不復用市人亦無識之者新修一四頁大觀卷十二政和三六頁桑上寄生味苦甘平無毒主治腰痛小兒背强癰腫安胎充肌膚堅髮齒長鬚眉主金創去痺女子崩中內傷不足產後餘疾下乳汁其實明目輕身通神一名寄屑一名寓木一名宛童一名蔦生弘農川谷桑樹三月三日採莖葉陰乾桑上者名桑上寄生爾詩人云施於松上方家亦有用楊上楓上者則各隨其樹名之形類猶是一般但根津所因處為異法生樹枝間寄根在枝節之內葉圓青赤厚澤易折傍自生枝節冬夏生四月華白五月實赤大如小豆今處處皆有以出彭城為勝世人呼皆為續斷用之案本經續斷别在中品藥所主治不同豈只是一物市人使混亂無復能甄識之者服食方云是桑檽與此説又為不同爾新修一四頁大觀卷十二政和三四頁蕤核味甘温微寒無毒主治心腹邪結氣明目目痛赤傷淚出治目腫眥爛齆鼻破心下結淡痞氣久服輕身益氣不肌生凾川谷及巴西七月採實今從北方來云出彭城間形如烏豆大圓而扁有文理狀似胡桃桃核今人皆合殼用為分兩此乃應破取人秤之醫方唯以治眼仙經以合守中丸也新修一六頁大觀卷十二政和三六頁沉香薰陸香雞舌香藿香詹糖香楓香並微温悉治風水毒腫去惡氣薰陸詹糖去伏尸雞舌藿香治霍亂心痛楓香治風癮疹癢毒此六種香皆合香家要用不正復入藥唯治惡核毒腫道方頗有用處詹糖出晉安嶺州上真淳澤者難得多以其皮及柘蟲屎雜之唯輕者為佳其餘無甚真偽而有精麁爾外國用波律香明目白檀消風腫其青木香别在上品新修一八頁大觀卷十二政和三七頁辛夷味辛温無毒主治五藏身體寒風風頭腦痛面温中解肌利九竅通鼻塞涕出治面腫引齒痛眩冒身洋洋如在車船之上者生鬚髮去白蟲久服下氣輕身明目增年耐老可作膏藥用之去中心及外毛毛射人肺令人欬一名辛矧一名侯桃一名房木生漢中川谷九月採實暴乾芎藭為之使惡五石脂畏昌蒲蒲黄黄連石膏黄環今出丹陽近道形如桃子小時氣辛香即離騷所呼辛夷者也新修一一一頁大觀卷十二政和三三頁榆皮味甘平無毒主治大小便不通利水道除邪氣腸胃邪熱氣消腫性滑利久服輕身不飢其實尤良治小兒頭瘡疕華主小兒癎小便不利傷熱一名零榆生潁川山谷二月採皮取白暴乾八月採實並勿令中濕濕則傷人此即今榆樹爾剥取皮刮除上赤皮亦可臨時用之性至滑利初生葉人以作糜羹輩令人睡眠嵇公所謂榆令人眠也斷榖乃屑其皮並檀皮服之即所謂不飢者也新修一一四頁大觀卷十二政和二九八頁
